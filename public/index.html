<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="연성대나무숲">
<meta property="og:description" content="다 놀았니? 이제 연성을 하자">
<meta property="og:image" content="https://oc-yeonsung.web.app/assets/thumbnail-v3.png">
<title>연성대나무숲</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background:
      linear-gradient(160deg, rgba(168,158,196,0.22), rgba(244,239,230,0.12)),
      url('assets/thumbnail-v3.png') center center / cover no-repeat;
    color: var(--text); min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    position: relative; z-index: 1;
    text-align: center; padding: 40px 24px;
    max-width: 400px; width: 100%;
  }
  h1 {
    font-family: var(--font-title); font-weight: 800;
    font-size: 1.8rem; letter-spacing: -0.03em; margin-bottom: 32px;
  }
  h1 span {
    background: linear-gradient(135deg, var(--pink), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  /* ── 입장하기 버튼 (게임 타이틀 화면 느낌) ── */
  .enter-btn {
    position: fixed;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    padding: 16px 52px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--violet), #6a5a9a);
    color: #fff;
    font-family: var(--font-title);
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
    animation: enter-glow 2.4s ease-in-out infinite;
    transition: transform 0.2s;
  }
  .enter-btn:hover {
    transform: translateX(-50%) translateY(-3px);
  }
  @keyframes enter-glow {
    0%, 100% { box-shadow: 0 0 16px rgba(139,124,173,0.5), 0 4px 20px rgba(0,0,0,0.2); }
    50%      { box-shadow: 0 0 32px rgba(139,124,173,0.85), 0 4px 20px rgba(0,0,0,0.2); }
  }

  /* ── 입장 모달 ── */
  .enter-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(20,14,30,0.55);
    backdrop-filter: blur(4px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  .enter-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .enter-modal {
    position: relative;
    width: 90%;
    max-width: 380px;
    padding: 32px 28px 28px;
    border-radius: 18px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    box-shadow: 0 12px 48px rgba(0,0,0,0.3);
    text-align: center;
    transform: translateY(24px) scale(0.96);
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .enter-overlay.show .enter-modal {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  .enter-modal h2 {
    font-family: var(--font-title);
    font-size: 1.15rem;
    margin-bottom: 20px;
    color: var(--text);
  }
  .enter-modal-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 50%;
    background: rgba(0,0,0,0.06);
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .enter-modal-close:hover {
    background: rgba(0,0,0,0.12);
    color: var(--text);
  }
  .enter-modal-links { display: flex; flex-direction: column; gap: 12px; }
  .modal-link {
    display: block; width: 100%; padding: 16px 24px;
    border-radius: var(--radius); border: none;
    font-family: var(--font-title); font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; text-align: center;
  }
  .modal-link.primary {
    background: linear-gradient(135deg, var(--pink), var(--violet));
    color: #fff;
    box-shadow: 0 4px 20px rgba(192,107,132,0.25);
  }
  .modal-link.primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(192,107,132,0.35);
  }
  .modal-link.secondary {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
  }
  .modal-link.secondary:hover {
    border-color: var(--violet);
    color: var(--text);
  }
</style>
</head>
<body>

<button class="enter-btn" id="enterBtn">입장하기</button>

<div class="enter-overlay" id="enterOverlay">
  <div class="enter-modal">
    <button class="enter-modal-close" id="enterModalClose" aria-label="닫기">✕</button>
    <h2>어디로 가시겠어요?</h2>
    <div class="enter-modal-links">
      <a class="modal-link primary" href="random.html">🎲 랜덤 뽑기 실행</a>
      <a class="modal-link primary" href="story/story-list.html">📖 연성글 보러가기</a>
      <a class="modal-link secondary" href="character.html">👤 캐릭터 목록</a>
      <a class="modal-link secondary" href="random-admin.html">⚙ 랜덤 뽑기 (관리자 모드)</a>
    </div>
  </div>
</div>

<script>
  const enterBtn = document.getElementById('enterBtn');
  const enterOverlay = document.getElementById('enterOverlay');
  const enterModalClose = document.getElementById('enterModalClose');

  enterBtn.addEventListener('click', () => enterOverlay.classList.add('show'));
  enterModalClose.addEventListener('click', () => enterOverlay.classList.remove('show'));
  enterOverlay.addEventListener('click', (e) => {
    if (e.target === enterOverlay) enterOverlay.classList.remove('show');
  });
</script>

</body></html>
