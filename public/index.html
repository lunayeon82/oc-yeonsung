<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="연성대나무숲">
<meta property="og:description" content="다 놀았니? 이제 연성을 하자">
<meta property="og:image" content="https://oc-yeonsung.web.app/assets/thumbnail-v3.png">
<title>연성대나무숲</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body);
    background:
      linear-gradient(160deg, rgba(168,158,196,0.22), rgba(244,239,230,0.12)),
      url('assets/thumbnail-v3.png') center center / cover no-repeat;
    color: var(--text); min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
  }
  /* ── 물 속 부유 입자 ── */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    bottom: -5%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.7), rgba(255,255,255,0) 72%);
    filter: blur(0.5px);
    opacity: 0;
    animation: particle-rise linear infinite;
  }
  @keyframes particle-rise {
    0%   { transform: translate(0, 0); opacity: 0; }
    10%  { opacity: 0.35; }
    88%  { opacity: 0.18; }
    100% { transform: translate(var(--dx, 0px), -115vh); opacity: 0; }
  }
  .title-logo {
    position: relative; z-index: 1;
    top: -15%;
    display: block;
    opacity: 0.9;
    width: 80%;
    max-width: 420px;
    height: auto;
    filter: drop-shadow(0 8px 28px rgba(90,74,107,0.35));
    animation: title-float 4s ease-in-out infinite;
  }
  @keyframes title-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  /* ── 입장하기 버튼 (게임 타이틀 화면 느낌) ── */
  .enter-btn {
    position: fixed;
    bottom: 14%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    padding: 16px 52px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--violet), #6a5a9a);
    color: #fff;
    font-family: var(--font-title);
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
    animation: enter-glow 2.4s ease-in-out infinite;
    transition: transform 0.2s;
  }
  .enter-btn:hover {
    transform: translateX(-50%) translateY(-3px);
  }
  @keyframes enter-glow {
    0%, 100% { box-shadow: 0 0 16px rgba(168,158,196,0.5), 0 4px 20px rgba(0,0,0,0.2); }
    50%      { box-shadow: 0 0 32px rgba(168,158,196,0.85), 0 4px 20px rgba(0,0,0,0.2); }
  }

  /* ── 입장 모달 ── */
  .enter-overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(20,14,30,0.55);
    backdrop-filter: blur(4px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  .enter-overlay.show {
    opacity: 1;
    visibility: visible;
  }
  .enter-modal {
    position: relative;
    width: 90%;
    max-width: 500px;
    padding: 32px 28px 28px;
    border-radius: 18px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    box-shadow: 0 12px 48px rgba(0,0,0,0.3);
    text-align: center;
    transform: translateY(24px) scale(0.96);
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  .enter-overlay.show .enter-modal {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  .enter-modal h2 {
    font-family: var(--font-title);
    font-size: 1.15rem;
    margin-bottom: 20px;
    color: var(--text);
  }
  .enter-modal-close {
    position: absolute;
    top: 12px; right: 12px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: 50%;
    background: rgba(0,0,0,0.06);
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .enter-modal-close:hover {
    background: rgba(0,0,0,0.12);
    color: var(--text);
  }
  .enter-modal-links { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; }
  .modal-card {
    flex: 0 1 140px;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    padding: 16px 8px;
    border-radius: var(--radius);
    background: var(--surface);
    border: 1.5px solid var(--border);
    font-family: var(--font-title); font-size: 0.85rem; font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, background 0.2s, color 0.2s;
    text-decoration: none; text-align: center;
    color: var(--text-dim);
  }
  .modal-card:hover {
    transform: translateY(-3px);
    border-color: var(--violet);
    background: var(--violet-dim);
    color: var(--text);
  }
  .modal-card-icon {
    width: 110px; height: 110px;
    max-width: 100%;
    object-fit: contain;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<img src="assets/title.png" alt="연성대나무숲" class="title-logo">

<button class="enter-btn" id="enterBtn">입장하기</button>

<div class="enter-overlay" id="enterOverlay">
  <div class="enter-modal">
    <button class="enter-modal-close" id="enterModalClose" aria-label="닫기">✕</button>
    <h2>어디로 가시겠어요?</h2>
    <div class="enter-modal-links">
      <a class="modal-card" href="random.html">
        <img src="assets/icon/chick-v0.png" alt="" class="modal-card-icon">
        <span>랜덤 뽑기 실행</span>
      </a>
      <a class="modal-card" href="story/story-list.html">
        <img src="assets/icon/hedgehog-v0.png" alt="" class="modal-card-icon">
        <span>연성글 보러가기</span>
      </a>
      <a class="modal-card" href="character.html">
        <img src="assets/icon/ferret-v0.png" alt="" class="modal-card-icon">
        <span>캐릭터 목록</span>
      </a>
    </div>
  </div>
</div>

<script>
  const enterBtn = document.getElementById('enterBtn');
  const enterOverlay = document.getElementById('enterOverlay');
  const enterModalClose = document.getElementById('enterModalClose');

  enterBtn.addEventListener('click', () => enterOverlay.classList.add('show'));
  enterModalClose.addEventListener('click', () => enterOverlay.classList.remove('show'));
  enterOverlay.addEventListener('click', (e) => {
    if (e.target === enterOverlay) enterOverlay.classList.remove('show');
  });

  // 물 속을 떠다니는 입자 — 적은 개수, 느린 속도로 은은하게
  const particleBox = document.getElementById('particles');
  const PARTICLE_COUNT = 6;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    const duration = 28 + Math.random() * 20;
    p.style.width = p.style.height = size.toFixed(1) + 'px';
    p.style.left = (Math.random() * 100).toFixed(1) + '%';
    p.style.setProperty('--dx', ((Math.random() * 2 - 1) * 50).toFixed(0) + 'px');
    p.style.animationDuration = duration.toFixed(1) + 's';
    p.style.animationDelay = (-Math.random() * duration).toFixed(1) + 's';
    particleBox.appendChild(p);
  }
</script>

</body></html>
