<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="연성대나무숲">
<meta property="og:description" content="다 놀았니? 이제 연성을 하자">
<meta property="og:image" content="assets/thumbnail.png">
<title>연성대나무숲</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('assets/ko-font.ttf') format('truetype');
  }
  :root {
    --bg: #f4efe6;
    --surface: #faf7f2;
    --border: #d4c9b8;
    --text: #3a3530;
    --text-dim: #8a7e6b;
    --pink: #c06b84;
    --violet: #8b7cad;
    --amber: #c9962a;
    --radius: 12px;
    --font-title: 'ko-font', sans-serif;
    --font-body: 'ko-font', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body); background: url('assets/thumbnail.png') center center / cover no-repeat;
    color: var(--text); min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    position: relative; z-index: 1;
    text-align: center; padding: 40px 24px;
    max-width: 400px; width: 100%;
  }
  h1 {
    font-family: var(--font-title); font-weight: 800;
    font-size: 1.8rem; letter-spacing: -0.03em; margin-bottom: 32px;
  }
  h1 span {
    background: linear-gradient(135deg, var(--pink), var(--violet));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .btn-group { display: flex; flex-direction: column; gap: 12px; }
  .nav-btn {
    display: block; width: 100%; padding: 16px 24px;
    border-radius: var(--radius); border: none;
    font-family: var(--font-title); font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; text-align: center;
  }
  .nav-btn.primary {
    background: linear-gradient(135deg, var(--pink), var(--violet));
    color: #fff;
    box-shadow: 0 4px 20px rgba(192,107,132,0.25);
  }
  .nav-btn.primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(192,107,132,0.35);
  }
  .nav-btn.secondary {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text-dim);
  }
  .nav-btn.secondary:hover {
    border-color: var(--violet);
    color: var(--text);
  }
</style>
</head>
<body>
<div class="container">
  <h1>😎 <span>연성대나무숲</span></h1>
  <div class="btn-group">
    <a class="nav-btn primary" href="random.html">랜덤 뽑기 실행</a>
    <a class="nav-btn primary" href="story/story-list.html">연성글 보러가기</a>
    <a class="nav-btn secondary" href="character.html">캐릭터 목록</a>
    <a class="nav-btn secondary" href="random-admin.html">랜덤 뽑기 (관리자 모드)</a>
  </div>
</div>


</body></html>
