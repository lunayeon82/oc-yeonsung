<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 글 목록</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  /* ── 헤더 ── */

  /* ── 컨테이너 ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.2rem 3rem;
  }

  /* ── 검색 + 필터 영역 ── */
  .search-area {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 12px rgba(90,74,107,0.06);
  }

  .search-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  .search-controls {
    display: flex;
    gap: 0.4rem;
  }

  .search-input {
    width: 150px;
    padding: 0.45rem 0.8rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    font-family: 'ko-font', sans-serif;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.7);
    color: #4a3a5b;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: #b8a9c9; }
  .search-input:focus { border-color: #b8a9c9; }

  .search-btn {
    padding: 0.45rem 0.9rem;
    background: #b8a9c9;
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'ko-font', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .search-btn:hover { background: #a090b5; }

  /* ── 필터 섹션 ── */
  .filter-section {
    margin-bottom: 0.5rem;
  }

  .filter-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.3rem;
  }

  .filter-label {
    font-size: 0.75rem;
    color: #8a7a9a;
    font-weight: 500;
  }

  .filter-section-right {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .filter-count {
    font-size: 0.68rem;
    color: #9a80b5;
    background: rgba(184,169,201,0.18);
    padding: 0.1rem 0.45rem;
    border-radius: 10px;
    display: none;
  }

  .filter-toggle-btn {
    font-size: 0.72rem;
    color: #a99ab8;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    text-decoration: underline;
    white-space: nowrap;
  }
  .filter-toggle-btn:hover { color: #5a4a6b; }

  .filter-section-body {
    overflow: hidden;
    max-height: 800px;
    transition: max-height 0.35s ease, opacity 0.2s ease;
    opacity: 1;
  }
  .filter-section-body.collapsed {
    max-height: 0;
    opacity: 0;
  }

  /* ── 캐릭터 AND/OR 모드 토글 ── */
  .char-mode-toggle {
    display: flex;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
  }

  .mode-btn {
    padding: 0.2rem 0.65rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 20px;
    font-size: 0.68rem;
    color: #8a7a9a;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: #b8a9c9; }
  .mode-btn.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  /* ── 캐릭터 필터 (오너별) ── */
  .char-filter-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    padding-bottom: 0.2rem;
  }

  .char-filter-row {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .char-owner-label {
    font-size: 0.7rem;
    color: #a99ab8;
    white-space: nowrap;
    padding-top: 0.25rem;
    min-width: 3.5rem;
  }

  .char-tag-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  /* ── 그룹형 필터 (캐릭터 설정 / 관계성) ── */
  .grouped-filter-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    padding-bottom: 0.2rem;
  }

  .filter-group-row {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .filter-group-label {
    font-size: 0.68rem;
    color: #a99ab8;
    font-weight: 500;
  }

  .filter-tag-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .char-tag {
    padding: 0.3rem 0.7rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 20px;
    font-size: 0.75rem;
    color: #7a6a8a;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .char-tag:hover {
    border-color: #b8a9c9;
    background: rgba(184,169,201,0.1);
  }
  .char-tag.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  .filter-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 1rem;
    margin-top: 0.5rem;
  }

  .clear-filter {
    font-size: 0.7rem;
    color: #9a8aaa;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'ko-font', sans-serif;
  }
  .clear-filter:hover { color: #5a4a6b; }

  .apply-filter-btn {
    padding: 0.4rem 1.1rem;
    background: #b8a9c9;
    color: white;
    border: none;
    border-radius: 20px;
    font-family: 'ko-font', sans-serif;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .apply-filter-btn:hover { background: #a090b5; }
  .apply-filter-btn:disabled {
    opacity: 0.6;
    cursor: default;
  }

  /* ── 글 목록 ── */
  .story-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .story-card {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    display: block;
    position: relative;
    overflow: hidden;
  }

  .story-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, #b8a9c9, #d4c8e0);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .story-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(90,74,107,0.1);
    border-color: rgba(184,169,201,0.4);
  }
  .story-card:hover::before { opacity: 1; }

  .story-title {
    font-family: 'ko-font', sans-serif;
    font-size: 1.05rem;
    color: #4a3a5b;
    margin-bottom: 0.5rem;
    font-weight: 700;
  }

  .story-meta {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex-wrap: wrap;
  }

  .story-date {
    font-size: 0.7rem;
    color: #a99ab8;
  }

  .story-chapter-count {
    font-size: 0.7rem;
    color: #a99ab8;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .story-comment-count {
    font-size: 0.7rem;
    color: #a99ab8;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .story-tags {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.4rem;
  }

  .story-tag {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 10px;
  }

  .story-tag.rating-tag {
    background: rgba(194,114,127,0.18);
    color: #b06070;
    font-weight: 700;
  }

  .tag-sep {
    font-size: 0.65rem;
    color: #c8b8d8;
    padding: 0 0.1rem;
  }

  /* ── 새 글 버튼 ── */
  .new-story-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b8a9c9, #9a86b5);
    color: white;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(90,74,107,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
  }
  .new-story-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(90,74,107,0.35);
  }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #a99ab8;
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    opacity: 0.5;
  }
  .empty-state p {
    font-size: 0.85rem;
    line-height: 1.6;
  }

  .load-more-wrap {
    display: flex;
    justify-content: center;
    margin-top: 1rem;
  }

  .load-more-btn {
    padding: 0.6rem 1.6rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 999px;
    color: #7a6a8a;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .load-more-btn:hover {
    background: rgba(184,169,201,0.12);
    border-color: rgba(184,169,201,0.5);
  }
  .load-more-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  /* ── 로딩 ── */
  .loading {
    text-align: center;
    padding: 3rem;
    color: #a99ab8;
    font-size: 0.85rem;
  }

  .loading .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .container { padding: 0 0.8rem 4rem; }
    .search-area { padding: 0.8rem; }
    .story-card { padding: 0.8rem 1rem; }
  }

  /* ── 페이드인 애니메이션 ── */
  .story-card {
    animation: fadeUp 0.4s ease both;
  }
  .story-card:nth-child(1) { animation-delay: 0.05s; }
  .story-card:nth-child(2) { animation-delay: 0.1s; }
  .story-card:nth-child(3) { animation-delay: 0.15s; }
  .story-card:nth-child(4) { animation-delay: 0.2s; }
  .story-card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<header class="page-hero">
  <h1>연성 글 목록</h1>
</header>

<div class="container">

  <!-- 검색 + 캐릭터 필터 -->
  <div class="search-area">
    <div class="search-row">
      <span class="filter-label">제목</span>
      <div class="search-controls">
        <input type="text" class="search-input" id="searchInput" placeholder="검색어 입력...">
        <button class="search-btn" id="searchBtn">검색</button>
      </div>
    </div>
    <!-- 캐릭터 필터 -->
    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-label">캐릭터</span>
        <div class="filter-section-right">
          <span class="filter-count" id="charCount"></span>
          <button class="filter-toggle-btn" id="charToggle">선택 ▾</button>
        </div>
      </div>
      <div class="filter-section-body collapsed" id="charFilterBody">
        <div class="char-mode-toggle">
          <button class="mode-btn active" id="charModeOr">하나라도 포함</button>
          <button class="mode-btn" id="charModeAnd">전부 포함</button>
        </div>
        <div id="charFilter"></div>
      </div>
    </div>

    <!-- 캐릭터 설정 필터 -->
    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-label">캐릭터 설정</span>
        <div class="filter-section-right">
          <span class="filter-count" id="roleCount"></span>
          <button class="filter-toggle-btn" id="roleToggle">선택 ▾</button>
        </div>
      </div>
      <div class="filter-section-body collapsed" id="roleFilter"></div>
    </div>

    <!-- 관계성 필터 -->
    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-label">관계성 (AU)</span>
        <div class="filter-section-right">
          <span class="filter-count" id="auCount"></span>
          <button class="filter-toggle-btn" id="auToggle">선택 ▾</button>
        </div>
      </div>
      <div class="filter-section-body collapsed" id="auFilter"></div>
    </div>

    <!-- 수위 필터 -->
    <div class="filter-section">
      <div class="filter-section-header">
        <span class="filter-label">수위</span>
        <div class="filter-section-right">
          <span class="filter-count" id="ratingCount"></span>
          <button class="filter-toggle-btn" id="ratingToggle">선택 ▾</button>
        </div>
      </div>
      <div class="filter-section-body collapsed" id="ratingFilter">
        <div class="char-mode-toggle">
          <button class="mode-btn active" id="ratingModeInclude">포함</button>
          <button class="mode-btn" id="ratingModeExclude">제외</button>
        </div>
        <div class="filter-tag-group">
          <span class="char-tag" data-rating="17">17</span>
          <span class="char-tag" data-rating="19">19</span>
        </div>
      </div>
    </div>

    <div class="filter-actions">
      <button class="clear-filter" id="clearFilter" style="display:none;">필터 초기화</button>
      <button class="apply-filter-btn" id="applyFilterBtn">필터 적용</button>
    </div>
  </div>

  <!-- 글 목록 -->
  <div class="story-list" id="storyList">
    <div class="loading">불러오는 중<span class="dots"></span></div>
  </div>

</div>

<!-- 새 글 쓰기 FAB -->
<button class="new-story-btn" id="newStoryBtn" title="새 글 쓰기">✎</button>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
  // ★ firebaseConfig는 기존 프로젝트 파일에서 복사해 넣으세요
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── 상태 ──
  const STORY_PAGE_SIZE = 5;
  let allStories = [];
  let lastStoryDoc = null;
  let noMoreStories = false;
  let isLoadingMoreStories = false;
  let allStoriesFull = null;       // 필터 적용 시 1회 캐싱되는 전체 글 목록 (지연 로드)
  let isFilterActive = false;
  let filteredVisibleCount = STORY_PAGE_SIZE;
  let allCharacters = [];
  let selectedChars = new Set();
  let selectedRoles = new Set();
  let selectedAus = new Set();
  let charFilterMode = 'or'; // 'or' | 'and'
  let selectedRatings = new Set();
  let ratingFilterMode = 'include'; // 'include' | 'exclude'
  let searchTerm = '';

  // ── 캐릭터 목록 로드 (기존 Firestore 구조에서) ──
  async function loadCharacters() {
    try {
      const charDoc = await db.collection('data').doc('characters').get();
      if (!charDoc.exists) { renderCharFilter(); return; }

      // 오너별 그룹으로 보존
      allCharacters = (charDoc.data().groups || []).map(owner => ({
        owner: owner.owner,
        names: (owner.subs || []).flatMap(sub =>
          (sub.items || []).filter(ch => ch && ch.n).map(ch => ch.n)
        )
      })).filter(g => g.names.length > 0);

      renderCharFilter();
    } catch (e) {
      console.error('캐릭터 로드 실패:', e);
    }
  }

  // ── 필터 토글 ──
  function makeFilterToggle(toggleId, bodyId, countId) {
    document.getElementById(toggleId).addEventListener('click', () => {
      const body = document.getElementById(bodyId);
      const btn  = document.getElementById(toggleId);
      const isCollapsed = body.classList.toggle('collapsed');
      btn.textContent = isCollapsed ? '선택 ▾' : '접기 ▴';
      updateFilterCount(countId, bodyId);
    });
  }
  makeFilterToggle('charToggle', 'charFilterBody', 'charCount');
  makeFilterToggle('roleToggle', 'roleFilter',     'roleCount');
  makeFilterToggle('auToggle',   'auFilter',       'auCount');
  makeFilterToggle('ratingToggle', 'ratingFilter', 'ratingCount');

  // ── 캐릭터 AND/OR 모드 버튼 ──
  document.getElementById('charModeOr').addEventListener('click', () => {
    charFilterMode = 'or';
    document.getElementById('charModeOr').classList.add('active');
    document.getElementById('charModeAnd').classList.remove('active');
  });
  document.getElementById('charModeAnd').addEventListener('click', () => {
    charFilterMode = 'and';
    document.getElementById('charModeAnd').classList.add('active');
    document.getElementById('charModeOr').classList.remove('active');
  });

  // ── 수위 포함/제외 모드 토글 ──
  document.getElementById('ratingModeInclude').addEventListener('click', () => {
    ratingFilterMode = 'include';
    document.getElementById('ratingModeInclude').classList.add('active');
    document.getElementById('ratingModeExclude').classList.remove('active');
  });
  document.getElementById('ratingModeExclude').addEventListener('click', () => {
    ratingFilterMode = 'exclude';
    document.getElementById('ratingModeExclude').classList.add('active');
    document.getElementById('ratingModeInclude').classList.remove('active');
  });

  // ── 수위 필터 태그 ──
  document.querySelectorAll('#ratingFilter .char-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const val = tag.dataset.rating;
      if (selectedRatings.has(val)) { selectedRatings.delete(val); tag.classList.remove('active'); }
      else                            { selectedRatings.add(val);    tag.classList.add('active'); }
      updateAllCounts();
    });
  });

  // countId 뱃지: 접혀있고 선택 있을 때만 표시
  function updateFilterCount(countId, bodyId) {
    const countEl   = document.getElementById(countId);
    const collapsed = document.getElementById(bodyId).classList.contains('collapsed');
    const sets = { charCount: selectedChars, roleCount: selectedRoles, auCount: selectedAus, ratingCount: selectedRatings };
    const size = sets[countId]?.size ?? 0;
    countEl.textContent = `${size}개 선택`;
    countEl.style.display = (collapsed && size > 0) ? 'inline' : 'none';
  }

  function updateAllCounts() {
    updateFilterCount('charCount', 'charFilterBody');
    updateFilterCount('roleCount', 'roleFilter');
    updateFilterCount('auCount',   'auFilter');
    updateFilterCount('ratingCount', 'ratingFilter');
    document.getElementById('clearFilter').style.display =
      (selectedChars.size > 0 || selectedRoles.size > 0 || selectedAus.size > 0 || selectedRatings.size > 0) ? 'block' : 'none';
  }

  // ── 캐릭터 필터 렌더 ──
  function renderCharFilter() {
    const wrap = document.getElementById('charFilter');
    if (allCharacters.length === 0) {
      wrap.innerHTML = '<div class="char-filter-wrap"><span style="font-size:0.75rem;color:#a99ab8;">캐릭터 없음</span></div>';
      return;
    }
    wrap.innerHTML = `<div class="char-filter-wrap">${
      allCharacters.map(g => `
        <div class="char-filter-row">
          <span class="char-owner-label">${g.owner}</span>
          <div class="char-tag-group">
            ${g.names.map(name => `<span class="char-tag" data-name="${name}">${name}</span>`).join('')}
          </div>
        </div>
      `).join('')
    }</div>`;

    wrap.querySelectorAll('.char-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const name = tag.dataset.name;
        if (selectedChars.has(name)) { selectedChars.delete(name); tag.classList.remove('active'); }
        else                          { selectedChars.add(name);    tag.classList.add('active'); }
        updateAllCounts();
      });
    });
  }

  // ── 캐릭터 설정 / 관계성 로드 ──
  async function loadRolesAndAus() {
    try {
      const [roleDoc, auDoc] = await Promise.all([
        db.collection('data').doc('roles').get(),
        db.collection('data').doc('aus').get()
      ]);
      if (roleDoc.exists) renderGroupedFilter('roleFilter', roleDoc.data().groups || [], selectedRoles);
      if (auDoc.exists)   renderGroupedFilter('auFilter',   auDoc.data().groups  || [], selectedAus);
    } catch (e) {
      console.error('설정/관계성 로드 실패:', e);
    }
  }

  function renderGroupedFilter(wrpId, groups, selectedSet) {
    const wrap = document.getElementById(wrpId);
    const hasItems = groups.some(g => (g.items || []).length > 0);
    if (!hasItems) {
      wrap.innerHTML = '<div class="grouped-filter-wrap"><span style="font-size:0.75rem;color:#a99ab8;">항목 없음</span></div>';
      return;
    }
    wrap.innerHTML = `<div class="grouped-filter-wrap">${
      groups.filter(g => (g.items || []).length > 0).map(g => `
        <div class="filter-group-row">
          <span class="filter-group-label">${g.label}</span>
          <div class="filter-tag-group">
            ${g.items.map(name =>
              `<span class="char-tag${selectedSet.has(name) ? ' active' : ''}" data-name="${name}">${name}</span>`
            ).join('')}
          </div>
        </div>
      `).join('')
    }</div>`;

    wrap.querySelectorAll('.char-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const name = tag.dataset.name;
        if (selectedSet.has(name)) { selectedSet.delete(name); tag.classList.remove('active'); }
        else                        { selectedSet.add(name);    tag.classList.add('active'); }
        updateAllCounts();
      });
    });
  }

  // ── 글 목록 로드 (최신순 페이지네이션) ──
  async function loadStories() {
    allStories = [];
    lastStoryDoc = null;
    noMoreStories = false;
    await loadMoreStories();
  }

  async function loadMoreStories() {
    if (noMoreStories || isLoadingMoreStories) return;
    isLoadingMoreStories = true;
    renderDefaultStories();

    try {
      let query = db.collection('stories')
        .orderBy('createdAt', 'desc')
        .limit(STORY_PAGE_SIZE);
      if (lastStoryDoc) query = query.startAfter(lastStoryDoc);

      const snapshot = await query.get();

      const page = await Promise.all(snapshot.docs.map(async doc => {
        const data = doc.data();
        // chapterCount가 저장된 경우 바로 사용, 없으면 실제 쿼리 (병렬)
        const chapterCount = data.chapterCount != null
          ? data.chapterCount
          : (await db.collection('chapters').where('storyId', '==', doc.id).get()).size;
        return {
          pid: doc.id,
          title: data.title || '(제목 없음)',
          characters: data.characters || [],
          roles: data.roles || [],
          aus: data.aus || [],
          rating: data.rating || '',
          theme: data.theme || 'default',
          createdAt: data.createdAt?.toDate?.() || new Date(),
          chapterCount,
          commentCount: data.commentCount || 0
        };
      }));

      allStories = allStories.concat(page);
      lastStoryDoc = snapshot.docs[snapshot.docs.length - 1] || lastStoryDoc;
      if (snapshot.docs.length < STORY_PAGE_SIZE) noMoreStories = true;
    } catch (e) {
      console.error('글 목록 로드 실패:', e);
      if (allStories.length === 0) {
        isLoadingMoreStories = false;
        document.getElementById('storyList').innerHTML =
          '<div class="empty-state"><div class="icon">⚠</div><p>목록을 불러오지 못했어요</p></div>';
        return;
      }
    }

    isLoadingMoreStories = false;
    renderDefaultStories();
  }

  // ── 카드 HTML 빌드 ──
  function buildCardsHtml(stories) {
    return stories.map(s => {
      const dateStr = formatDate(s.createdAt);
      const tagGroups = [s.characters, s.roles, s.aus].filter(g => g.length > 0);
      const tagsHtml = tagGroups
        .map(g => g.map(t => `<span class="story-tag">${escapeHtml(t)}</span>`).join(''))
        .join('<span class="tag-sep">|</span>');
      const ratingHtml = s.rating ? `<span class="story-tag rating-tag">${escapeHtml(s.rating)}</span>` : '';
      return `
        <a class="story-card" href="story-view.html?pid=${s.pid}">
          <div class="story-title">${escapeHtml(s.title)}</div>
          <div class="story-meta">
            <span class="story-date">${dateStr}</span>
            <span class="story-chapter-count">📄 ${s.chapterCount}챕터</span>
            <span class="story-comment-count">💬 ${s.commentCount}개</span>
            ${ratingHtml}
          </div>
          ${tagsHtml ? `<div class="story-tags">${tagsHtml}</div>` : ''}
        </a>`;
    }).join('');
  }

  // ── 목록 렌더 (기본 모드 / 필터 모드 공용) ──
  function renderList({ items, visibleCount, hasMore, isLoadingMore, onLoadMore, emptyMessage }) {
    const list = document.getElementById('storyList');
    const visible = items.slice(0, visibleCount);

    if (visible.length === 0 && isLoadingMore) {
      list.innerHTML = '<div class="loading">불러오는 중<span class="dots"></span></div>';
      return;
    }

    let html = visible.length === 0
      ? `<div class="empty-state"><div class="icon">📝</div><p>${emptyMessage}</p></div>`
      : buildCardsHtml(visible);

    if (hasMore) {
      html += `
        <div class="load-more-wrap">
          <button class="load-more-btn" id="loadMoreBtn" ${isLoadingMore ? 'disabled' : ''}>${isLoadingMore ? '불러오는 중...' : '더보기'}</button>
        </div>`;
    }

    list.innerHTML = html;

    const loadMoreBtn = document.getElementById('loadMoreBtn');
    if (loadMoreBtn) loadMoreBtn.addEventListener('click', onLoadMore);
  }

  // ── 기본 모드 렌더 (최신순 페이지네이션) ──
  function renderDefaultStories() {
    renderList({
      items: allStories,
      visibleCount: allStories.length,
      hasMore: !noMoreStories,
      isLoadingMore: isLoadingMoreStories,
      onLoadMore: loadMoreStories,
      emptyMessage: '아직 작성된 글이 없어요<br>첫 번째 이야기를 시작해보세요!'
    });
  }

  // ── 필터 일치 여부 판정 ──
  function matchesFilters(s) {
    if (searchTerm && !s.title.toLowerCase().includes(searchTerm.toLowerCase())) return false;

    if (selectedChars.size > 0) {
      const matchChars = charFilterMode === 'and'
        ? [...selectedChars].every(name => s.characters.includes(name))
        : [...selectedChars].some(name => s.characters.includes(name));
      if (!matchChars) return false;
    }

    if (selectedRoles.size > 0 || selectedAus.size > 0) {
      const matchGroups =
        [...selectedRoles].some(name => s.roles.includes(name)) ||
        [...selectedAus].some(name => s.aus.includes(name));
      if (!matchGroups) return false;
    }

    if (selectedRatings.size > 0) {
      const hasRating = selectedRatings.has(s.rating);
      if (ratingFilterMode === 'exclude' ? hasRating : !hasRating) return false;
    }

    return true;
  }

  function hasAnyFilterCriteria() {
    return !!searchTerm || selectedChars.size > 0 || selectedRoles.size > 0 || selectedAus.size > 0 || selectedRatings.size > 0;
  }

  // ── 필터 모드 렌더 (캐싱된 전체 목록에서 필터링, 캐시 내에서 더보기) ──
  function renderFilteredStories() {
    const filtered = (allStoriesFull || []).filter(matchesFilters);
    renderList({
      items: filtered,
      visibleCount: filteredVisibleCount,
      hasMore: filteredVisibleCount < filtered.length,
      isLoadingMore: false,
      onLoadMore: () => { filteredVisibleCount += STORY_PAGE_SIZE; renderFilteredStories(); },
      emptyMessage: '검색 결과가 없어요'
    });
  }

  // ── 전체 글 목록 캐싱 (필터 적용 시 1회만 로드) ──
  async function ensureFullStoriesLoaded() {
    if (allStoriesFull !== null) return;
    const snapshot = await db.collection('stories').orderBy('createdAt', 'desc').get();
    // chapterCount/commentCount는 story 문서에 이미 저장돼 있어 추가 쿼리 없이 바로 사용 가능
    allStoriesFull = snapshot.docs.map(doc => {
      const data = doc.data();
      return {
        pid: doc.id,
        title: data.title || '(제목 없음)',
        characters: data.characters || [],
        roles: data.roles || [],
        aus: data.aus || [],
        rating: data.rating || '',
        theme: data.theme || 'default',
        createdAt: data.createdAt?.toDate?.() || new Date(),
        chapterCount: data.chapterCount || 0,
        commentCount: data.commentCount || 0
      };
    });
  }

  function setApplyBtnLoading(loading) {
    const btn = document.getElementById('applyFilterBtn');
    btn.disabled = loading;
    btn.textContent = loading ? '불러오는 중...' : '필터 적용';
  }

  // ── 필터 적용: 전체 목록을 캐싱한 뒤 필터링해서 보여줌 ──
  async function applyFilters() {
    searchTerm = document.getElementById('searchInput').value.trim();

    if (!hasAnyFilterCriteria()) {
      isFilterActive = false;
      renderDefaultStories();
      return;
    }

    setApplyBtnLoading(true);
    try {
      await ensureFullStoriesLoaded();
      isFilterActive = true;
      filteredVisibleCount = STORY_PAGE_SIZE;
      renderFilteredStories();
    } catch (e) {
      console.error('전체 목록 로드 실패:', e);
      document.getElementById('storyList').innerHTML =
        '<div class="empty-state"><div class="icon">⚠</div><p>필터 적용에 실패했어요<br>잠시 후 다시 시도해주세요</p></div>';
    } finally {
      setApplyBtnLoading(false);
    }
  }

  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}.${m}.${d}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── 이벤트 ──
  document.getElementById('searchBtn').addEventListener('click', applyFilters);

  document.getElementById('searchInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') applyFilters();
  });

  document.getElementById('applyFilterBtn').addEventListener('click', applyFilters);

  document.getElementById('clearFilter').addEventListener('click', () => {
    selectedChars.clear();
    selectedRoles.clear();
    selectedAus.clear();
    selectedRatings.clear();
    ratingFilterMode = 'include';
    document.getElementById('ratingModeInclude').classList.add('active');
    document.getElementById('ratingModeExclude').classList.remove('active');
    document.querySelectorAll('.char-tag.active').forEach(t => t.classList.remove('active'));
    document.getElementById('searchInput').value = '';
    searchTerm = '';
    updateAllCounts();
    isFilterActive = false;
    renderDefaultStories();
  });

  document.getElementById('newStoryBtn').addEventListener('click', () => {
    // 새 pid 생성 후 write 페이지로 이동
    const newPid = generatePid();
    window.location.href = `story-write.html?pid=${newPid}&new=1`;
  });

  function generatePid() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < 8; i++) {
      result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
  }

  // ── 초기화 ──
  loadCharacters();
  loadRolesAndAus();
  loadStories();
</script>
</body>
</html>
