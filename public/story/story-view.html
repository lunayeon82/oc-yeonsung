<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 글 읽기</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a89ec4">
<link rel="apple-touch-icon" href="/assets/icon/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="/assets/pwa.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  @font-face {
    font-family: 'ChosunCentennial';
    src: url('../fonts/ChosunCentennial.otf') format('opentype');
  }
  @font-face {
    font-family: 'GowunDodum';
    src: url('../fonts/GowunDodum.ttf') format('truetype');
  }
  @font-face {
    font-family: 'RIDIBatang';
    src: url('../fonts/RIDI-Batang.otf') format('opentype');
  }
  :root { --story-font: 'Noto Sans KR', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  /* ── 상단 바 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface-glass-strong);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,169,201,0.15);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-bar-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  /* ── 설정 드롭다운 ── */
  .settings-wrap { position: relative; }

  .settings-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .settings-btn:hover { background: rgba(184,169,201,0.15); border-color: rgba(184,169,201,0.4); }
  .settings-btn.open { background: rgba(184,169,201,0.18); border-color: rgba(184,169,201,0.5); color: #6a5a7a; }

  .settings-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(90,74,107,0.13);
    min-width: 108px;
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px) scale(0.97);
    transition: opacity 0.17s ease, transform 0.17s ease, visibility 0.17s;
    z-index: 300;
  }
  .settings-dropdown.open {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
  }

  .settings-item {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.62rem 0.95rem;
    font-family: 'ko-font', sans-serif;
    font-size: 0.82rem;
    color: #5a4a6b;
    cursor: pointer;
    transition: background 0.13s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .settings-item:hover { background: rgba(184,169,201,0.1); }
  .settings-item + .settings-item { border-top: 1px solid rgba(184,169,201,0.12); }
  .settings-item.danger { color: #b06070; }
  .settings-item.danger:hover { background: rgba(194,114,127,0.08); }

  /* ── 챕터 카루셀 ── */
  .ch-carousel-wrap {
    position: relative;
    margin-bottom: 1.4rem;
    overflow: hidden;
  }
  .ch-carousel-wrap::before,
  .ch-carousel-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0; width: 3rem; z-index: 2; pointer-events: none;
  }
  .ch-carousel-wrap::before {
    left: 0;
    background: linear-gradient(90deg, rgba(243,237,229,0.96) 0%, transparent 100%);
  }
  .ch-carousel-wrap::after {
    right: 0;
    background: linear-gradient(270deg, rgba(243,237,229,0.96) 0%, transparent 100%);
  }

  .ch-carousel {
    display: flex;
    gap: 0.7rem;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0.5rem 0 1rem;
    cursor: grab;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .ch-carousel::-webkit-scrollbar { display: none; }
  .ch-carousel.is-grabbing { cursor: grabbing; scroll-behavior: auto; }

  .ch-card {
    flex-shrink: 0;
    width: min(210px, 62vw);
    min-height: 68px;
    padding: 0.85rem 1.05rem;
    background: rgba(255,255,255,0.38);
    border: 1px solid rgba(184,169,201,0.18);
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.28s ease, transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease, background 0.28s ease;
    opacity: 0.45;
    transform: scale(0.94) translateY(2px);
    user-select: none;
    -webkit-user-select: none;
  }
  .ch-card.active {
    opacity: 1;
    transform: scale(1) translateY(0);
    background: linear-gradient(145deg, rgba(184,169,201,0.22) 0%, rgba(255,255,255,0.6) 100%);
    border-color: #b8a9c9;
    box-shadow: 0 4px 18px rgba(90,74,107,0.14), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .ch-card:not(.active):hover { opacity: 0.72; }

  .ch-card-num {
    font-size: 0.6rem;
    color: #c4b4d4;
    letter-spacing: 0.08em;
    margin-bottom: 0.28rem;
    font-family: 'ko-font', sans-serif;
  }
  .ch-card.active .ch-card-num { color: #9a7ab5; font-weight: 500; }

  .ch-card-title {
    font-size: 0.84rem;
    color: #8a7a9a;
    line-height: 1.45;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    font-family: 'ko-font', sans-serif;
  }
  .ch-card.active .ch-card-title { color: #4a3a5b; font-weight: 500; }

  /* ── 챕터 본문 트랜지션 ── */
  .ch-body {
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .ch-body.fading {
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;
  }

  /* ── 메인 콘텐츠 ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
  }

  /* ── 글 헤더 ── */
  .story-header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeIn 0.5s ease;
  }

  .story-title {
    font-family: 'ko-font', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #4a3a5b;
    line-height: 1.4;
    margin-bottom: 0.8rem;
  }

  .story-meta-info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }

  .meta-date {
    font-size: 0.75rem;
    color: #a99ab8;
  }

  .meta-chapters {
    font-size: 0.75rem;
    color: #a99ab8;
  }

  .story-char-tags {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.3rem;
  }

  .char-tag-view {
    padding: 0.2rem 0.6rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 12px;
    font-size: 0.7rem;
  }

  .char-tag-view.rating-tag-view {
    background: rgba(194,114,127,0.18);
    color: #b06070;
    font-weight: 700;
  }

  .story-lore-refs {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-top: 0.4rem;
  }

  .lore-ref-tag {
    padding: 0.2rem 0.6rem;
    background: rgba(106,154,122,0.12);
    color: #5a8a6a;
    border-radius: 12px;
    font-size: 0.7rem;
    text-decoration: none;
    transition: background 0.15s;
  }
  .lore-ref-tag:hover { background: rgba(106,154,122,0.22); }

  .tag-sep {
    font-size: 0.7rem;
    color: #c8b8d8;
    padding: 0 0.1rem;
  }

  .header-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c8b8d8, transparent);
    margin: 1.2rem auto 0;
  }

  /* ── 챕터 헤더 ── */
  .chapter-header {
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.4s ease;
  }

  .chapter-indicator {
    font-size: 0.7rem;
    color: #b8a9c9;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.3rem;
  }

  .chapter-title {
    font-family: 'ko-font', sans-serif;
    font-size: 1.15rem;
    color: #5a4a6b;
    font-weight: 700;
  }

  .chapter-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4c8e0, transparent);
    margin: 0.8rem auto 0;
  }

  /* ── 본문 ── */
  .story-body {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.15);
    border-radius: 12px;
    padding: 1.5rem 1.5rem;
    font-family: var(--story-font);
    font-size: 0.92rem;
    line-height: 1.9;
    color: #3a2a4b;
    animation: fadeIn 0.5s ease 0.1s both;
    min-height: 200px;
  }

  .story-body h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.15rem;
    color: #5a4a6b;
    margin: 1.2rem 0 0.5rem;
  }

  .story-body h3 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1rem;
    color: #6a5a7a;
    margin: 1rem 0 0.4rem;
  }

  .story-body blockquote {
    border-left: 3px solid #d4c8e0;
    padding-left: 0.8rem;
    margin: 0.6rem 0;
    color: #7a6a8a;
    font-style: italic;
  }

  .story-body hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, #d4c8e0 50%, transparent 90%);
    margin: 1.5rem 0;
  }

  .story-body p {
    margin-bottom: 0.6rem;
  }

  /* ── 챕터 네비게이션 ── */
  .chapter-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    padding-top: 1.2rem;
    border-top: 1px solid rgba(184,169,201,0.15);
    animation: fadeIn 0.5s ease 0.2s both;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.55rem 1rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 8px;
    color: #7a6a8a;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
    text-decoration: none;
  }
  .nav-btn:hover {
    background: rgba(184,169,201,0.12);
    border-color: rgba(184,169,201,0.4);
    transform: translateY(-1px);
  }
  .nav-btn:disabled, .nav-btn.disabled {
    opacity: 0.3;
    cursor: default;
    pointer-events: none;
  }

  .nav-btn .arrow { font-size: 0.9rem; }

  .nav-btn-label {
    display: flex;
    flex-direction: column;
  }
  .nav-btn-sub {
    font-size: 0.65rem;
    color: #a99ab8;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chapter-position {
    font-size: 0.72rem;
    color: #a99ab8;
  }

  /* ── 로딩 ── */
  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: #a99ab8;
    font-size: 0.85rem;
  }

  .loading .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── 에러 ── */
  .error-state {
    text-align: center;
    padding: 4rem 1rem;
    color: #a99ab8;
  }
  .error-state .icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.5; }
  .error-state p { font-size: 0.85rem; line-height: 1.6; }
  .error-state a {
    color: #b8a9c9;
    text-decoration: underline;
    font-size: 0.8rem;
  }

  /* ── 폰트 선택 ── */
  .font-picker-wrap { position: relative; }

  .font-picker-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: 'ko-font', sans-serif;
  }
  .font-picker-btn:hover { background: rgba(184,169,201,0.15); }
  .font-picker-btn.active { background: #b8a9c9; color: white; border-color: #b8a9c9; }

  .font-panel {
    position: absolute;
    top: calc(100% + 0.4rem);
    right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(90,74,107,0.14);
    padding: 0.4rem;
    min-width: 170px;
    display: none;
    z-index: 300;
  }
  .font-panel.open { display: block; }

  .font-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    color: #4a3a5b;
    font-size: 0.92rem;
    line-height: 1;
  }
  .font-option:hover { background: rgba(184,169,201,0.12); }
  .font-option.selected { background: rgba(184,169,201,0.2); }
  .font-option .check { font-size: 0.7rem; color: #b8a9c9; opacity: 0; }
  .font-option.selected .check { opacity: 1; }

  /* ── 댓글 버튼 ── */
  .comment-toggle-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .comment-toggle-btn:hover { background: rgba(184,169,201,0.15); }
  .comment-toggle-btn.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  .bookmark-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .bookmark-btn:hover { background: rgba(184,169,201,0.15); }

  /* ── 댓글 패널 ── */
  .comment-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 150;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }
  .comment-overlay.open { opacity: 1; visibility: visible; }

  .comment-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 340px;
    max-width: 88vw;
    background: rgba(245,240,232,0.97);
    backdrop-filter: blur(16px);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 24px rgba(90,74,107,0.1);
  }
  .comment-panel.open { transform: translateX(0); }

  .comment-panel-header {
    padding: 1.2rem 1rem;
    border-bottom: 1px solid rgba(184,169,201,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .comment-panel-header h3 {
    font-family: 'ko-font', sans-serif;
    font-size: 0.95rem;
    color: #5a4a6b;
    font-weight: 700;
  }

  .comment-panel-close {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #8a7a9a;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .comment-panel-close:hover { background: rgba(184,169,201,0.15); }

  .comment-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.4rem 1rem;
  }

  .comment-item {
    position: relative;
    padding: 0.8rem 1.7rem 0.8rem 0;
    border-bottom: 1px solid rgba(184,169,201,0.1);
  }
  .comment-item:last-child { border-bottom: none; }

  .comment-delete-btn {
    position: absolute;
    top: 0.7rem;
    right: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #c8b8d8;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .comment-delete-btn:hover {
    background: rgba(184,169,201,0.18);
    color: #8a6a9a;
  }

  .comment-chapter-tag {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    margin-bottom: 0.35rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 8px;
    font-size: 0.65rem;
  }

  .comment-body {
    font-size: 0.85rem;
    color: #4a3a5b;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .comment-date {
    font-size: 0.68rem;
    color: #a99ab8;
    margin-top: 0.3rem;
  }

  .comment-empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: #a99ab8;
    font-size: 0.8rem;
  }

  .comment-form {
    padding: 0.9rem 1rem;
    border-top: 1px solid rgba(184,169,201,0.15);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .comment-input {
    width: 100%;
    resize: vertical;
    min-height: 56px;
    padding: 0.6rem 0.7rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
    color: #4a3a5b;
    font-size: 0.82rem;
    font-family: 'ko-font', sans-serif;
    line-height: 1.5;
  }
  .comment-input:focus {
    outline: none;
    border-color: #b8a9c9;
  }

  .comment-submit-btn {
    align-self: flex-end;
    padding: 0.45rem 1.1rem;
    background: #b8a9c9;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .comment-submit-btn:hover { background: #a594b8; }
  .comment-submit-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,107,0.9);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 400;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── 애니메이션 ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .container { padding: 1.2rem 0.8rem 3rem; }
    .story-title { font-size: 1.3rem; }
    .story-body { padding: 1rem; font-size: 0.88rem; }
    .nav-btn-sub { display: none; }

    .comment-panel { width: 300px; }
  }
</style>
</head>
<body>

<!-- 실시간 연결 표시 -->
<div class="sync-badge" id="syncBadge"><span class="dot"></span>실시간 연결됨</div>

<!-- 상단 바 -->
<div class="top-bar">
  <a href="story-list.html" class="nav-link">← 목록</a>
  <div class="top-bar-actions">
    <div class="font-picker-wrap">
      <button class="font-picker-btn" id="fontPickerBtn" title="폰트 설정">가</button>
      <div class="font-panel" id="fontPanel">
        <div class="font-option" data-font="Noto Sans KR" style="font-family:'Noto Sans KR',sans-serif">Noto Sans KR <span class="check">✓</span></div>
        <div class="font-option" data-font="Nanum Gothic" style="font-family:'Nanum Gothic',sans-serif">나눔고딕 <span class="check">✓</span></div>
        <div class="font-option" data-font="Nanum Myeongjo" style="font-family:'Nanum Myeongjo',serif">나눔명조 <span class="check">✓</span></div>
        <div class="font-option" data-font="RIDIBatang" style="font-family:'RIDIBatang',serif">RIDI바탕 <span class="check">✓</span></div>
        <div class="font-option" data-font="ChosunCentennial" style="font-family:'ChosunCentennial',serif">조선센테니얼 <span class="check">✓</span></div>
        <div class="font-option" data-font="GowunDodum" style="font-family:'GowunDodum',sans-serif">고운돋움 <span class="check">✓</span></div>
      </div>
    </div>
    <button class="bookmark-btn" id="bookmarkBtn" title="저장" style="display:none;">🔖</button>
    <button class="comment-toggle-btn" id="commentToggleBtn" title="댓글" style="display:none;">💬</button>

    <div class="settings-wrap" id="settingsWrap" style="display:none;">
      <button class="settings-btn" id="settingsBtn" title="설정">⚙</button>
      <div class="settings-dropdown" id="settingsDropdown">
        <button class="settings-item" id="editItem">✏ 수정</button>
        <button class="settings-item danger" id="deleteItem">🗑 삭제</button>
      </div>
    </div>
  </div>
</div>


<!-- 댓글 패널 -->
<div class="comment-overlay" id="commentOverlay"></div>
<div class="comment-panel" id="commentPanel">
  <div class="comment-panel-header">
    <h3>댓글</h3>
    <button class="comment-panel-close" id="commentPanelClose">✕</button>
  </div>
  <div class="comment-list" id="commentList"></div>
  <div class="comment-form">
    <textarea class="comment-input" id="commentInput" placeholder="댓글을 남겨보세요" rows="2" maxlength="500"></textarea>
    <button class="comment-submit-btn" id="commentSubmitBtn">등록</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 메인 콘텐츠 -->
<div class="container" id="mainContainer">
  <div class="loading" id="loadingState">
    불러오는 중<span class="dots"></span>
  </div>
</div>

<script src="../assets/personal-nav.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../assets/confirm-modal.js"></script>
<script src="../assets/storage-modal.js"></script>
<script>
  // ★ firebaseConfig는 기존 프로젝트 파일에서 복사
  const firebaseConfig = {
    apiKey: "AIzaSyAV43y2kZnhgU7BhDlRg_r7IkeklidH6m8",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.firebasestorage.app",
    messagingSenderId: "145543545184",
    appId: "1:145543545184:web:e7411754d99d8b04b5de05"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── URL 파라미터 ──
  const params = new URLSearchParams(location.search);
  const pid = params.get('pid');

  if (!pid) {
    document.getElementById('mainContainer').innerHTML =
      '<div class="error-state"><div class="icon">⚠</div><p>잘못된 접근이에요</p><a href="story-list.html">목록으로 돌아가기</a></div>';
  }

  // ── 상태 ──
  let storyData = null;
  let chapters = [];
  let currentChapterIndex = 0;
  let comments = [];
  let USER_NAMES = ['김굥', '하지', '예밍'];

  function setSyncStatus(online) {
    const badge = document.getElementById('syncBadge');
    if (online) {
      badge.classList.remove('offline');
      badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
    } else {
      badge.classList.add('offline');
      badge.innerHTML = '<span class="dot"></span>오프라인';
    }
  }

  // ── 로드 ──
  async function loadStory() {
    try {
      // 스토리 메타
      const storyDoc = await db.collection('stories').doc(pid).get();
      if (!storyDoc.exists) {
        document.getElementById('mainContainer').innerHTML =
          '<div class="error-state"><div class="icon">📭</div><p>존재하지 않는 글이에요</p><a href="story-list.html">목록으로 돌아가기</a></div>';
        return;
      }

      storyData = storyDoc.data();

      // 챕터 로드 (복합 인덱스 없이 JS 정렬)
      const chapSnap = await db.collection('chapters')
        .where('storyId', '==', pid)
        .get();

      chapters = chapSnap.docs.map(doc => ({
        chapterPid: doc.id,
        title: doc.data().title || '',
        body: doc.data().body || '',
        order: doc.data().order ?? 0
      })).sort((a, b) => a.order - b.order);

      // 설정 버튼 표시
      document.getElementById('settingsWrap').style.display = 'flex';

      // 북마크 버튼 표시
      document.getElementById('bookmarkBtn').style.display = 'flex';
      loadUserNames();

      // 댓글 버튼 표시
      document.getElementById('commentToggleBtn').style.display = 'flex';
      loadComments();

      renderStory();
      setSyncStatus(true);

    } catch (e) {
      console.error('로드 실패:', e);
      document.getElementById('mainContainer').innerHTML =
        '<div class="error-state"><div class="icon">⚠</div><p>글을 불러오지 못했어요</p><a href="story-list.html">목록으로 돌아가기</a></div>';
      setSyncStatus(false);
    }
  }

  // ── 렌더링 ──
  function renderStory() {
    const container = document.getElementById('mainContainer');
    const dateStr = storyData.createdAt?.toDate ? formatDate(storyData.createdAt.toDate()) : '';
    const tagGroups = [
      storyData.characters || [],
      storyData.roles || [],
      storyData.aus || []
    ].filter(g => g.length > 0);
    const charTagsHtml = tagGroups
      .map(g => g.map(c => `<span class="char-tag-view">${escapeHtml(c)}</span>`).join(''))
      .join('<span class="tag-sep">|</span>');

    container.innerHTML = `
      <div class="story-header">
        <div class="story-title">${escapeHtml(storyData.title)}</div>
        <div class="story-meta-info">
          ${dateStr ? `<span class="meta-date">${dateStr}</span>` : ''}
          ${chapters.length > 1 ? `<span class="meta-chapters">${chapters.length}챕터</span>` : ''}
          ${storyData.rating ? `<span class="char-tag-view rating-tag-view">${escapeHtml(storyData.rating)}</span>` : ''}
        </div>
        ${charTagsHtml ? `<div class="story-char-tags">${charTagsHtml}</div>` : ''}
        ${(storyData.loreRefs || []).length > 0 ? `
          <div class="story-lore-refs">
            ${storyData.loreRefs.map(ref =>
              `<a class="lore-ref-tag" href="lore-view.html?pid=${ref.id}">📖 ${escapeHtml(ref.title)}</a>`
            ).join('')}
          </div>` : ''}
        <div class="header-divider"></div>
      </div>
      ${chapters.length > 1 ? `<div class="ch-tab-strip" id="chTabStrip"></div>` : ''}
      <div class="ch-body" id="chBody"></div>
      ${chapters.length > 1 ? `<div id="chNav"></div>` : ''}
    `;

    if (chapters.length > 1) renderTabStrip();
    renderChapterBody(currentChapterIndex);
    if (chapters.length > 1) renderChapterNav();
  }

  function renderTabStrip() {
    const strip = document.getElementById('chTabStrip');
    if (!strip) return;
    strip.innerHTML = `
      <div class="ch-carousel-wrap">
        <div class="ch-carousel" id="chCarousel">
          <div id="chSpacerL" style="flex-shrink:0"></div>
          ${chapters.map((ch, i) => `
            <div class="ch-card${i === currentChapterIndex ? ' active' : ''}" data-index="${i}">
              <div class="ch-card-num">Chapter ${i + 1}.</div>
              ${ch.title ? `<div class="ch-card-title">${escapeHtml(ch.title)}</div>` : ''}
            </div>
          `).join('')}
          <div id="chSpacerR" style="flex-shrink:0"></div>
        </div>
      </div>
    `;
    initCarousel();
    requestAnimationFrame(() => scrollCarouselTo(currentChapterIndex, false));
  }

  function initCarousel() {
    const carousel = document.getElementById('chCarousel');
    if (!carousel) return;
    updateCarouselSpacers(carousel);

    let startX = 0, startLeft = 0, moved = false;

    carousel.addEventListener('pointerdown', e => {
      startX = e.clientX;
      startLeft = carousel.scrollLeft;
      moved = false;
      carousel.setPointerCapture(e.pointerId);
      carousel.classList.add('is-grabbing');
    });

    carousel.addEventListener('pointermove', e => {
      if (!carousel.hasPointerCapture(e.pointerId)) return;
      const dx = startX - e.clientX;
      if (Math.abs(dx) > 5) moved = true;
      carousel.scrollLeft = startLeft + dx;
    });

    carousel.addEventListener('pointerup', e => {
      carousel.classList.remove('is-grabbing');
      if (moved) {
        snapCarouselToNearest(carousel);
      } else {
        // setPointerCapture로 인해 click이 카드에 안 오므로 직접 처리
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const card = el?.closest('.ch-card');
        if (card) switchChapter(parseInt(card.dataset.index));
      }
    });

    carousel.addEventListener('pointercancel', () => {
      carousel.classList.remove('is-grabbing');
      snapCarouselToNearest(carousel);
    });
  }

  function updateCarouselSpacers(carousel) {
    const firstCard = carousel.querySelector('.ch-card');
    const cardW = firstCard ? firstCard.offsetWidth : 210;
    const spacerW = Math.max(0, (carousel.offsetWidth - cardW) / 2);
    const L = document.getElementById('chSpacerL');
    const R = document.getElementById('chSpacerR');
    if (L) L.style.minWidth = spacerW + 'px';
    if (R) R.style.minWidth = spacerW + 'px';
  }

  function snapCarouselToNearest(carousel) {
    const wrapCenter = carousel.scrollLeft + carousel.offsetWidth / 2;
    const cards = [...carousel.querySelectorAll('.ch-card')];
    let nearest = 0, minDist = Infinity;
    cards.forEach((c, i) => {
      const d = Math.abs(c.offsetLeft + c.offsetWidth / 2 - wrapCenter);
      if (d < minDist) { minDist = d; nearest = i; }
    });
    scrollCarouselTo(nearest, true);
    if (nearest !== currentChapterIndex) {
      switchChapter(nearest);
    }
  }

  function scrollCarouselTo(index, smooth = true) {
    const carousel = document.getElementById('chCarousel');
    if (!carousel) return;
    const cards = carousel.querySelectorAll('.ch-card');
    const card = cards[index];
    if (!card) return;
    const target = card.offsetLeft + card.offsetWidth / 2 - carousel.offsetWidth / 2;
    carousel.scrollTo({ left: Math.max(0, target), behavior: smooth ? 'smooth' : 'instant' });
  }

  function scrollTabIntoView(index) { scrollCarouselTo(index); }

  function renderChapterBody(index) {
    const ch = chapters[index];
    const body = document.getElementById('chBody');
    if (!ch || !body) return;
    body.innerHTML = `
      ${ch.title ? `
        <div class="chapter-header">
          <div class="chapter-title">${escapeHtml(ch.title)}</div>
          <div class="chapter-divider"></div>
        </div>` : ''}
      <div class="story-body">${ch.body || '<p style="color:#b8a9c9;">내용이 없어요</p>'}</div>
    `;
  }

  function renderChapterNav() {
    const nav = document.getElementById('chNav');
    if (!nav) return;
    const prev = currentChapterIndex > 0;
    const next = currentChapterIndex < chapters.length - 1;
    const prevCh = prev ? chapters[currentChapterIndex - 1] : null;
    const nextCh = next ? chapters[currentChapterIndex + 1] : null;
    nav.innerHTML = `
      <div class="chapter-nav">
        <button class="nav-btn${!prev ? ' disabled' : ''}" id="prevBtn"${!prev ? ' disabled' : ''}>
          <span class="arrow">←</span>
          <span class="nav-btn-label">
            <span>이전</span>
            ${prevCh ? `<span class="nav-btn-sub">${escapeHtml(prevCh.title || `챕터 ${currentChapterIndex}`)}</span>` : ''}
          </span>
        </button>
        <span class="chapter-position">${currentChapterIndex + 1} / ${chapters.length}</span>
        <button class="nav-btn${!next ? ' disabled' : ''}" id="nextBtn"${!next ? ' disabled' : ''}>
          <span class="nav-btn-label">
            <span>다음</span>
            ${nextCh ? `<span class="nav-btn-sub">${escapeHtml(nextCh.title || `챕터 ${currentChapterIndex + 2}`)}</span>` : ''}
          </span>
          <span class="arrow">→</span>
        </button>
      </div>
    `;
    document.getElementById('prevBtn')?.addEventListener('click', () => {
      if (currentChapterIndex > 0) switchChapter(currentChapterIndex - 1);
    });
    document.getElementById('nextBtn')?.addEventListener('click', () => {
      if (currentChapterIndex < chapters.length - 1) switchChapter(currentChapterIndex + 1);
    });
  }

  function switchChapter(index) {
    if (index === currentChapterIndex) return;
    const body = document.getElementById('chBody');
    body.classList.add('fading');
    setTimeout(() => {
      currentChapterIndex = index;
      renderChapterBody(index);
      body.classList.remove('fading');
      renderChapterNav();
      // 탭 활성화 업데이트
      document.querySelectorAll('.ch-card').forEach((c, i) => {
        c.classList.toggle('active', i === index);
      });
      scrollCarouselTo(index);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 180);
  }

  function scrollTabIntoView(index) {
    const strip = document.getElementById('chTabStrip');
    const tab = strip?.querySelectorAll('.ch-tab')[index];
    tab?.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  }

  // ── 설정 드롭다운 ──
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsDropdown = document.getElementById('settingsDropdown');

  settingsBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = settingsDropdown.classList.contains('open');
    settingsDropdown.classList.toggle('open', !isOpen);
    settingsBtn.classList.toggle('open', !isOpen);
  });

  document.addEventListener('click', () => {
    settingsDropdown.classList.remove('open');
    settingsBtn.classList.remove('open');
  });

  document.getElementById('editItem').addEventListener('click', () => {
    location.href = `story-write.html?pid=${pid}`;
  });

  document.getElementById('deleteItem').addEventListener('click', deleteStory);

  async function deleteStory() {
    if (!(await customConfirm(`"${storyData?.title || '이 글'}"을(를) 삭제할까요?\n챕터와 댓글도 모두 삭제돼요.`))) return;

    try {
      const batch = db.batch();

      // 챕터 삭제
      const chapSnap = await db.collection('chapters').where('storyId', '==', pid).get();
      chapSnap.docs.forEach(doc => batch.delete(doc.ref));

      // 댓글 삭제
      const commentSnap = await db.collection('comments').where('storyId', '==', pid).get();
      commentSnap.docs.forEach(doc => batch.delete(doc.ref));

      // 스토리 삭제
      batch.delete(db.collection('stories').doc(pid));

      await batch.commit();
      showToast('삭제했어요');
      setTimeout(() => { location.href = 'story-list.html'; }, 800);
    } catch (e) {
      console.error('삭제 실패:', e);
      showToast('삭제에 실패했어요');
    }
  }

  // ── 북마크 버튼 ──
  async function loadUserNames() {
    try {
      const doc = await db.collection('data').doc('users').get();
      if (doc.exists && Array.isArray(doc.data().names) && doc.data().names.length) {
        USER_NAMES = doc.data().names;
      }
    } catch (e) {
      console.warn('유저 목록 로드 실패:', e);
    }
  }

  document.getElementById('bookmarkBtn').addEventListener('click', async () => {
    const result = await openStoragePicker({
      title: '저장하기',
      users: USER_NAMES,
      targets: [
        { key: 'readLater', label: '📌 나중에 볼 연성' },
        { key: 'storyBox', label: '📚 연성 보관함' }
      ]
    });
    if (!result) return;

    const targetLabel = result.target === 'readLater' ? '나중에 볼 연성' : '연성 보관함';
    try {
      const ref = db.collection('users').doc(result.user).collection(result.target);
      const dup = await ref.where('storyId', '==', pid).limit(1).get();
      if (!dup.empty) {
        showToast('이미 저장되어 있어요');
        return;
      }
      await ref.add({
        storyId: pid,
        title: storyData.title,
        addedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(`${result.user}님의 ${targetLabel}에 저장했어요`);
    } catch (e) {
      console.error('저장 실패:', e);
      showToast('저장에 실패했어요');
    }
  });

  // ── 댓글 ──
  function currentChapter() {
    return chapters[currentChapterIndex] || null;
  }

  function chapterLabel(chapterPid) {
    const idx = chapters.findIndex(c => c.chapterPid === chapterPid);
    if (idx === -1) return '';
    const ch = chapters[idx];
    return ch.title ? `${idx + 1}화 · ${ch.title}` : `${idx + 1}화`;
  }

  async function loadComments() {
    try {
      const snap = await db.collection('comments').where('storyId', '==', pid).get();
      comments = snap.docs.map(doc => ({
        id: doc.id,
        body: doc.data().body || '',
        chapterPid: doc.data().chapterPid || '',
        createdAt: doc.data().createdAt
      })).sort((a, b) => {
        const at = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
        const bt = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
        return bt - at;
      });
      renderComments();
    } catch (e) {
      console.error('댓글 로드 실패:', e);
    }
  }

  function renderComments() {
    const list = document.getElementById('commentList');
    if (comments.length === 0) {
      list.innerHTML = '<div class="comment-empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const dateStr = c.createdAt?.toDate ? formatCommentDate(c.createdAt.toDate()) : '';
      const chapterTag = chapters.length > 1 ? chapterLabel(c.chapterPid) : '';
      return `
        <div class="comment-item">
          <button class="comment-delete-btn" data-id="${c.id}" title="댓글 삭제" aria-label="댓글 삭제">✕</button>
          ${chapterTag ? `<span class="comment-chapter-tag">${escapeHtml(chapterTag)}</span>` : ''}
          <div class="comment-body">${escapeHtml(c.body)}</div>
          ${dateStr ? `<div class="comment-date">${dateStr}</div>` : ''}
        </div>
      `;
    }).join('');

    list.querySelectorAll('.comment-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteComment(btn.dataset.id));
    });
  }

  async function deleteComment(commentId) {
    if (!(await customConfirm('이 댓글을 삭제할까요?'))) return;
    try {
      const batch = db.batch();
      batch.delete(db.collection('comments').doc(commentId));
      batch.update(db.collection('stories').doc(pid), {
        commentCount: firebase.firestore.FieldValue.increment(-1)
      });
      await batch.commit();

      await loadComments();
      showToast('댓글을 삭제했어요');
    } catch (e) {
      console.error('댓글 삭제 실패:', e);
      showToast('댓글 삭제에 실패했어요');
    }
  }

  async function submitComment() {
    const ch = currentChapter();
    if (!ch) return;

    const input = document.getElementById('commentInput');
    const body = input.value.trim();
    if (!body) return;

    const btn = document.getElementById('commentSubmitBtn');
    btn.disabled = true;
    try {
      const commentRef = db.collection('comments').doc();
      const batch = db.batch();
      batch.set(commentRef, {
        storyId: pid,
        chapterPid: ch.chapterPid,
        body,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      batch.update(db.collection('stories').doc(pid), {
        commentCount: firebase.firestore.FieldValue.increment(1)
      });
      await batch.commit();

      input.value = '';
      await loadComments();
      showToast('댓글이 등록되었어요');
    } catch (e) {
      console.error('댓글 등록 실패:', e);
      showToast('댓글 등록에 실패했어요');
    } finally {
      btn.disabled = false;
    }
  }

  function openCommentPanel() {
    document.getElementById('commentPanel').classList.add('open');
    document.getElementById('commentOverlay').classList.add('open');
    document.getElementById('commentToggleBtn').classList.add('active');
  }

  function closeCommentPanel() {
    document.getElementById('commentPanel').classList.remove('open');
    document.getElementById('commentOverlay').classList.remove('open');
    document.getElementById('commentToggleBtn').classList.remove('active');
  }

  document.getElementById('commentToggleBtn').addEventListener('click', () => {
    const isOpen = document.getElementById('commentPanel').classList.contains('open');
    isOpen ? closeCommentPanel() : openCommentPanel();
  });
  document.getElementById('commentPanelClose').addEventListener('click', closeCommentPanel);
  document.getElementById('commentOverlay').addEventListener('click', closeCommentPanel);
  document.getElementById('commentSubmitBtn').addEventListener('click', submitComment);

  // ── 토스트 ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── 유틸 ──
  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}.${m}.${d}`;
  }

  function formatCommentDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${d} ${hh}:${mm}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── 키보드 네비게이션 ──
  document.addEventListener('keydown', (e) => {
    if (chapters.length <= 1) return;
    if (e.key === 'ArrowLeft' && currentChapterIndex > 0) {
      currentChapterIndex--;
      renderStory();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else if (e.key === 'ArrowRight' && currentChapterIndex < chapters.length - 1) {
      currentChapterIndex++;
      renderStory();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  // ── 폰트 선택 ──
  const FONT_MAP = {
    'Noto Sans KR':      "'Noto Sans KR', sans-serif",
    'Nanum Gothic':      "'Nanum Gothic', sans-serif",
    'Nanum Myeongjo':    "'Nanum Myeongjo', serif",
    'RIDIBatang':        "'RIDIBatang', serif",
    'ChosunCentennial':  "'ChosunCentennial', serif",
    'GowunDodum':        "'GowunDodum', sans-serif"
  };

  function applyStoryFont(name) {
    document.documentElement.style.setProperty('--story-font', FONT_MAP[name] || FONT_MAP['Noto Sans KR']);
    document.querySelectorAll('.font-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.font === name);
    });
  }

  const savedFont = localStorage.getItem('storyFont') || 'Noto Sans KR';
  applyStoryFont(savedFont);

  document.querySelectorAll('.font-option').forEach(el => {
    el.addEventListener('click', () => {
      localStorage.setItem('storyFont', el.dataset.font);
      applyStoryFont(el.dataset.font);
      document.getElementById('fontPanel').classList.remove('open');
      document.getElementById('fontPickerBtn').classList.remove('active');
    });
  });

  document.getElementById('fontPickerBtn').addEventListener('click', e => {
    e.stopPropagation();
    const panel = document.getElementById('fontPanel');
    const btn = document.getElementById('fontPickerBtn');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
  });

  document.addEventListener('click', () => {
    document.getElementById('fontPanel').classList.remove('open');
    document.getElementById('fontPickerBtn').classList.remove('active');
  });

  // ── 초기화 ──
  if (pid) loadStory();
</script>
</body>
</html>
