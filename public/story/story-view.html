<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 글 읽기</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  @font-face {
    font-family: 'ChosunCentennial';
    src: url('../fonts/ChosunCentennial.otf') format('opentype');
  }
  @font-face {
    font-family: 'GowunDodum';
    src: url('../fonts/GowunDodum.ttf') format('truetype');
  }
  @font-face {
    font-family: 'RIDIBatang';
    src: url('../fonts/RIDI-Batang.otf') format('opentype');
  }
  :root { --story-font: 'Noto Sans KR', sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  /* ── 상단 바 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface-glass-strong);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,169,201,0.15);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-bar-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .toc-toggle-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .toc-toggle-btn:hover { background: rgba(184,169,201,0.15); }
  .toc-toggle-btn.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  .edit-btn {
    padding: 0.4rem 0.9rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    color: #7a6a8a;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .edit-btn:hover {
    background: rgba(184,169,201,0.15);
    border-color: rgba(184,169,201,0.5);
  }

  .delete-btn {
    padding: 0.4rem 0.9rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(194,114,127,0.3);
    border-radius: 8px;
    color: #b06070;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .delete-btn:hover {
    background: rgba(194,114,127,0.1);
    border-color: rgba(194,114,127,0.5);
  }

  /* ── 좌측 목차 사이드바 ── */
  .toc-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 150;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }
  .toc-overlay.open { opacity: 1; visibility: visible; }

  .toc-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: 280px;
    max-width: 80vw;
    background: rgba(245,240,232,0.97);
    backdrop-filter: blur(16px);
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 24px rgba(90,74,107,0.1);
  }
  .toc-sidebar.open { transform: translateX(0); }

  .toc-header {
    padding: 1.2rem 1rem;
    border-bottom: 1px solid rgba(184,169,201,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toc-header h3 {
    font-family: 'ko-font', sans-serif;
    font-size: 0.95rem;
    color: #5a4a6b;
    font-weight: 700;
  }

  .toc-close {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #8a7a9a;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .toc-close:hover { background: rgba(184,169,201,0.15); }

  .toc-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0;
  }

  .toc-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .toc-item:hover {
    background: rgba(184,169,201,0.08);
  }
  .toc-item.active {
    background: rgba(184,169,201,0.12);
    border-left-color: #b8a9c9;
  }

  .toc-num {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(184,169,201,0.2);
    color: #7a6a8a;
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-weight: 500;
  }
  .toc-item.active .toc-num {
    background: #b8a9c9;
    color: white;
  }

  .toc-item-title {
    font-size: 0.82rem;
    color: #5a4a6b;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── 메인 콘텐츠 ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
  }

  /* ── 글 헤더 ── */
  .story-header {
    text-align: center;
    margin-bottom: 2rem;
    animation: fadeIn 0.5s ease;
  }

  .story-title {
    font-family: 'ko-font', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: #4a3a5b;
    line-height: 1.4;
    margin-bottom: 0.8rem;
  }

  .story-meta-info {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
    flex-wrap: wrap;
    margin-bottom: 0.6rem;
  }

  .meta-date {
    font-size: 0.75rem;
    color: #a99ab8;
  }

  .meta-chapters {
    font-size: 0.75rem;
    color: #a99ab8;
  }

  .story-char-tags {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.3rem;
  }

  .char-tag-view {
    padding: 0.2rem 0.6rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 12px;
    font-size: 0.7rem;
  }

  .char-tag-view.rating-tag-view {
    background: rgba(194,114,127,0.18);
    color: #b06070;
    font-weight: 700;
  }

  .tag-sep {
    font-size: 0.7rem;
    color: #c8b8d8;
    padding: 0 0.1rem;
  }

  .header-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c8b8d8, transparent);
    margin: 1.2rem auto 0;
  }

  /* ── 챕터 헤더 ── */
  .chapter-header {
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.4s ease;
  }

  .chapter-indicator {
    font-size: 0.7rem;
    color: #b8a9c9;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.3rem;
  }

  .chapter-title {
    font-family: 'ko-font', sans-serif;
    font-size: 1.15rem;
    color: #5a4a6b;
    font-weight: 700;
  }

  .chapter-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4c8e0, transparent);
    margin: 0.8rem auto 0;
  }

  /* ── 본문 ── */
  .story-body {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.15);
    border-radius: 12px;
    padding: 1.5rem 1.5rem;
    font-family: var(--story-font);
    font-size: 0.92rem;
    line-height: 1.9;
    color: #3a2a4b;
    animation: fadeIn 0.5s ease 0.1s both;
    min-height: 200px;
  }

  .story-body h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.15rem;
    color: #5a4a6b;
    margin: 1.2rem 0 0.5rem;
  }

  .story-body h3 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1rem;
    color: #6a5a7a;
    margin: 1rem 0 0.4rem;
  }

  .story-body blockquote {
    border-left: 3px solid #d4c8e0;
    padding-left: 0.8rem;
    margin: 0.6rem 0;
    color: #7a6a8a;
    font-style: italic;
  }

  .story-body hr {
    border: none;
    height: 1px;
    background: linear-gradient(90deg, transparent 10%, #d4c8e0 50%, transparent 90%);
    margin: 1.5rem 0;
  }

  .story-body p {
    margin-bottom: 0.6rem;
  }

  /* ── 챕터 네비게이션 ── */
  .chapter-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
    padding-top: 1.2rem;
    border-top: 1px solid rgba(184,169,201,0.15);
    animation: fadeIn 0.5s ease 0.2s both;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.55rem 1rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 8px;
    color: #7a6a8a;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
    text-decoration: none;
  }
  .nav-btn:hover {
    background: rgba(184,169,201,0.12);
    border-color: rgba(184,169,201,0.4);
    transform: translateY(-1px);
  }
  .nav-btn:disabled, .nav-btn.disabled {
    opacity: 0.3;
    cursor: default;
    pointer-events: none;
  }

  .nav-btn .arrow { font-size: 0.9rem; }

  .nav-btn-label {
    display: flex;
    flex-direction: column;
  }
  .nav-btn-sub {
    font-size: 0.65rem;
    color: #a99ab8;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chapter-position {
    font-size: 0.72rem;
    color: #a99ab8;
  }

  /* ── 로딩 ── */
  .loading {
    text-align: center;
    padding: 4rem 1rem;
    color: #a99ab8;
    font-size: 0.85rem;
  }

  .loading .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── 에러 ── */
  .error-state {
    text-align: center;
    padding: 4rem 1rem;
    color: #a99ab8;
  }
  .error-state .icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.5; }
  .error-state p { font-size: 0.85rem; line-height: 1.6; }
  .error-state a {
    color: #b8a9c9;
    text-decoration: underline;
    font-size: 0.8rem;
  }

  /* ── 폰트 선택 ── */
  .font-picker-wrap { position: relative; }

  .font-picker-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: 'ko-font', sans-serif;
  }
  .font-picker-btn:hover { background: rgba(184,169,201,0.15); }
  .font-picker-btn.active { background: #b8a9c9; color: white; border-color: #b8a9c9; }

  .font-panel {
    position: absolute;
    top: calc(100% + 0.4rem);
    right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(90,74,107,0.14);
    padding: 0.4rem;
    min-width: 170px;
    display: none;
    z-index: 300;
  }
  .font-panel.open { display: block; }

  .font-option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    color: #4a3a5b;
    font-size: 0.92rem;
    line-height: 1;
  }
  .font-option:hover { background: rgba(184,169,201,0.12); }
  .font-option.selected { background: rgba(184,169,201,0.2); }
  .font-option .check { font-size: 0.7rem; color: #b8a9c9; opacity: 0; }
  .font-option.selected .check { opacity: 1; }

  /* ── 댓글 버튼 ── */
  .comment-toggle-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .comment-toggle-btn:hover { background: rgba(184,169,201,0.15); }
  .comment-toggle-btn.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  .bookmark-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .bookmark-btn:hover { background: rgba(184,169,201,0.15); }

  /* ── 댓글 패널 ── */
  .comment-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 150;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }
  .comment-overlay.open { opacity: 1; visibility: visible; }

  .comment-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 340px;
    max-width: 88vw;
    background: rgba(245,240,232,0.97);
    backdrop-filter: blur(16px);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 24px rgba(90,74,107,0.1);
  }
  .comment-panel.open { transform: translateX(0); }

  .comment-panel-header {
    padding: 1.2rem 1rem;
    border-bottom: 1px solid rgba(184,169,201,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .comment-panel-header h3 {
    font-family: 'ko-font', sans-serif;
    font-size: 0.95rem;
    color: #5a4a6b;
    font-weight: 700;
  }

  .comment-panel-close {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #8a7a9a;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .comment-panel-close:hover { background: rgba(184,169,201,0.15); }

  .comment-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.4rem 1rem;
  }

  .comment-item {
    position: relative;
    padding: 0.8rem 1.7rem 0.8rem 0;
    border-bottom: 1px solid rgba(184,169,201,0.1);
  }
  .comment-item:last-child { border-bottom: none; }

  .comment-delete-btn {
    position: absolute;
    top: 0.7rem;
    right: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #c8b8d8;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .comment-delete-btn:hover {
    background: rgba(184,169,201,0.18);
    color: #8a6a9a;
  }

  .comment-chapter-tag {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    margin-bottom: 0.35rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 8px;
    font-size: 0.65rem;
  }

  .comment-body {
    font-size: 0.85rem;
    color: #4a3a5b;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .comment-date {
    font-size: 0.68rem;
    color: #a99ab8;
    margin-top: 0.3rem;
  }

  .comment-empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: #a99ab8;
    font-size: 0.8rem;
  }

  .comment-form {
    padding: 0.9rem 1rem;
    border-top: 1px solid rgba(184,169,201,0.15);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .comment-input {
    width: 100%;
    resize: vertical;
    min-height: 56px;
    padding: 0.6rem 0.7rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
    color: #4a3a5b;
    font-size: 0.82rem;
    font-family: 'ko-font', sans-serif;
    line-height: 1.5;
  }
  .comment-input:focus {
    outline: none;
    border-color: #b8a9c9;
  }

  .comment-submit-btn {
    align-self: flex-end;
    padding: 0.45rem 1.1rem;
    background: #b8a9c9;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .comment-submit-btn:hover { background: #a594b8; }
  .comment-submit-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,107,0.9);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 400;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── 애니메이션 ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .container { padding: 1.2rem 0.8rem 3rem; }
    .story-title { font-size: 1.3rem; }
    .story-body { padding: 1rem; font-size: 0.88rem; }
    .nav-btn-sub { display: none; }
    .toc-sidebar { width: 260px; }
    .comment-panel { width: 300px; }
  }
</style>
</head>
<body>

<!-- 실시간 연결 표시 -->
<div class="sync-badge" id="syncBadge"><span class="dot"></span>실시간 연결됨</div>

<!-- 상단 바 -->
<div class="top-bar">
  <a href="story-list.html" class="nav-link">← 목록</a>
  <div class="top-bar-actions">
    <div class="font-picker-wrap">
      <button class="font-picker-btn" id="fontPickerBtn" title="폰트 설정">가</button>
      <div class="font-panel" id="fontPanel">
        <div class="font-option" data-font="Noto Sans KR" style="font-family:'Noto Sans KR',sans-serif">Noto Sans KR <span class="check">✓</span></div>
        <div class="font-option" data-font="Nanum Gothic" style="font-family:'Nanum Gothic',sans-serif">나눔고딕 <span class="check">✓</span></div>
        <div class="font-option" data-font="Nanum Myeongjo" style="font-family:'Nanum Myeongjo',serif">나눔명조 <span class="check">✓</span></div>
        <div class="font-option" data-font="RIDIBatang" style="font-family:'RIDIBatang',serif">RIDI바탕 <span class="check">✓</span></div>
        <div class="font-option" data-font="ChosunCentennial" style="font-family:'ChosunCentennial',serif">조선센테니얼 <span class="check">✓</span></div>
        <div class="font-option" data-font="GowunDodum" style="font-family:'GowunDodum',sans-serif">고운돋움 <span class="check">✓</span></div>
      </div>
    </div>
    <button class="bookmark-btn" id="bookmarkBtn" title="저장" style="display:none;">🔖</button>
    <button class="comment-toggle-btn" id="commentToggleBtn" title="댓글" style="display:none;">💬</button>
    <button class="toc-toggle-btn" id="tocToggleBtn" title="목차" style="display:none;">☰</button>
    <button class="delete-btn" id="deleteBtn" style="display:none;">삭제</button>
    <button class="edit-btn" id="editBtn" style="display:none;">수정</button>
  </div>
</div>

<!-- 좌측 목차 사이드바 -->
<div class="toc-overlay" id="tocOverlay"></div>
<div class="toc-sidebar" id="tocSidebar">
  <div class="toc-header">
    <h3>목차</h3>
    <button class="toc-close" id="tocClose">✕</button>
  </div>
  <div class="toc-list" id="tocList"></div>
</div>

<!-- 댓글 패널 -->
<div class="comment-overlay" id="commentOverlay"></div>
<div class="comment-panel" id="commentPanel">
  <div class="comment-panel-header">
    <h3>댓글</h3>
    <button class="comment-panel-close" id="commentPanelClose">✕</button>
  </div>
  <div class="comment-list" id="commentList"></div>
  <div class="comment-form">
    <textarea class="comment-input" id="commentInput" placeholder="댓글을 남겨보세요" rows="2" maxlength="500"></textarea>
    <button class="comment-submit-btn" id="commentSubmitBtn">등록</button>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 메인 콘텐츠 -->
<div class="container" id="mainContainer">
  <div class="loading" id="loadingState">
    불러오는 중<span class="dots"></span>
  </div>
</div>

<script src="../assets/personal-nav.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../assets/confirm-modal.js"></script>
<script src="../assets/storage-modal.js"></script>
<script>
  // ★ firebaseConfig는 기존 프로젝트 파일에서 복사
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── URL 파라미터 ──
  const params = new URLSearchParams(location.search);
  const pid = params.get('pid');

  if (!pid) {
    document.getElementById('mainContainer').innerHTML =
      '<div class="error-state"><div class="icon">⚠</div><p>잘못된 접근이에요</p><a href="story-list.html">목록으로 돌아가기</a></div>';
  }

  // ── 상태 ──
  let storyData = null;
  let chapters = [];
  let currentChapterIndex = 0;
  let comments = [];
  let USER_NAMES = ['김굥', '하지', '예밍'];

  function setSyncStatus(online) {
    const badge = document.getElementById('syncBadge');
    if (online) {
      badge.classList.remove('offline');
      badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
    } else {
      badge.classList.add('offline');
      badge.innerHTML = '<span class="dot"></span>오프라인';
    }
  }

  // ── 로드 ──
  async function loadStory() {
    try {
      // 스토리 메타
      const storyDoc = await db.collection('stories').doc(pid).get();
      if (!storyDoc.exists) {
        document.getElementById('mainContainer').innerHTML =
          '<div class="error-state"><div class="icon">📭</div><p>존재하지 않는 글이에요</p><a href="story-list.html">목록으로 돌아가기</a></div>';
        return;
      }

      storyData = storyDoc.data();

      // 챕터 로드 (복합 인덱스 없이 JS 정렬)
      const chapSnap = await db.collection('chapters')
        .where('storyId', '==', pid)
        .get();

      chapters = chapSnap.docs.map(doc => ({
        chapterPid: doc.id,
        title: doc.data().title || '',
        body: doc.data().body || '',
        order: doc.data().order ?? 0
      })).sort((a, b) => a.order - b.order);

      // 수정/삭제 버튼 표시
      document.getElementById('editBtn').style.display = 'block';
      document.getElementById('deleteBtn').style.display = 'block';

      // 북마크 버튼 표시
      document.getElementById('bookmarkBtn').style.display = 'flex';
      loadUserNames();

      // 댓글 버튼 표시
      document.getElementById('commentToggleBtn').style.display = 'flex';
      loadComments();

      // 목차 버튼 (챕터 2개 이상일 때)
      if (chapters.length > 1) {
        document.getElementById('tocToggleBtn').style.display = 'flex';
        renderToc();
      }

      renderStory();
      setSyncStatus(true);

    } catch (e) {
      console.error('로드 실패:', e);
      document.getElementById('mainContainer').innerHTML =
        '<div class="error-state"><div class="icon">⚠</div><p>글을 불러오지 못했어요</p><a href="story-list.html">목록으로 돌아가기</a></div>';
      setSyncStatus(false);
    }
  }

  // ── 렌더링 ──
  function renderStory() {
    const container = document.getElementById('mainContainer');
    const dateStr = storyData.createdAt?.toDate ? formatDate(storyData.createdAt.toDate()) : '';
    const tagGroups = [
      storyData.characters || [],
      storyData.roles || [],
      storyData.aus || []
    ].filter(g => g.length > 0);
    const charTagsHtml = tagGroups
      .map(g => g.map(c => `<span class="char-tag-view">${escapeHtml(c)}</span>`).join(''))
      .join('<span class="tag-sep">|</span>');

    let html = `
      <div class="story-header">
        <div class="story-title">${escapeHtml(storyData.title)}</div>
        <div class="story-meta-info">
          ${dateStr ? `<span class="meta-date">${dateStr}</span>` : ''}
          ${chapters.length > 1 ? `<span class="meta-chapters">${chapters.length}챕터</span>` : ''}
          ${storyData.rating ? `<span class="char-tag-view rating-tag-view">${escapeHtml(storyData.rating)}</span>` : ''}
        </div>
        ${charTagsHtml ? `<div class="story-char-tags">${charTagsHtml}</div>` : ''}
        <div class="header-divider"></div>
      </div>
    `;

    html += renderChapter(currentChapterIndex);

    // 챕터 네비게이션 (다중 챕터일 때)
    if (chapters.length > 1) {
      html += renderChapterNav();
    }

    container.innerHTML = html;
    bindNavEvents();
    updateTocActive();
  }

  function renderChapter(index) {
    const ch = chapters[index];
    if (!ch) return '';

    let html = '';

    // 챕터 헤더 (다중 챕터일 때)
    if (chapters.length > 1) {
      html += `
        <div class="chapter-header">
          <div class="chapter-indicator">Chapter ${index + 1}</div>
          ${ch.title ? `<div class="chapter-title">${escapeHtml(ch.title)}</div>` : ''}
          <div class="chapter-divider"></div>
        </div>
      `;
    }

    // 본문
    html += `<div class="story-body">${ch.body || '<p style="color:#b8a9c9;">내용이 없어요</p>'}</div>`;

    return html;
  }

  function renderChapterNav() {
    const prev = currentChapterIndex > 0 ? chapters[currentChapterIndex - 1] : null;
    const next = currentChapterIndex < chapters.length - 1 ? chapters[currentChapterIndex + 1] : null;

    return `
      <div class="chapter-nav">
        <button class="nav-btn ${!prev ? 'disabled' : ''}" id="prevBtn" ${!prev ? 'disabled' : ''}>
          <span class="arrow">←</span>
          <span class="nav-btn-label">
            <span>이전</span>
            ${prev ? `<span class="nav-btn-sub">${escapeHtml(prev.title || `챕터 ${currentChapterIndex}`)}</span>` : ''}
          </span>
        </button>
        <span class="chapter-position">${currentChapterIndex + 1} / ${chapters.length}</span>
        <button class="nav-btn ${!next ? 'disabled' : ''}" id="nextBtn" ${!next ? 'disabled' : ''}>
          <span class="nav-btn-label">
            <span>다음</span>
            ${next ? `<span class="nav-btn-sub">${escapeHtml(next.title || `챕터 ${currentChapterIndex + 2}`)}</span>` : ''}
          </span>
          <span class="arrow">→</span>
        </button>
      </div>
    `;
  }

  function bindNavEvents() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    if (prevBtn && !prevBtn.disabled) {
      prevBtn.addEventListener('click', () => {
        currentChapterIndex--;
        renderStory();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
    if (nextBtn && !nextBtn.disabled) {
      nextBtn.addEventListener('click', () => {
        currentChapterIndex++;
        renderStory();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  }

  // ── 목차 사이드바 ──
  function renderToc() {
    const list = document.getElementById('tocList');
    list.innerHTML = chapters.map((ch, i) => `
      <div class="toc-item${i === currentChapterIndex ? ' active' : ''}" data-index="${i}">
        <span class="toc-num">${i + 1}</span>
        <span class="toc-item-title">${escapeHtml(ch.title || `챕터 ${i + 1}`)}</span>
      </div>
    `).join('');

    list.querySelectorAll('.toc-item').forEach(item => {
      item.addEventListener('click', () => {
        currentChapterIndex = parseInt(item.dataset.index);
        closeToc();
        renderStory();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  function updateTocActive() {
    document.querySelectorAll('.toc-item').forEach((item, i) => {
      item.classList.toggle('active', i === currentChapterIndex);
    });
  }

  function openToc() {
    document.getElementById('tocSidebar').classList.add('open');
    document.getElementById('tocOverlay').classList.add('open');
    document.getElementById('tocToggleBtn').classList.add('active');
    updateTocActive();
  }

  function closeToc() {
    document.getElementById('tocSidebar').classList.remove('open');
    document.getElementById('tocOverlay').classList.remove('open');
    document.getElementById('tocToggleBtn').classList.remove('active');
  }

  document.getElementById('tocToggleBtn').addEventListener('click', () => {
    const isOpen = document.getElementById('tocSidebar').classList.contains('open');
    isOpen ? closeToc() : openToc();
  });

  document.getElementById('tocClose').addEventListener('click', closeToc);
  document.getElementById('tocOverlay').addEventListener('click', closeToc);

  // ── 수정 버튼 ──
  document.getElementById('editBtn').addEventListener('click', () => {
    location.href = `story-write.html?pid=${pid}`;
  });

  // ── 삭제 버튼 ──
  document.getElementById('deleteBtn').addEventListener('click', deleteStory);

  async function deleteStory() {
    if (!(await customConfirm(`"${storyData?.title || '이 글'}"을(를) 삭제할까요?\n챕터와 댓글도 모두 삭제돼요.`))) return;

    try {
      const batch = db.batch();

      // 챕터 삭제
      const chapSnap = await db.collection('chapters').where('storyId', '==', pid).get();
      chapSnap.docs.forEach(doc => batch.delete(doc.ref));

      // 댓글 삭제
      const commentSnap = await db.collection('comments').where('storyId', '==', pid).get();
      commentSnap.docs.forEach(doc => batch.delete(doc.ref));

      // 스토리 삭제
      batch.delete(db.collection('stories').doc(pid));

      await batch.commit();
      showToast('삭제했어요');
      setTimeout(() => { location.href = 'story-list.html'; }, 800);
    } catch (e) {
      console.error('삭제 실패:', e);
      showToast('삭제에 실패했어요');
    }
  }

  // ── 북마크 버튼 ──
  async function loadUserNames() {
    try {
      const doc = await db.collection('data').doc('users').get();
      if (doc.exists && Array.isArray(doc.data().names) && doc.data().names.length) {
        USER_NAMES = doc.data().names;
      }
    } catch (e) {
      console.warn('유저 목록 로드 실패:', e);
    }
  }

  document.getElementById('bookmarkBtn').addEventListener('click', async () => {
    const result = await openStoragePicker({
      title: '저장하기',
      users: USER_NAMES,
      targets: [
        { key: 'readLater', label: '📌 나중에 볼 연성' },
        { key: 'storyBox', label: '📚 연성 보관함' }
      ]
    });
    if (!result) return;

    const targetLabel = result.target === 'readLater' ? '나중에 볼 연성' : '연성 보관함';
    try {
      const ref = db.collection('users').doc(result.user).collection(result.target);
      const dup = await ref.where('storyId', '==', pid).limit(1).get();
      if (!dup.empty) {
        showToast('이미 저장되어 있어요');
        return;
      }
      await ref.add({
        storyId: pid,
        title: storyData.title,
        addedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(`${result.user}님의 ${targetLabel}에 저장했어요`);
    } catch (e) {
      console.error('저장 실패:', e);
      showToast('저장에 실패했어요');
    }
  });

  // ── 댓글 ──
  function currentChapter() {
    return chapters[currentChapterIndex] || null;
  }

  function chapterLabel(chapterPid) {
    const idx = chapters.findIndex(c => c.chapterPid === chapterPid);
    if (idx === -1) return '';
    const ch = chapters[idx];
    return ch.title ? `${idx + 1}화 · ${ch.title}` : `${idx + 1}화`;
  }

  async function loadComments() {
    try {
      const snap = await db.collection('comments').where('storyId', '==', pid).get();
      comments = snap.docs.map(doc => ({
        id: doc.id,
        body: doc.data().body || '',
        chapterPid: doc.data().chapterPid || '',
        createdAt: doc.data().createdAt
      })).sort((a, b) => {
        const at = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
        const bt = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
        return bt - at;
      });
      renderComments();
    } catch (e) {
      console.error('댓글 로드 실패:', e);
    }
  }

  function renderComments() {
    const list = document.getElementById('commentList');
    if (comments.length === 0) {
      list.innerHTML = '<div class="comment-empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const dateStr = c.createdAt?.toDate ? formatCommentDate(c.createdAt.toDate()) : '';
      const chapterTag = chapters.length > 1 ? chapterLabel(c.chapterPid) : '';
      return `
        <div class="comment-item">
          <button class="comment-delete-btn" data-id="${c.id}" title="댓글 삭제" aria-label="댓글 삭제">✕</button>
          ${chapterTag ? `<span class="comment-chapter-tag">${escapeHtml(chapterTag)}</span>` : ''}
          <div class="comment-body">${escapeHtml(c.body)}</div>
          ${dateStr ? `<div class="comment-date">${dateStr}</div>` : ''}
        </div>
      `;
    }).join('');

    list.querySelectorAll('.comment-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteComment(btn.dataset.id));
    });
  }

  async function deleteComment(commentId) {
    if (!(await customConfirm('이 댓글을 삭제할까요?'))) return;
    try {
      const batch = db.batch();
      batch.delete(db.collection('comments').doc(commentId));
      batch.update(db.collection('stories').doc(pid), {
        commentCount: firebase.firestore.FieldValue.increment(-1)
      });
      await batch.commit();

      await loadComments();
      showToast('댓글을 삭제했어요');
    } catch (e) {
      console.error('댓글 삭제 실패:', e);
      showToast('댓글 삭제에 실패했어요');
    }
  }

  async function submitComment() {
    const ch = currentChapter();
    if (!ch) return;

    const input = document.getElementById('commentInput');
    const body = input.value.trim();
    if (!body) return;

    const btn = document.getElementById('commentSubmitBtn');
    btn.disabled = true;
    try {
      const commentRef = db.collection('comments').doc();
      const batch = db.batch();
      batch.set(commentRef, {
        storyId: pid,
        chapterPid: ch.chapterPid,
        body,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      batch.update(db.collection('stories').doc(pid), {
        commentCount: firebase.firestore.FieldValue.increment(1)
      });
      await batch.commit();

      input.value = '';
      await loadComments();
      showToast('댓글이 등록되었어요');
    } catch (e) {
      console.error('댓글 등록 실패:', e);
      showToast('댓글 등록에 실패했어요');
    } finally {
      btn.disabled = false;
    }
  }

  function openCommentPanel() {
    document.getElementById('commentPanel').classList.add('open');
    document.getElementById('commentOverlay').classList.add('open');
    document.getElementById('commentToggleBtn').classList.add('active');
  }

  function closeCommentPanel() {
    document.getElementById('commentPanel').classList.remove('open');
    document.getElementById('commentOverlay').classList.remove('open');
    document.getElementById('commentToggleBtn').classList.remove('active');
  }

  document.getElementById('commentToggleBtn').addEventListener('click', () => {
    const isOpen = document.getElementById('commentPanel').classList.contains('open');
    isOpen ? closeCommentPanel() : openCommentPanel();
  });
  document.getElementById('commentPanelClose').addEventListener('click', closeCommentPanel);
  document.getElementById('commentOverlay').addEventListener('click', closeCommentPanel);
  document.getElementById('commentSubmitBtn').addEventListener('click', submitComment);

  // ── 토스트 ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── 유틸 ──
  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}.${m}.${d}`;
  }

  function formatCommentDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${d} ${hh}:${mm}`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ── 키보드 네비게이션 ──
  document.addEventListener('keydown', (e) => {
    if (chapters.length <= 1) return;
    if (e.key === 'ArrowLeft' && currentChapterIndex > 0) {
      currentChapterIndex--;
      renderStory();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else if (e.key === 'ArrowRight' && currentChapterIndex < chapters.length - 1) {
      currentChapterIndex++;
      renderStory();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  });

  // ── 폰트 선택 ──
  const FONT_MAP = {
    'Noto Sans KR':      "'Noto Sans KR', sans-serif",
    'Nanum Gothic':      "'Nanum Gothic', sans-serif",
    'Nanum Myeongjo':    "'Nanum Myeongjo', serif",
    'RIDIBatang':        "'RIDIBatang', serif",
    'ChosunCentennial':  "'ChosunCentennial', serif",
    'GowunDodum':        "'GowunDodum', sans-serif"
  };

  function applyStoryFont(name) {
    document.documentElement.style.setProperty('--story-font', FONT_MAP[name] || FONT_MAP['Noto Sans KR']);
    document.querySelectorAll('.font-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.font === name);
    });
  }

  const savedFont = localStorage.getItem('storyFont') || 'Noto Sans KR';
  applyStoryFont(savedFont);

  document.querySelectorAll('.font-option').forEach(el => {
    el.addEventListener('click', () => {
      localStorage.setItem('storyFont', el.dataset.font);
      applyStoryFont(el.dataset.font);
      document.getElementById('fontPanel').classList.remove('open');
      document.getElementById('fontPickerBtn').classList.remove('active');
    });
  });

  document.getElementById('fontPickerBtn').addEventListener('click', e => {
    e.stopPropagation();
    const panel = document.getElementById('fontPanel');
    const btn = document.getElementById('fontPickerBtn');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('active', isOpen);
  });

  document.addEventListener('click', () => {
    document.getElementById('fontPanel').classList.remove('open');
    document.getElementById('fontPickerBtn').classList.remove('active');
  });

  // ── 초기화 ──
  if (pid) loadStory();
</script>
</body>
</html>
