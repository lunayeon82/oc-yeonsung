<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 그림 목록</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a89ec4">
<link rel="apple-touch-icon" href="/assets/icon/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="/assets/pwa.js" defer></script>
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 1.2rem 3rem;
  }

  /* ── 필터 영역 ── */
  .filter-area {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 12px rgba(90,74,107,0.06);
  }
  .filter-section { margin-bottom: 0.8rem; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }
  .filter-label {
    font-size: 0.75rem;
    color: #8a7a9a;
    font-weight: 500;
  }
  .clear-filter {
    font-size: 0.7rem;
    color: #9a8aaa;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    font-family: 'ko-font', sans-serif;
  }
  .clear-filter:hover { color: #5a4a6b; }
  .char-mode-toggle {
    display: flex;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
  }
  .mode-btn {
    padding: 0.2rem 0.65rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 20px;
    font-size: 0.68rem;
    color: #8a7a9a;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: #b8a9c9; }
  .mode-btn.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }
  .char-filter-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }
  .char-filter-row {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .char-owner-label {
    font-size: 0.7rem;
    color: #a99ab8;
    white-space: nowrap;
    padding-top: 0.25rem;
    min-width: 3.5rem;
  }
  .char-tag-group,
  .tag-filter-group {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .char-tag {
    padding: 0.3rem 0.7rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 20px;
    font-size: 0.75rem;
    color: #7a6a8a;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .char-tag:hover {
    border-color: #b8a9c9;
    background: rgba(184,169,201,0.1);
  }
  .char-tag.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  /* ── 그림 목록 (row card) ── */
  .image-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .image-card {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    animation: fadeUp 0.4s ease both;
  }
  .image-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(90,74,107,0.1);
    border-color: rgba(184,169,201,0.4);
  }
  .image-card-main {
    flex: 1;
    min-width: 0;
  }
  .image-card-title {
    font-size: 1rem;
    font-weight: 700;
    color: #4a3a5b;
    margin-bottom: 0.3rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .image-card-desc {
    font-size: 0.78rem;
    color: #8a7a9a;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 0.4rem;
  }
  .image-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }
  .image-card-tag {
    font-size: 0.62rem;
    padding: 0.12rem 0.5rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 10px;
    white-space: nowrap;
  }
  .image-card-thumb {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    background: rgba(184,169,201,0.12);
  }
  .image-card-chcount {
    font-size: 0.62rem;
    color: #a99ab8;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── 빈 상태 / 로딩 ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: #a99ab8;
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    opacity: 0.5;
  }
  .empty-state p {
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .loading {
    text-align: center;
    padding: 3rem;
    color: #a99ab8;
    font-size: 0.85rem;
  }
  .loading .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── 새 그림 버튼 ── */
  .new-image-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 100;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b8a9c9, #9a86b5);
    color: white;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(90,74,107,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    text-decoration: none;
  }
  .new-image-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(90,74,107,0.35);
  }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .container { padding: 0 0.8rem 4rem; }
    .image-card { padding: 0.7rem 0.9rem; }
    .image-card-thumb { width: 46px; height: 46px; }
  }
</style>
</head>
<body>

<div class="sync-badge" id="syncBadge"><span class="dot"></span>실시간 연결됨</div>

<a href="../index.html" class="nav-link nav-corner">← 홈</a>
<div class="nav-corner-right">
  <a class="action-pill" href="story-list.html">📝 글 목록</a>
</div>

<header class="page-hero">
  <h1>연성 그림 목록</h1>
</header>

<div class="container">
  <div class="filter-area">
    <div class="filter-section">
      <div class="filter-header">
        <span class="filter-label">캐릭터로 보기</span>
        <button class="clear-filter" id="clearCharFilter" style="display:none;">초기화</button>
      </div>
      <div class="char-mode-toggle">
        <button class="mode-btn active" id="charModeOr">하나라도 포함</button>
        <button class="mode-btn" id="charModeAnd">전부 포함</button>
      </div>
      <div class="char-filter-wrap" id="charFilter"></div>
    </div>
    <div class="filter-section">
      <div class="filter-header">
        <span class="filter-label">태그로 보기</span>
        <button class="clear-filter" id="clearTagFilter" style="display:none;">초기화</button>
      </div>
      <div class="tag-filter-group" id="tagFilter"></div>
    </div>
  </div>

  <div class="image-list" id="imageList">
    <div class="loading">불러오는 중<span class="dots"></span></div>
  </div>
</div>

<!-- 새 그림 업로드 FAB -->
<button class="new-image-btn" id="newImageBtn" title="새 그림 업로드">✎</button>

<script src="../assets/personal-nav.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAV43y2kZnhgU7BhDlRg_r7IkeklidH6m8",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.firebasestorage.app",
    messagingSenderId: "145543545184",
    appId: "1:145543545184:web:e7411754d99d8b04b5de05"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function setSyncStatus(online) {
    const badge = document.getElementById('syncBadge');
    if (online) {
      badge.classList.remove('offline');
      badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
    } else {
      badge.classList.add('offline');
      badge.innerHTML = '<span class="dot"></span>오프라인';
    }
  }
  db.collection('data').doc('characters').onSnapshot(
    () => setSyncStatus(true),
    () => setSyncStatus(false)
  );

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function generatePid() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < 8; i++) {
      result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
  }

  // ── 캐릭터 필터 ──
  let allCharacters = [];
  let selectedChars = new Set();
  let charFilterMode = 'or'; // 'or' | 'and'

  document.getElementById('charModeOr').addEventListener('click', () => {
    charFilterMode = 'or';
    document.getElementById('charModeOr').classList.add('active');
    document.getElementById('charModeAnd').classList.remove('active');
    renderList();
  });
  document.getElementById('charModeAnd').addEventListener('click', () => {
    charFilterMode = 'and';
    document.getElementById('charModeAnd').classList.add('active');
    document.getElementById('charModeOr').classList.remove('active');
    renderList();
  });

  async function loadCharacters() {
    try {
      const charDoc = await db.collection('data').doc('characters').get();
      if (!charDoc.exists) return;

      allCharacters = (charDoc.data().groups || []).map(owner => ({
        owner: owner.owner,
        names: (owner.subs || []).flatMap(sub =>
          (sub.items || []).filter(ch => ch && ch.n).map(ch => ch.n)
        )
      })).filter(g => g.names.length > 0);

      renderCharFilter();
    } catch (e) {
      console.error('캐릭터 로드 실패:', e);
    }
  }

  function renderCharFilter() {
    const wrap = document.getElementById('charFilter');
    if (allCharacters.length === 0) {
      wrap.innerHTML = '<span style="font-size:0.75rem;color:#a99ab8;">캐릭터 없음</span>';
      return;
    }
    wrap.innerHTML = allCharacters.map(g => `
      <div class="char-filter-row">
        <span class="char-owner-label">${g.owner}</span>
        <div class="char-tag-group">
          ${g.names.map(name =>
            `<span class="char-tag${selectedChars.has(name) ? ' active' : ''}" data-name="${name}">${name}</span>`
          ).join('')}
        </div>
      </div>
    `).join('');

    wrap.querySelectorAll('.char-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const name = tag.dataset.name;
        if (selectedChars.has(name)) { selectedChars.delete(name); tag.classList.remove('active'); }
        else { selectedChars.add(name); tag.classList.add('active'); }
        document.getElementById('clearCharFilter').style.display = selectedChars.size > 0 ? 'block' : 'none';
        renderList();
      });
    });
  }

  document.getElementById('clearCharFilter').addEventListener('click', () => {
    selectedChars.clear();
    charFilterMode = 'or';
    document.getElementById('charModeOr').classList.add('active');
    document.getElementById('charModeAnd').classList.remove('active');
    document.getElementById('clearCharFilter').style.display = 'none';
    document.querySelectorAll('#charFilter .char-tag.active').forEach(t => t.classList.remove('active'));
    renderList();
  });

  // ── 태그 필터 (업로드된 그림들의 태그 합집합에서 도출) ──
  let selectedTags = new Set();

  function renderTagFilter() {
    const wrap = document.getElementById('tagFilter');
    const allTags = [...new Set(allImages.flatMap(img => img.tags))].sort((a, b) => a.localeCompare(b, 'ko'));

    if (allTags.length === 0) {
      wrap.innerHTML = '<span style="font-size:0.75rem;color:#a99ab8;">태그 없음</span>';
      return;
    }
    wrap.innerHTML = allTags.map(tag =>
      `<span class="char-tag${selectedTags.has(tag) ? ' active' : ''}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`
    ).join('');

    wrap.querySelectorAll('.char-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const name = tag.dataset.tag;
        if (selectedTags.has(name)) { selectedTags.delete(name); tag.classList.remove('active'); }
        else { selectedTags.add(name); tag.classList.add('active'); }
        document.getElementById('clearTagFilter').style.display = selectedTags.size > 0 ? 'block' : 'none';
        renderList();
      });
    });
  }

  document.getElementById('clearTagFilter').addEventListener('click', () => {
    selectedTags.clear();
    document.getElementById('clearTagFilter').style.display = 'none';
    document.querySelectorAll('#tagFilter .char-tag.active').forEach(t => t.classList.remove('active'));
    renderList();
  });

  // ── 그림 목록 로드 ──
  let allImages = [];

  async function loadImages() {
    const list = document.getElementById('imageList');
    try {
      const snapshot = await db.collection('images').orderBy('updatedAt', 'desc').get();
      allImages = snapshot.docs.map(doc => {
        const data = doc.data();
        return {
          pid: doc.id,
          title: data.title || '(제목 없음)',
          description: data.description || '',
          characters: data.characters || [],
          tags: data.tags || [],
          thumbUrl: data.thumbUrl || '',
          chapterCount: data.chapterCount || 1
        };
      });
      renderTagFilter();
      renderList();
    } catch (e) {
      console.error('그림 목록 로드 실패:', e);
      list.innerHTML = '<div class="empty-state"><div class="icon">⚠</div><p>목록을 불러오지 못했어요</p></div>';
    }
  }

  // ── 목록 렌더 (캐릭터 + 태그 필터 적용) ──
  function renderList() {
    const list = document.getElementById('imageList');
    const images = allImages.filter(img => {
      const matchChar = selectedChars.size === 0 || (charFilterMode === 'and'
        ? [...selectedChars].every(name => img.characters.includes(name))
        : [...selectedChars].some(name => img.characters.includes(name)));
      const matchTag = selectedTags.size === 0 || img.tags.some(t => selectedTags.has(t));
      return matchChar && matchTag;
    });

    if (images.length === 0) {
      list.innerHTML = allImages.length === 0
        ? '<div class="empty-state"><div class="icon">🖼</div><p>아직 업로드된 그림이 없어요<br>첫 번째 그림을 올려보세요!</p></div>'
        : '<div class="empty-state"><div class="icon">🖼</div><p>조건에 맞는 그림이 없어요</p></div>';
      return;
    }

    list.innerHTML = images.map(img => {
      const tagsHtml = [...img.characters, ...img.tags]
        .map(t => `<span class="image-card-tag">${escapeHtml(t)}</span>`).join('');
      return `
        <a class="image-card" href="image-view.html?pid=${img.pid}">
          <div class="image-card-main">
            <div class="image-card-title">${escapeHtml(img.title)}</div>
            ${img.description ? `<div class="image-card-desc">${escapeHtml(img.description)}</div>` : ''}
            ${tagsHtml ? `<div class="image-card-tags">${tagsHtml}</div>` : ''}
            ${img.chapterCount > 1 ? `<div class="image-card-chcount">🖼 ${img.chapterCount}장</div>` : ''}
          </div>
          <img class="image-card-thumb" src="${escapeHtml(img.thumbUrl)}" alt="" loading="lazy">
        </a>
      `;
    }).join('');
  }

  document.getElementById('newImageBtn').addEventListener('click', () => {
    const newPid = generatePid();
    window.location.href = `image-write.html?pid=${newPid}&new=1`;
  });

  loadCharacters();
  loadImages();
</script>
</body>
</html>
