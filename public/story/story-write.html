<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 글쓰기</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a89ec4">
<link rel="apple-touch-icon" href="/assets/icon/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="/assets/pwa.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  /* ── 상단 바 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface-glass-strong);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,169,201,0.15);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-bar-actions {
    display: flex;
    gap: 0.5rem;
  }

  .save-btn {
    padding: 0.45rem 1.1rem;
    background: linear-gradient(135deg, #b8a9c9, #9a86b5);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'ko-font', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .save-btn:hover { background: linear-gradient(135deg, #a89ab9, #8a76a5); }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .save-status {
    font-size: 0.7rem;
    color: #a99ab8;
    align-self: center;
  }

  /* ── 컨테이너 ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 1.5rem 1.2rem 6rem;
  }

  /* ── 제목 입력 ── */
  .title-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'ko-font', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: #4a3a5b;
    padding: 0.5rem 0;
    outline: none;
    border-bottom: 2px solid rgba(184,169,201,0.2);
    transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .title-input::placeholder { color: #c8b8d8; }
  .title-input:focus { border-bottom-color: #b8a9c9; }

  /* ── 캐릭터 태그 선택 ── */
  .tag-section {
    margin-bottom: 1.2rem;
  }

  .tag-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .tag-section-label {
    font-size: 0.75rem;
    color: #8a7a9a;
    font-weight: 500;
  }

  .tag-toggle-btn {
    font-size: 0.7rem;
    color: #a99ab8;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    text-decoration: underline;
  }

  .tag-picker {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 10px;
    padding: 0.8rem;
    transition: all 0.3s ease;
  }

  .tag-picker.collapsed {
    max-height: 0;
    padding: 0 0.8rem;
    overflow: hidden;
    border-color: transparent;
  }

  .tag-picker-group {
    margin-bottom: 0.5rem;
  }
  .tag-picker-group:last-child { margin-bottom: 0; }

  .tag-group-label {
    font-size: 0.65rem;
    color: #a99ab8;
    margin-bottom: 0.3rem;
    display: block;
  }

  .tag-picker-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .pick-tag {
    padding: 0.25rem 0.6rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 16px;
    font-size: 0.72rem;
    color: #7a6a8a;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    font-family: 'ko-font', sans-serif;
  }
  .pick-tag:hover {
    border-color: #b8a9c9;
    background: rgba(184,169,201,0.1);
  }
  .pick-tag.selected {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  #ratingPicker .pick-tag.selected {
    background: #c2727f;
    border-color: #c2727f;
  }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    min-height: 1.5rem;
  }

  .selected-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.55rem;
    background: rgba(184,169,201,0.18);
    color: #6a5a7a;
    border-radius: 12px;
    font-size: 0.72rem;
  }

  .selected-tag .remove-tag {
    cursor: pointer;
    opacity: 0.6;
    font-size: 0.65rem;
  }
  .selected-tag .remove-tag:hover { opacity: 1; }

  /* ── 챕터 탭 ── */
  .chapter-tabs {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
    overflow-x: auto;
    padding-bottom: 0.3rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(184,169,201,0.3) transparent;
  }

  .chapter-tab {
    flex-shrink: 0;
    padding: 0.4rem 0.9rem;
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 8px 8px 0 0;
    font-size: 0.78rem;
    color: #8a7a9a;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'ko-font', sans-serif;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .chapter-tab:hover { background: rgba(255,255,255,0.5); }
  .chapter-tab.active {
    background: rgba(255,255,255,0.7);
    color: #5a4a6b;
    border-bottom-color: transparent;
    font-weight: 500;
  }

  .chapter-tab .del-ch {
    font-size: 0.6rem;
    opacity: 0;
    cursor: pointer;
    color: #c9a0a0;
    transition: opacity 0.2s;
  }
  .chapter-tab:hover .del-ch { opacity: 0.7; }
  .chapter-tab .del-ch:hover { opacity: 1; }

  .add-chapter-btn {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px dashed rgba(184,169,201,0.4);
    background: transparent;
    color: #b8a9c9;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .add-chapter-btn:hover {
    border-color: #b8a9c9;
    background: rgba(184,169,201,0.1);
  }

  /* ── 챕터 제목 ── */
  .chapter-title-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'ko-font', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: #5a4a6b;
    padding: 0.4rem 0;
    outline: none;
    border-bottom: 1px solid rgba(184,169,201,0.15);
    margin-bottom: 0.8rem;
  }
  .chapter-title-input::placeholder { color: #c8b8d8; }

  /* ── 에디터 툴바 ── */
  .editor-toolbar {
    display: flex;
    gap: 0.2rem;
    padding: 0.4rem 0.5rem;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.2);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }

  .toolbar-btn {
    width: 32px;
    height: 30px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #7a6a8a;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: serif;
  }
  .toolbar-btn:hover { background: rgba(184,169,201,0.15); }
  .toolbar-btn.active { background: rgba(184,169,201,0.25); color: #5a4a6b; }

  .toolbar-sep {
    width: 1px;
    margin: 0.3rem 0.3rem;
    background: rgba(184,169,201,0.2);
  }

  /* ── 본문 에디터 ── */
  .editor-body {
    min-height: 400px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 0 0 8px 8px;
    padding: 1rem 1.2rem;
    outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    line-height: 1.8;
    color: #3a2a4b;
  }
  .editor-body:empty::before {
    content: attr(data-placeholder);
    color: #c8b8d8;
    pointer-events: none;
  }
  .editor-body:focus {
    border-color: rgba(184,169,201,0.4);
  }

  /* 에디터 내부 서식 */
  .editor-body h2 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1.15rem;
    color: #5a4a6b;
    margin: 1rem 0 0.5rem;
  }
  .editor-body h3 {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 1rem;
    color: #6a5a7a;
    margin: 0.8rem 0 0.4rem;
  }
  .editor-body blockquote {
    border-left: 3px solid #d4c8e0;
    padding-left: 0.8rem;
    margin: 0.5rem 0;
    color: #7a6a8a;
    font-style: italic;
  }

  /* ── 로어 검색 드롭다운 ── */
  .lore-picker-wrap { position: relative; margin-top: 0.4rem; }

  .lore-search-input {
    width: 100%;
    padding: 0.45rem 0.8rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    font-family: 'ko-font', sans-serif;
    font-size: 0.8rem;
    background: rgba(255,255,255,0.6);
    color: #4a3a5b;
    outline: none;
    transition: border-color 0.2s;
  }
  .lore-search-input::placeholder { color: #b8a9c9; }
  .lore-search-input:focus { border-color: #b8a9c9; }

  .lore-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(184,169,201,0.25);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(90,74,107,0.12);
    max-height: 200px;
    overflow-y: auto;
    z-index: 50;
    display: none;
  }
  .lore-dropdown.open { display: block; }

  .lore-dropdown-item {
    padding: 0.55rem 0.9rem;
    font-size: 0.82rem;
    color: #4a3a5b;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .lore-dropdown-item:hover { background: rgba(184,169,201,0.1); }
  .lore-dropdown-item.selected { color: #7a5a8a; font-weight: 500; }
  .lore-dropdown-check { font-size: 0.7rem; color: #b8a9c9; flex-shrink: 0; }

  .lore-dropdown-empty {
    padding: 0.9rem;
    text-align: center;
    font-size: 0.78rem;
    color: #a99ab8;
  }

  /* ── 하단 액션 (삭제) ── */
  .bottom-actions {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(184,169,201,0.15);
    display: flex;
    justify-content: flex-end;
  }

  .delete-story-btn {
    padding: 0.4rem 0.9rem;
    background: none;
    border: 1px solid rgba(200,140,140,0.3);
    border-radius: 6px;
    color: #b88a8a;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .delete-story-btn:hover {
    background: rgba(200,140,140,0.08);
    border-color: rgba(200,140,140,0.5);
  }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,107,0.9);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── 반응형 ── */
  @media (max-width: 480px) {
    .container { padding: 1rem 0.8rem 5rem; }
    .title-input { font-size: 1.25rem; }
    .editor-body { min-height: 300px; padding: 0.8rem; }
  }
</style>
</head>
<body>

<!-- 실시간 연결 표시 -->
<div class="sync-badge" id="syncBadge"><span class="dot"></span>실시간 연결됨</div>

<!-- 상단 바 -->
<div class="top-bar">
  <button class="nav-link" id="backBtn">← 목록</button>
  <div class="top-bar-actions">
    <span class="save-status" id="saveStatus"></span>
    <button class="save-btn" id="saveBtn">저장</button>
  </div>
</div>

<div class="container">

  <!-- 글 제목 -->
  <input type="text" class="title-input" id="storyTitle" placeholder="제목을 입력하세요">

  <!-- 캐릭터 태그 -->
  <div class="tag-section">
    <div class="tag-section-header">
      <span class="tag-section-label">등장 캐릭터</span>
      <button class="tag-toggle-btn" id="tagToggle">선택하기 ▾</button>
    </div>
    <div class="selected-tags" id="selectedTags">
      <span style="font-size:0.72rem;color:#b8a9c9;">태그를 선택하세요</span>
    </div>
    <div class="tag-picker collapsed" id="tagPicker">
      <!-- Firestore에서 캐릭터 로드 -->
    </div>
  </div>

  <!-- 캐릭터 설정 태그 -->
  <div class="tag-section">
    <div class="tag-section-header">
      <span class="tag-section-label">캐릭터 설정</span>
      <button class="tag-toggle-btn" id="roleToggle">선택하기 ▾</button>
    </div>
    <div class="selected-tags" id="selectedRoleTags">
      <span style="font-size:0.72rem;color:#b8a9c9;">설정 태그를 선택하세요</span>
    </div>
    <div class="tag-picker collapsed" id="rolePicker"></div>
  </div>

  <!-- 관계성 태그 -->
  <div class="tag-section">
    <div class="tag-section-header">
      <span class="tag-section-label">관계성 (AU)</span>
      <button class="tag-toggle-btn" id="auToggle">선택하기 ▾</button>
    </div>
    <div class="selected-tags" id="selectedAuTags">
      <span style="font-size:0.72rem;color:#b8a9c9;">관계성 태그를 선택하세요</span>
    </div>
    <div class="tag-picker collapsed" id="auPicker"></div>
  </div>

  <!-- 수위 태그 -->
  <div class="tag-section">
    <div class="tag-section-header">
      <span class="tag-section-label">수위</span>
    </div>
    <div class="tag-picker-tags" id="ratingPicker">
      <span class="pick-tag" data-rating="17">17</span>
      <span class="pick-tag" data-rating="19">19</span>
    </div>
  </div>

  <!-- 로어 참조 -->
  <div class="tag-section">
    <div class="tag-section-header">
      <span class="tag-section-label">로어 참조</span>
    </div>
    <div class="selected-tags" id="selectedLoreTags">
      <span style="font-size:0.72rem;color:#b8a9c9;">참조할 로어를 선택하세요</span>
    </div>
    <div class="lore-picker-wrap">
      <input class="lore-search-input" id="loreSearchInput" placeholder="로어 검색 후 선택..." autocomplete="off">
      <div class="lore-dropdown" id="loreDropdown"></div>
    </div>
  </div>

  <!-- 챕터 탭 -->
  <div class="chapter-tabs" id="chapterTabs">
    <div class="chapter-tab active" data-index="0">
      <span class="ch-label">챕터 1</span>
    </div>
    <button class="add-chapter-btn" id="addChapterBtn" title="챕터 추가">+</button>
  </div>

  <!-- 챕터 제목 -->
  <input type="text" class="chapter-title-input" id="chapterTitle" placeholder="챕터 제목 (선택)">

  <!-- 에디터 -->
  <div class="editor-toolbar">
    <button class="toolbar-btn" data-cmd="bold" title="굵게"><b>B</b></button>
    <button class="toolbar-btn" data-cmd="italic" title="기울임"><i>I</i></button>
    <button class="toolbar-btn" data-cmd="underline" title="밑줄"><u>U</u></button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" data-cmd="h2" title="제목">H2</button>
    <button class="toolbar-btn" data-cmd="h3" title="소제목">H3</button>
    <div class="toolbar-sep"></div>
    <button class="toolbar-btn" data-cmd="quote" title="인용">❝</button>
    <button class="toolbar-btn" data-cmd="hr" title="구분선">─</button>
  </div>
  <div class="editor-body" id="editorBody" contenteditable="true" data-placeholder="이야기를 시작하세요..."></div>

  <!-- 하단 액션 -->
  <div class="bottom-actions" id="bottomActions" style="display:none;">
    <button class="delete-story-btn" id="deleteBtn">이 글 삭제</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="../assets/personal-nav.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../assets/confirm-modal.js"></script>
<script>
  // ★ firebaseConfig는 기존 프로젝트 파일에서 복사
  const firebaseConfig = {
    apiKey: "AIzaSyAV43y2kZnhgU7BhDlRg_r7IkeklidH6m8",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.firebasestorage.app",
    messagingSenderId: "145543545184",
    appId: "1:145543545184:web:e7411754d99d8b04b5de05"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── URL 파라미터 ──
  const params = new URLSearchParams(location.search);
  const pid = params.get('pid');
  const isNew = params.get('new') === '1';

  if (!pid) {
    alert('잘못된 접근입니다.');
    location.href = 'story-list.html';
  }

  // ── 상태 ──
  let chapters = [{ title: '', body: '', chapterPid: generatePid() }];
  let currentChapterIndex = 0;
  let selectedCharacters = [];
  let allCharacters = [];
  let selectedRoles = [];
  let allRoles = [];
  let selectedAus = [];
  let allAus = [];
  let selectedRating = '';

  // ── PID 생성 ──
  function generatePid() {
    const c = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let r = '';
    for (let i = 0; i < 8; i++) r += c[Math.floor(Math.random() * c.length)];
    return r;
  }

  // ── 토스트 ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── 동기화 상태 표시 ──
  function setSyncStatus(online) {
    const badge = document.getElementById('syncBadge');
    if (online) {
      badge.classList.remove('offline');
      badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
    } else {
      badge.classList.add('offline');
      badge.innerHTML = '<span class="dot"></span>오프라인';
    }
  }

  // ── 캐릭터 로드 ──
  async function loadCharacters() {
    try {
      const charDoc = await db.collection('data').doc('characters').get();
      if (!charDoc.exists) return;

      const groups = [];
      (charDoc.data().groups || []).forEach(owner => {
        (owner.subs || []).forEach(sub => {
          const chars = (sub.items || []).filter(ch => ch && ch.n).map(ch => ch.n);
          if (chars.length > 0) {
            groups.push({ label: `${owner.owner} — ${sub.label}`, chars });
          }
        });
      });

      allCharacters = groups;
      renderTagPicker();
      setSyncStatus(true);
    } catch (e) {
      console.error('캐릭터 로드 실패:', e);
      setSyncStatus(false);
    }
  }

  function renderTagPicker() {
    const picker = document.getElementById('tagPicker');
    picker.innerHTML = allCharacters.map(g => `
      <div class="tag-picker-group">
        <span class="tag-group-label">${g.label}</span>
        <div class="tag-picker-tags">
          ${g.chars.map(name => `
            <span class="pick-tag${selectedCharacters.includes(name) ? ' selected' : ''}"
                  data-name="${name}">${name}</span>
          `).join('')}
        </div>
      </div>
    `).join('');

    picker.querySelectorAll('.pick-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const name = tag.dataset.name;
        if (selectedCharacters.includes(name)) {
          selectedCharacters = selectedCharacters.filter(n => n !== name);
          tag.classList.remove('selected');
        } else {
          selectedCharacters.push(name);
          tag.classList.add('selected');
        }
        renderSelectedTags();
      });
    });
  }

  function renderSelectedTags() {
    const wrap = document.getElementById('selectedTags');
    if (selectedCharacters.length === 0) {
      wrap.innerHTML = '<span style="font-size:0.72rem;color:#b8a9c9;">태그를 선택하세요</span>';
      return;
    }
    wrap.innerHTML = selectedCharacters.map(name => `
      <span class="selected-tag">
        ${name}
        <span class="remove-tag" data-name="${name}">✕</span>
      </span>
    `).join('');

    wrap.querySelectorAll('.remove-tag').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.name;
        selectedCharacters = selectedCharacters.filter(n => n !== name);
        renderSelectedTags();
        renderTagPicker(); // sync picker state
      });
    });
  }

  // ── 태그 피커 토글 ──
  document.getElementById('tagToggle').addEventListener('click', () => {
    const picker = document.getElementById('tagPicker');
    const btn = document.getElementById('tagToggle');
    picker.classList.toggle('collapsed');
    btn.textContent = picker.classList.contains('collapsed') ? '선택하기 ▾' : '접기 ▴';
  });

  // ── 캐릭터 설정 / 관계성 로드 ──
  async function loadRolesAndAus() {
    try {
      const [roleDoc, auDoc] = await Promise.all([
        db.collection('data').doc('roles').get(),
        db.collection('data').doc('aus').get()
      ]);
      if (roleDoc.exists) {
        allRoles = (roleDoc.data().groups || []).filter(g => (g.items || []).length > 0);
        renderRolePicker();
      }
      if (auDoc.exists) {
        allAus = (auDoc.data().groups || []).filter(g => (g.items || []).length > 0);
        renderAuPicker();
      }
    } catch (e) {
      console.error('설정/관계성 로드 실패:', e);
    }
  }

  function makeGroupPicker(pickerEl, allGroups, selectedArr, onToggle) {
    pickerEl.innerHTML = allGroups.map(g => `
      <div class="tag-picker-group">
        <span class="tag-group-label">${g.label}</span>
        <div class="tag-picker-tags">
          ${(g.items || []).map(name => `
            <span class="pick-tag${selectedArr.includes(name) ? ' selected' : ''}"
                  data-name="${name}">${name}</span>
          `).join('')}
        </div>
      </div>
    `).join('');
    pickerEl.querySelectorAll('.pick-tag').forEach(tag => {
      tag.addEventListener('click', () => onToggle(tag.dataset.name, tag));
    });
  }

  function renderRolePicker() {
    makeGroupPicker(
      document.getElementById('rolePicker'), allRoles, selectedRoles,
      (name, tag) => {
        if (selectedRoles.includes(name)) {
          selectedRoles = selectedRoles.filter(n => n !== name);
          tag.classList.remove('selected');
        } else {
          selectedRoles.push(name);
          tag.classList.add('selected');
        }
        renderSelectedRoleTags();
      }
    );
  }

  function renderAuPicker() {
    makeGroupPicker(
      document.getElementById('auPicker'), allAus, selectedAus,
      (name, tag) => {
        if (selectedAus.includes(name)) {
          selectedAus = selectedAus.filter(n => n !== name);
          tag.classList.remove('selected');
        } else {
          selectedAus.push(name);
          tag.classList.add('selected');
        }
        renderSelectedAuTags();
      }
    );
  }

  function makeSelectedTagsRenderer(wrapId, selectedArr, placeholder, onRemove) {
    const wrap = document.getElementById(wrapId);
    if (selectedArr.length === 0) {
      wrap.innerHTML = `<span style="font-size:0.72rem;color:#b8a9c9;">${placeholder}</span>`;
      return;
    }
    wrap.innerHTML = selectedArr.map(name => `
      <span class="selected-tag">
        ${name}
        <span class="remove-tag" data-name="${name}">✕</span>
      </span>
    `).join('');
    wrap.querySelectorAll('.remove-tag').forEach(btn => {
      btn.addEventListener('click', () => onRemove(btn.dataset.name));
    });
  }

  function renderSelectedRoleTags() {
    makeSelectedTagsRenderer('selectedRoleTags', selectedRoles, '설정 태그를 선택하세요', name => {
      selectedRoles = selectedRoles.filter(n => n !== name);
      renderSelectedRoleTags();
      renderRolePicker();
    });
  }

  function renderSelectedAuTags() {
    makeSelectedTagsRenderer('selectedAuTags', selectedAus, '관계성 태그를 선택하세요', name => {
      selectedAus = selectedAus.filter(n => n !== name);
      renderSelectedAuTags();
      renderAuPicker();
    });
  }

  document.getElementById('roleToggle').addEventListener('click', () => {
    const picker = document.getElementById('rolePicker');
    const btn = document.getElementById('roleToggle');
    picker.classList.toggle('collapsed');
    btn.textContent = picker.classList.contains('collapsed') ? '선택하기 ▾' : '접기 ▴';
  });

  document.getElementById('auToggle').addEventListener('click', () => {
    const picker = document.getElementById('auPicker');
    const btn = document.getElementById('auToggle');
    picker.classList.toggle('collapsed');
    btn.textContent = picker.classList.contains('collapsed') ? '선택하기 ▾' : '접기 ▴';
  });

  // ── 수위 태그 ──
  function renderRatingPicker() {
    document.querySelectorAll('#ratingPicker .pick-tag').forEach(tag => {
      tag.classList.toggle('selected', tag.dataset.rating === selectedRating);
    });
  }

  document.querySelectorAll('#ratingPicker .pick-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const val = tag.dataset.rating;
      selectedRating = selectedRating === val ? '' : val;
      renderRatingPicker();
    });
  });

  // ── 챕터 관리 ──
  function saveCurrentChapter() {
    chapters[currentChapterIndex].title = document.getElementById('chapterTitle').value;
    chapters[currentChapterIndex].body = document.getElementById('editorBody').innerHTML;
  }

  function switchChapter(index, skipSave = false) {
    if (!skipSave) saveCurrentChapter();
    currentChapterIndex = index;
    document.getElementById('chapterTitle').value = chapters[index].title || '';
    document.getElementById('editorBody').innerHTML = chapters[index].body || '';
    renderChapterTabs();
  }

  function renderChapterTabs() {
    const wrap = document.getElementById('chapterTabs');
    const addBtn = document.getElementById('addChapterBtn');

    // 기존 탭 제거 (addBtn 제외)
    wrap.querySelectorAll('.chapter-tab').forEach(t => t.remove());

    chapters.forEach((ch, i) => {
      const tab = document.createElement('div');
      tab.className = `chapter-tab${i === currentChapterIndex ? ' active' : ''}`;
      tab.dataset.index = i;

      const label = document.createElement('span');
      label.className = 'ch-label';
      label.textContent = ch.title || `챕터 ${i + 1}`;
      tab.appendChild(label);

      if (chapters.length > 1) {
        const del = document.createElement('span');
        del.className = 'del-ch';
        del.textContent = '✕';
        del.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (await customConfirm(`"${ch.title || `챕터 ${i + 1}`}" 챕터를 삭제할까요?`)) {
            deleteChapter(i);
          }
        });
        tab.appendChild(del);
      }

      tab.addEventListener('click', () => switchChapter(i));
      wrap.insertBefore(tab, addBtn);
    });
  }

  document.getElementById('addChapterBtn').addEventListener('click', () => {
    saveCurrentChapter();
    const newChapter = { title: '', body: '', chapterPid: generatePid() };
    chapters.push(newChapter);
    switchChapter(chapters.length - 1);
    showToast('새 챕터가 추가되었어요');
  });

  function deleteChapter(index) {
    chapters.splice(index, 1);
    if (currentChapterIndex >= chapters.length) {
      currentChapterIndex = chapters.length - 1;
    }
    switchChapter(currentChapterIndex);
    showToast('챕터가 삭제되었어요');
  }

  // ── 에디터 툴바 ──
  document.querySelectorAll('.toolbar-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cmd = btn.dataset.cmd;
      document.getElementById('editorBody').focus();

      switch (cmd) {
        case 'bold': document.execCommand('bold'); break;
        case 'italic': document.execCommand('italic'); break;
        case 'underline': document.execCommand('underline'); break;
        case 'h2': document.execCommand('formatBlock', false, '<h2>'); break;
        case 'h3': document.execCommand('formatBlock', false, '<h3>'); break;
        case 'quote': document.execCommand('formatBlock', false, '<blockquote>'); break;
        case 'hr': document.execCommand('insertHTML', false, '<hr>'); break;
      }
    });
  });

  // 툴바 active 상태
  document.getElementById('editorBody').addEventListener('keyup', updateToolbarState);
  document.getElementById('editorBody').addEventListener('mouseup', updateToolbarState);

  function updateToolbarState() {
    document.querySelectorAll('.toolbar-btn').forEach(btn => {
      const cmd = btn.dataset.cmd;
      if (['bold', 'italic', 'underline'].includes(cmd)) {
        btn.classList.toggle('active', document.queryCommandState(cmd));
      }
    });
  }

  // ── 저장 ──
  document.getElementById('saveBtn').addEventListener('click', async () => {
    saveCurrentChapter();
    const title = document.getElementById('storyTitle').value.trim();

    if (!title) {
      showToast('제목을 입력해주세요');
      return;
    }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    document.getElementById('saveStatus').textContent = '저장 중...';

    try {
      // 기존 챕터 조회 (배치에 포함시키기 위해 미리 읽어둠)
      const existing = await db.collection('chapters')
        .where('storyId', '==', pid).get();

      // stories 문서 갱신 + 챕터 삭제/재저장을 하나의 배치로 원자적 처리
      const batch = db.batch();

      const storyRef = db.collection('stories').doc(pid);
      batch.set(storyRef, {
        title,
        characters: selectedCharacters,
        roles: selectedRoles,
        aus: selectedAus,
        rating: selectedRating,
        loreRefs: selectedLoreRefs,
        chapterCount: chapters.length,
        theme: 'default',
        ...(isNew ? { createdAt: firebase.firestore.FieldValue.serverTimestamp() } : {}),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });

      existing.forEach(doc => batch.delete(doc.ref));

      chapters.forEach((ch, i) => {
        const ref = db.collection('chapters').doc(ch.chapterPid);
        batch.set(ref, {
          storyId: pid,
          order: i,
          title: ch.title || '',
          body: ch.body || '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      });

      await batch.commit();

      document.getElementById('saveStatus').textContent = '저장됨';
      showToast('저장되었어요!');

      // new 파라미터 제거
      if (isNew) {
        history.replaceState(null, '', `story-write.html?pid=${pid}`);
      }
    } catch (e) {
      console.error('저장 실패:', e);
      showToast('저장에 실패했어요');
      document.getElementById('saveStatus').textContent = '';
    } finally {
      saveBtn.disabled = false;
    }
  });

  // ── 기존 글 로드 ──
  async function loadExistingStory() {
    if (isNew) {
      document.getElementById('bottomActions').style.display = 'none';
      return;
    }

    try {
      const storyDoc = await db.collection('stories').doc(pid).get();
      if (!storyDoc.exists) {
        showToast('존재하지 않는 글이에요');
        return;
      }

      const data = storyDoc.data();
      document.getElementById('storyTitle').value = data.title || '';
      selectedCharacters = data.characters || [];
      selectedRoles = data.roles || [];
      selectedAus = data.aus || [];
      selectedRating = data.rating || '';
      selectedLoreRefs = data.loreRefs || [];
      renderSelectedTags();
      renderSelectedRoleTags();
      renderSelectedAuTags();
      renderRatingPicker();
      renderSelectedLoreTags();

      // 챕터 로드 (복합 인덱스 없이 JS 정렬)
      const chapSnap = await db.collection('chapters')
        .where('storyId', '==', pid)
        .get();

      if (!chapSnap.empty) {
        chapters = chapSnap.docs.map(doc => ({
          chapterPid: doc.id,
          title: doc.data().title || '',
          body: doc.data().body || '',
          order: doc.data().order ?? 0
        })).sort((a, b) => a.order - b.order);
      }

      switchChapter(0, true);
      document.getElementById('bottomActions').style.display = 'flex';
    } catch (e) {
      console.error('로드 실패:', e);
    }
  }

  // ── 삭제 ──
  document.getElementById('deleteBtn').addEventListener('click', async () => {
    if (!(await customConfirm('이 글을 정말 삭제할까요? 모든 챕터가 함께 삭제됩니다.'))) return;

    try {
      const batch = db.batch();

      // 챕터 삭제
      const chapSnap = await db.collection('chapters')
        .where('storyId', '==', pid).get();
      chapSnap.forEach(doc => batch.delete(doc.ref));

      // 스토리 삭제
      batch.delete(db.collection('stories').doc(pid));
      await batch.commit();

      showToast('삭제되었어요');
      setTimeout(() => location.href = 'story-list.html', 1000);
    } catch (e) {
      console.error('삭제 실패:', e);
      showToast('삭제에 실패했어요');
    }
  });

  // ── 뒤로가기 ──
  document.getElementById('backBtn').addEventListener('click', async () => {
    if (await customConfirm('저장하지 않은 내용은 사라져요. 돌아갈까요?')) {
      location.href = 'story-list.html';
    }
  });

  // ── 로어 참조 ──
  let selectedLoreRefs = [];
  let allLores = [];

  async function loadLores() {
    try {
      const snap = await db.collection('lores').get();
      allLores = snap.docs
        .map(doc => ({ id: doc.id, title: doc.data().title || '(제목 없음)' }))
        .sort((a, b) => a.title.localeCompare(b.title, 'ko'));
      if (document.getElementById('loreDropdown').classList.contains('open')) {
        renderLoreDropdown(document.getElementById('loreSearchInput').value);
      }
    } catch (e) {
      console.error('로어 로드 실패:', e);
    }
  }

  function renderLoreDropdown(query) {
    const dropdown = document.getElementById('loreDropdown');
    const filtered = query
      ? allLores.filter(l => l.title.toLowerCase().includes(query.toLowerCase()))
      : allLores;

    if (filtered.length === 0) {
      dropdown.innerHTML = `<div class="lore-dropdown-empty">${query ? '검색 결과가 없어요' : '등록된 로어가 없어요'}</div>`;
      return;
    }

    dropdown.innerHTML = filtered.map(l => {
      const isSelected = selectedLoreRefs.some(r => r.id === l.id);
      return `
        <div class="lore-dropdown-item${isSelected ? ' selected' : ''}" data-id="${l.id}">
          <span>${escapeHtml(l.title)}</span>
          ${isSelected ? '<span class="lore-dropdown-check">✓</span>' : ''}
        </div>
      `;
    }).join('');

    dropdown.querySelectorAll('.lore-dropdown-item').forEach(item => {
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        const id = item.dataset.id;
        const lore = allLores.find(l => l.id === id);
        if (!lore) return;
        if (selectedLoreRefs.some(r => r.id === id)) {
          selectedLoreRefs = selectedLoreRefs.filter(r => r.id !== id);
        } else {
          selectedLoreRefs.push({ id, title: lore.title });
        }
        renderSelectedLoreTags();
        renderLoreDropdown(document.getElementById('loreSearchInput').value);
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function renderSelectedLoreTags() {
    const wrap = document.getElementById('selectedLoreTags');
    if (selectedLoreRefs.length === 0) {
      wrap.innerHTML = '<span style="font-size:0.72rem;color:#b8a9c9;">참조할 로어를 선택하세요</span>';
      return;
    }
    wrap.innerHTML = selectedLoreRefs.map(ref => `
      <span class="selected-tag">
        ${escapeHtml(ref.title)}
        <span class="remove-tag" data-id="${ref.id.replace(/"/g, '&quot;')}">✕</span>
      </span>
    `).join('');
    wrap.querySelectorAll('.remove-tag').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedLoreRefs = selectedLoreRefs.filter(r => r.id !== btn.dataset.id);
        renderSelectedLoreTags();
        renderLoreDropdown(document.getElementById('loreSearchInput').value);
      });
    });
  }

  const loreSearchInput = document.getElementById('loreSearchInput');
  const loreDropdown = document.getElementById('loreDropdown');

  loreSearchInput.addEventListener('focus', () => {
    renderLoreDropdown(loreSearchInput.value);
    loreDropdown.classList.add('open');
  });
  loreSearchInput.addEventListener('input', () => {
    renderLoreDropdown(loreSearchInput.value);
    loreDropdown.classList.add('open');
  });
  loreSearchInput.addEventListener('blur', () => {
    loreDropdown.classList.remove('open');
  });

  // ── 초기화 ──
  loadCharacters();
  loadRolesAndAus();
  loadLores();
  loadExistingStory();
</script>
</body>
</html>
