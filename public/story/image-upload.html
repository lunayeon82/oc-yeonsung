<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 그림 업로드</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a89ec4">
<link rel="apple-touch-icon" href="/assets/icon/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="/assets/pwa.js" defer></script>
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  /* ── 상단 바 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface-glass-strong);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,169,201,0.15);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-bar-title {
    font-size: 0.95rem;
    font-weight: 700;
    color: #4a3a5b;
  }

  .upload-btn {
    padding: 0.45rem 1.1rem;
    background: linear-gradient(135deg, #b8a9c9, #9a86b5);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'ko-font', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .upload-btn:hover { background: linear-gradient(135deg, #a998bd, #8a76a5); }
  .upload-btn:disabled { opacity: 0.55; cursor: default; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 1.5rem 1.2rem 4rem;
  }

  /* ── 제목 입력 ── */
  .title-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'ko-font', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: #4a3a5b;
    padding: 0.5rem 0;
    outline: none;
    border-bottom: 2px solid rgba(184,169,201,0.2);
    transition: border-color 0.2s;
    margin-bottom: 1.4rem;
  }
  .title-input::placeholder { color: #c8b8d8; }
  .title-input:focus { border-bottom-color: #b8a9c9; }

  /* ── 캐릭터 태그 선택 ── */
  .tag-section {
    margin-bottom: 1.2rem;
  }

  .tag-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .tag-section-label {
    font-size: 0.75rem;
    color: #8a7a9a;
    font-weight: 500;
  }

  .tag-toggle-btn {
    font-size: 0.7rem;
    color: #a99ab8;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    text-decoration: underline;
  }

  .tag-picker {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 10px;
    padding: 0.8rem;
    transition: all 0.3s ease;
  }

  .tag-picker.collapsed {
    max-height: 0;
    padding: 0 0.8rem;
    overflow: hidden;
    border-color: transparent;
  }

  .tag-picker-group {
    margin-bottom: 0.5rem;
  }
  .tag-picker-group:last-child { margin-bottom: 0; }

  .tag-group-label {
    font-size: 0.65rem;
    color: #a99ab8;
    margin-bottom: 0.3rem;
    display: block;
  }

  .tag-picker-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .pick-tag {
    padding: 0.25rem 0.6rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 16px;
    font-size: 0.72rem;
    color: #7a6a8a;
    background: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    font-family: 'ko-font', sans-serif;
  }
  .pick-tag:hover {
    border-color: #b8a9c9;
    background: rgba(184,169,201,0.1);
  }
  .pick-tag.selected {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    min-height: 1.5rem;
  }

  .selected-tag {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.55rem;
    background: rgba(184,169,201,0.18);
    color: #6a5a7a;
    border-radius: 12px;
    font-size: 0.72rem;
  }

  .selected-tag .remove-tag {
    cursor: pointer;
    opacity: 0.6;
    font-size: 0.65rem;
  }
  .selected-tag .remove-tag:hover { opacity: 1; }

  /* ── 파일 선택 영역 ── */
  .drop-zone {
    display: block;
    width: 100%;
    border: 2px dashed rgba(184,169,201,0.4);
    border-radius: 14px;
    background: rgba(255,255,255,0.45);
    padding: 1.6rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.2rem;
  }
  .drop-zone:hover {
    border-color: #b8a9c9;
    background: rgba(184,169,201,0.08);
  }
  .drop-zone-label {
    font-size: 0.85rem;
    color: #8a7a9a;
  }
  .drop-zone input[type="file"] { display: none; }

  .preview-wrap {
    display: none;
    margin-bottom: 1.2rem;
    text-align: center;
  }
  .preview-wrap.show { display: block; }
  .preview-img {
    max-width: 100%;
    max-height: 360px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(90,74,107,0.15);
  }
  .preview-filename {
    margin-top: 0.5rem;
    font-size: 0.72rem;
    color: #a99ab8;
  }

  /* ── 업로드 정보 ── */
  .upload-info {
    font-size: 0.7rem;
    color: #a99ab8;
    line-height: 1.6;
    margin-bottom: 1.6rem;
  }

  /* ── 진행 상태 ── */
  .progress-wrap {
    display: none;
    align-items: center;
    gap: 0.6rem;
    padding: 0.9rem 1rem;
    border-radius: 10px;
    background: rgba(184,169,201,0.12);
    color: #6a5a8a;
    font-size: 0.82rem;
    margin-top: 1rem;
  }
  .progress-wrap.show { display: flex; }
  .progress-spinner {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2px solid rgba(168,158,196,0.3);
    border-top-color: #a89ec4;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,107,0.9);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- 실시간 연결 표시 -->
<div class="sync-badge" id="syncBadge"><span class="dot"></span>실시간 연결됨</div>

<!-- 상단 바 -->
<div class="top-bar">
  <button class="nav-link" id="backBtn">← 목록</button>
  <span class="top-bar-title">그림 업로드</span>
  <button class="upload-btn" id="uploadBtn">업로드</button>
</div>

<div class="container">

  <!-- 제목 입력 -->
  <input type="text" class="title-input" id="imageTitle" placeholder="제목을 입력하세요">

  <!-- 캐릭터 태그 -->
  <div class="tag-section">
    <div class="tag-section-header">
      <span class="tag-section-label">등장 캐릭터</span>
      <button class="tag-toggle-btn" id="tagToggle">선택하기 ▾</button>
    </div>
    <div class="selected-tags" id="selectedTags">
      <span style="font-size:0.72rem;color:#b8a9c9;">태그를 선택하세요</span>
    </div>
    <div class="tag-picker collapsed" id="tagPicker">
      <!-- Firestore에서 캐릭터 로드 -->
    </div>
  </div>

  <!-- 파일 선택 -->
  <label class="drop-zone" id="dropZone">
    <span class="drop-zone-label">📷 눌러서 그림 선택하기</span>
    <input type="file" id="fileInput" accept="image/*">
  </label>

  <div class="preview-wrap" id="previewWrap">
    <img class="preview-img" id="previewImg" alt="미리보기">
    <div class="preview-filename" id="previewFilename"></div>
  </div>

  <div class="upload-info">
    감상용 이미지(최대 1600px)와 썸네일(최대 300px)로 자동 변환되어 업로드돼요. 원본 파일은 저장되지 않아요.
  </div>

  <div class="progress-wrap" id="progressWrap">
    <span class="progress-spinner"></span>
    <span id="progressText">변환 중...</span>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="../assets/personal-nav.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../assets/confirm-modal.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAV43y2kZnhgU7BhDlRg_r7IkeklidH6m8",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.firebasestorage.app",
    messagingSenderId: "145543545184",
    appId: "1:145543545184:web:e7411754d99d8b04b5de05"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  function setSyncStatus(online) {
    const badge = document.getElementById('syncBadge');
    if (online) {
      badge.classList.remove('offline');
      badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
    } else {
      badge.classList.add('offline');
      badge.innerHTML = '<span class="dot"></span>오프라인';
    }
  }
  db.collection('data').doc('characters').onSnapshot(
    () => setSyncStatus(true),
    () => setSyncStatus(false)
  );

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function generatePid() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < 8; i++) {
      result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
  }

  // ── 캐릭터 태그 ──
  let selectedCharacters = [];
  let allCharacters = [];

  async function loadCharacters() {
    try {
      const charDoc = await db.collection('data').doc('characters').get();
      if (!charDoc.exists) return;

      const groups = [];
      (charDoc.data().groups || []).forEach(owner => {
        (owner.subs || []).forEach(sub => {
          const chars = (sub.items || []).filter(ch => ch && ch.n).map(ch => ch.n);
          if (chars.length > 0) {
            groups.push({ label: `${owner.owner} — ${sub.label}`, chars });
          }
        });
      });

      allCharacters = groups;
      renderTagPicker();
    } catch (e) {
      console.error('캐릭터 로드 실패:', e);
    }
  }

  function renderTagPicker() {
    const picker = document.getElementById('tagPicker');
    picker.innerHTML = allCharacters.map(g => `
      <div class="tag-picker-group">
        <span class="tag-group-label">${g.label}</span>
        <div class="tag-picker-tags">
          ${g.chars.map(name => `
            <span class="pick-tag${selectedCharacters.includes(name) ? ' selected' : ''}"
                  data-name="${name}">${name}</span>
          `).join('')}
        </div>
      </div>
    `).join('');

    picker.querySelectorAll('.pick-tag').forEach(tag => {
      tag.addEventListener('click', () => {
        const name = tag.dataset.name;
        if (selectedCharacters.includes(name)) {
          selectedCharacters = selectedCharacters.filter(n => n !== name);
          tag.classList.remove('selected');
        } else {
          selectedCharacters.push(name);
          tag.classList.add('selected');
        }
        renderSelectedTags();
      });
    });
  }

  function renderSelectedTags() {
    const wrap = document.getElementById('selectedTags');
    if (selectedCharacters.length === 0) {
      wrap.innerHTML = '<span style="font-size:0.72rem;color:#b8a9c9;">태그를 선택하세요</span>';
      return;
    }
    wrap.innerHTML = selectedCharacters.map(name => `
      <span class="selected-tag">
        ${name}
        <span class="remove-tag" data-name="${name}">✕</span>
      </span>
    `).join('');

    wrap.querySelectorAll('.remove-tag').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.name;
        selectedCharacters = selectedCharacters.filter(n => n !== name);
        renderSelectedTags();
        renderTagPicker();
      });
    });
  }

  document.getElementById('tagToggle').addEventListener('click', () => {
    const picker = document.getElementById('tagPicker');
    const btn = document.getElementById('tagToggle');
    picker.classList.toggle('collapsed');
    btn.textContent = picker.classList.contains('collapsed') ? '선택하기 ▾' : '접기 ▴';
  });

  loadCharacters();

  // ── 뒤로가기 ──
  document.getElementById('backBtn').addEventListener('click', async () => {
    if (await customConfirm('업로드하지 않은 내용은 사라져요. 돌아갈까요?')) {
      location.href = 'image-list.html';
    }
  });

  // ── 파일 선택 & 미리보기 ──
  let selectedFile = null;
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg = document.getElementById('previewImg');
  const previewFilename = document.getElementById('previewFilename');

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    selectedFile = file;
    previewImg.src = URL.createObjectURL(file);
    previewFilename.textContent = file.name;
    previewWrap.classList.add('show');
    dropZone.querySelector('.drop-zone-label').textContent = '📷 다른 그림으로 바꾸기';
  });

  // ── 이미지 로드 & 리사이즈 ──
  function loadImage(file) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  }

  function resizeToWebp(img, maxSize, quality) {
    const scale = Math.min(1, maxSize / Math.max(img.naturalWidth, img.naturalHeight));
    const w = Math.max(1, Math.round(img.naturalWidth * scale));
    const h = Math.max(1, Math.round(img.naturalHeight * scale));
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    return new Promise((resolve, reject) => {
      canvas.toBlob(
        (blob) => blob ? resolve(blob) : reject(new Error('이미지 변환 실패')),
        'image/webp',
        quality
      );
    });
  }

  function uploadBlob(path, blob) {
    const ref = storage.ref(path);
    return ref.put(blob, { contentType: 'image/webp' }).then(() => ref.getDownloadURL());
  }

  // ── 진행 상태 표시 ──
  const progressWrap = document.getElementById('progressWrap');
  const progressText = document.getElementById('progressText');
  function setProgress(text) {
    progressWrap.classList.add('show');
    progressText.textContent = text;
  }
  function hideProgress() {
    progressWrap.classList.remove('show');
  }

  // ── 업로드 ──
  const uploadBtn = document.getElementById('uploadBtn');
  uploadBtn.addEventListener('click', async () => {
    const title = document.getElementById('imageTitle').value.trim();

    if (!title) { showToast('제목을 입력해주세요'); return; }
    if (!selectedFile) { showToast('그림을 선택해주세요'); return; }

    uploadBtn.disabled = true;
    try {
      setProgress('변환 중...');
      const img = await loadImage(selectedFile);
      const [fullBlob, thumbBlob] = await Promise.all([
        resizeToWebp(img, 1600, 0.85),
        resizeToWebp(img, 300, 0.8)
      ]);

      setProgress('업로드 중...');
      const pid = generatePid();
      const [fullUrl, thumbUrl] = await Promise.all([
        uploadBlob(`images/${pid}/full.webp`, fullBlob),
        uploadBlob(`images/${pid}/thumb.webp`, thumbBlob)
      ]);

      const batch = db.batch();
      const imageRef = db.collection('images').doc(pid);
      batch.set(imageRef, {
        title,
        characters: selectedCharacters,
        fullUrl,
        thumbUrl,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      const feedRef = db.collection('feed').doc();
      batch.set(feedRef, {
        type: 'image',
        refId: pid,
        title,
        thumb: thumbUrl,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await batch.commit();

      setProgress('완료!');
      showToast('업로드되었어요!');
      setTimeout(() => location.href = 'image-list.html', 800);
    } catch (e) {
      console.error('업로드 실패:', e);
      showToast('업로드에 실패했어요');
      hideProgress();
      uploadBtn.disabled = false;
    }
  });
</script>
</body>
</html>
