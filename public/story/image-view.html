<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연성대나무숲 — 그림 보기</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a89ec4">
<link rel="apple-touch-icon" href="/assets/icon/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<script src="/assets/pwa.js" defer></script>
<link rel="stylesheet" href="../assets/theme.css">
<style>
  @font-face {
    font-family: 'ko-font';
    src: url('../assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'ko-font', sans-serif;
    min-height: 100vh;
    background: var(--page-gradient); background-attachment: fixed;
    position: relative;
  }

  /* ── 상단 바 ── */
  .top-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface-glass-strong);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(184,169,201,0.15);
    padding: 0.7rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .top-bar-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .bookmark-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .bookmark-btn:hover { background: rgba(184,169,201,0.15); }

  .comment-toggle-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .comment-toggle-btn:hover { background: rgba(184,169,201,0.15); }
  .comment-toggle-btn.active {
    background: #b8a9c9;
    color: white;
    border-color: #b8a9c9;
  }

  /* ── 댓글 패널 ── */
  .comment-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 150;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }
  .comment-overlay.open { opacity: 1; visibility: visible; }

  .comment-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 340px;
    max-width: 88vw;
    background: rgba(245,240,232,0.97);
    backdrop-filter: blur(16px);
    z-index: 200;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 24px rgba(90,74,107,0.1);
  }
  .comment-panel.open { transform: translateX(0); }

  .comment-panel-header {
    padding: 1.2rem 1rem;
    border-bottom: 1px solid rgba(184,169,201,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .comment-panel-header h3 {
    font-family: 'ko-font', sans-serif;
    font-size: 0.95rem;
    color: #5a4a6b;
    font-weight: 700;
  }

  .comment-panel-close {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: #8a7a9a;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .comment-panel-close:hover { background: rgba(184,169,201,0.15); }

  .comment-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.4rem 1rem;
  }

  .comment-item {
    position: relative;
    padding: 0.8rem 1.7rem 0.8rem 0;
    border-bottom: 1px solid rgba(184,169,201,0.1);
  }
  .comment-item:last-child { border-bottom: none; }

  .comment-delete-btn {
    position: absolute;
    top: 0.7rem;
    right: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #c8b8d8;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .comment-delete-btn:hover {
    background: rgba(184,169,201,0.18);
    color: #8a6a9a;
  }

  .comment-chapter-tag {
    display: inline-block;
    padding: 0.1rem 0.45rem;
    margin-bottom: 0.35rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 8px;
    font-size: 0.65rem;
  }

  .comment-body {
    font-size: 0.85rem;
    color: #4a3a5b;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .comment-date {
    font-size: 0.68rem;
    color: #a99ab8;
    margin-top: 0.3rem;
  }

  .comment-empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: #a99ab8;
    font-size: 0.8rem;
  }

  .comment-form {
    padding: 0.9rem 1rem;
    border-top: 1px solid rgba(184,169,201,0.15);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .comment-input {
    width: 100%;
    resize: vertical;
    min-height: 56px;
    padding: 0.6rem 0.7rem;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.6);
    color: #4a3a5b;
    font-size: 0.82rem;
    font-family: 'ko-font', sans-serif;
    line-height: 1.5;
  }
  .comment-input:focus {
    outline: none;
    border-color: #b8a9c9;
  }

  .comment-submit-btn {
    align-self: flex-end;
    padding: 0.45rem 1.1rem;
    background: #b8a9c9;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'ko-font', sans-serif;
    transition: all 0.2s;
  }
  .comment-submit-btn:hover { background: #a594b8; }
  .comment-submit-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── 설정 드롭다운 ── */
  .settings-wrap { position: relative; }

  .settings-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(184,169,201,0.3);
    border-radius: 8px;
    background: rgba(255,255,255,0.5);
    color: #8a7a9a;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .settings-btn:hover { background: rgba(184,169,201,0.15); border-color: rgba(184,169,201,0.4); }
  .settings-btn.open { background: rgba(184,169,201,0.18); border-color: rgba(184,169,201,0.5); color: #6a5a7a; }

  .settings-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(184,169,201,0.2);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(90,74,107,0.13);
    min-width: 108px;
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px) scale(0.97);
    transition: opacity 0.17s ease, transform 0.17s ease, visibility 0.17s;
    z-index: 300;
  }
  .settings-dropdown.open {
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
  }

  .settings-item {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.62rem 0.95rem;
    font-family: 'ko-font', sans-serif;
    font-size: 0.82rem;
    color: #5a4a6b;
    cursor: pointer;
    transition: background 0.13s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .settings-item:hover { background: rgba(184,169,201,0.1); }
  .settings-item + .settings-item { border-top: 1px solid rgba(184,169,201,0.12); }
  .settings-item.danger { color: #b06070; }
  .settings-item.danger:hover { background: rgba(194,114,127,0.08); }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1.2rem 3rem;
  }

  .set-title {
    font-family: 'ko-font', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: #4a3a5b;
    margin-bottom: 0.6rem;
    word-break: keep-all;
  }

  .set-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.8rem;
  }
  .set-tag {
    font-size: 0.68rem;
    padding: 0.15rem 0.55rem;
    background: rgba(184,169,201,0.15);
    color: #7a6a8a;
    border-radius: 10px;
  }

  .set-desc {
    font-size: 0.85rem;
    color: #6a5a7a;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: keep-all;
    margin-bottom: 1.4rem;
    padding: 0.9rem 1rem;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
  }

  /* ── 그림 뷰어 ── */
  .viewer-main {
    text-align: center;
    margin-bottom: 1rem;
  }
  .viewer-img {
    max-width: 100%;
    max-height: 68vh;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(90,74,107,0.18);
  }

  .chapter-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: 0.8rem;
  }
  .nav-arrow {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid rgba(184,169,201,0.3);
    background: rgba(255,255,255,0.6);
    color: #7a6a8a;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-arrow:hover:not(:disabled) { background: rgba(184,169,201,0.2); border-color: #b8a9c9; }
  .nav-arrow:disabled { opacity: 0.35; cursor: default; }
  .chapter-position {
    font-size: 0.78rem;
    color: #8a7a9a;
    min-width: 3.5rem;
    text-align: center;
  }

  /* ── 그림 스트립 ── */
  .ch-strip {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    padding: 0.4rem 0.1rem 0.8rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(184,169,201,0.3) transparent;
  }
  .ch-thumb {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.55;
    transition: all 0.2s;
  }
  .ch-thumb:hover { opacity: 0.85; }
  .ch-thumb.active {
    opacity: 1;
    border-color: #b8a9c9;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: #a99ab8;
  }
  .empty-state .icon {
    font-size: 2.5rem;
    margin-bottom: 0.8rem;
    opacity: 0.5;
  }
  .empty-state p {
    font-size: 0.85rem;
    line-height: 1.6;
  }
  .empty-state a {
    color: #8a7a9a;
    text-decoration: underline;
  }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(90,74,107,0.9);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 400;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="sync-badge" id="syncBadge"><span class="dot"></span>실시간 연결됨</div>

<div class="top-bar">
  <button class="nav-link" id="backBtn">← 목록</button>
  <div class="top-bar-actions">
    <button class="bookmark-btn" id="bookmarkBtn" title="저장" style="display:none;">🔖</button>
    <button class="comment-toggle-btn" id="commentToggleBtn" title="댓글" style="display:none;">💬</button>
    <div class="settings-wrap" id="settingsWrap" style="display:none;">
      <button class="settings-btn" id="settingsBtn" title="설정">⚙</button>
      <div class="settings-dropdown" id="settingsDropdown">
        <button class="settings-item" id="editItem">✏ 수정</button>
        <button class="settings-item danger" id="deleteItem">🗑 삭제</button>
      </div>
    </div>
  </div>
</div>

<div class="container" id="mainContainer">
  <div class="empty-state"><div class="icon">⏳</div><p>불러오는 중...</p></div>
</div>

<div class="toast" id="toast"></div>

<!-- 댓글 패널 -->
<div class="comment-overlay" id="commentOverlay"></div>
<div class="comment-panel" id="commentPanel">
  <div class="comment-panel-header">
    <h3>댓글</h3>
    <button class="comment-panel-close" id="commentPanelClose">✕</button>
  </div>
  <div class="comment-list" id="commentList"></div>
  <div class="comment-form">
    <textarea class="comment-input" id="commentInput" placeholder="댓글을 남겨보세요" rows="2" maxlength="500"></textarea>
    <button class="comment-submit-btn" id="commentSubmitBtn">등록</button>
  </div>
</div>

<script src="../assets/personal-nav.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="../assets/confirm-modal.js"></script>
<script src="../assets/storage-modal.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAV43y2kZnhgU7BhDlRg_r7IkeklidH6m8",
    authDomain: "oc-yeonsung.firebaseapp.com",
    projectId: "oc-yeonsung",
    storageBucket: "oc-yeonsung.firebasestorage.app",
    messagingSenderId: "145543545184",
    appId: "1:145543545184:web:e7411754d99d8b04b5de05"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const storage = firebase.storage();

  const params = new URLSearchParams(location.search);
  const pid = params.get('pid');

  function setSyncStatus(online) {
    const badge = document.getElementById('syncBadge');
    if (online) {
      badge.classList.remove('offline');
      badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
    } else {
      badge.classList.add('offline');
      badge.innerHTML = '<span class="dot"></span>오프라인';
    }
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  let imageSet = null;
  let chapters = [];
  let currentIndex = 0;
  let comments = [];

  let USER_NAMES = ['김굥', '하지', '예밍'];
  async function loadUserNames() {
    try {
      const doc = await db.collection('data').doc('users').get();
      if (doc.exists && Array.isArray(doc.data().names) && doc.data().names.length) {
        USER_NAMES = doc.data().names;
      }
    } catch (e) {
      console.warn('유저 목록 로드 실패:', e);
    }
  }
  loadUserNames();

  async function loadImageSet() {
    try {
      const doc = await db.collection('images').doc(pid).get();
      if (!doc.exists) {
        document.getElementById('mainContainer').innerHTML =
          '<div class="empty-state"><div class="icon">📭</div><p>존재하지 않는 그림이에요</p><a href="image-list.html">목록으로 돌아가기</a></div>';
        return;
      }
      imageSet = doc.data();

      const chapSnap = await db.collection('imageChapters').where('setId', '==', pid).get();
      chapters = chapSnap.docs.map(cdoc => ({
        chapterPid: cdoc.id,
        imageUrl: cdoc.data().imageUrl || '',
        order: cdoc.data().order ?? 0
      })).sort((a, b) => a.order - b.order);

      document.getElementById('settingsWrap').style.display = 'flex';
      document.getElementById('bookmarkBtn').style.display = 'flex';
      document.getElementById('commentToggleBtn').style.display = 'flex';
      renderSet();
      loadComments();
      setSyncStatus(true);
    } catch (e) {
      console.error('로드 실패:', e);
      document.getElementById('mainContainer').innerHTML =
        '<div class="empty-state"><div class="icon">⚠</div><p>그림을 불러오지 못했어요</p><a href="image-list.html">목록으로 돌아가기</a></div>';
      setSyncStatus(false);
    }
  }

  function renderSet() {
    const tagsHtml = [...(imageSet.characters || []), ...(imageSet.tags || [])]
      .map(t => `<span class="set-tag">${escapeHtml(t)}</span>`).join('');

    document.getElementById('mainContainer').innerHTML = `
      <h1 class="set-title">${escapeHtml(imageSet.title || '(제목 없음)')}</h1>
      ${tagsHtml ? `<div class="set-tags">${tagsHtml}</div>` : ''}
      ${imageSet.description ? `<p class="set-desc">${escapeHtml(imageSet.description)}</p>` : ''}
      <div class="viewer-main">
        <img class="viewer-img" id="viewerImg" alt="">
        <div class="chapter-nav" id="chapterNav" style="display:none;">
          <button class="nav-arrow" id="prevBtn">‹</button>
          <span class="chapter-position" id="chapterPosition"></span>
          <button class="nav-arrow" id="nextBtn">›</button>
        </div>
      </div>
      <div class="ch-strip" id="chStrip" style="display:none;"></div>
    `;

    if (chapters.length > 1) {
      document.getElementById('chapterNav').style.display = 'flex';
      document.getElementById('chStrip').style.display = 'flex';
      document.getElementById('prevBtn').addEventListener('click', () => switchChapter(currentIndex - 1));
      document.getElementById('nextBtn').addEventListener('click', () => switchChapter(currentIndex + 1));
    }

    switchChapter(0);
  }

  function switchChapter(index) {
    if (index < 0 || index >= chapters.length) return;
    currentIndex = index;
    document.getElementById('viewerImg').src = chapters[index].imageUrl;

    if (chapters.length > 1) {
      document.getElementById('chapterPosition').textContent = `${index + 1} / ${chapters.length}`;
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === chapters.length - 1;

      const strip = document.getElementById('chStrip');
      strip.innerHTML = chapters.map((ch, i) => `
        <img class="ch-thumb${i === index ? ' active' : ''}" data-index="${i}" src="${escapeHtml(ch.imageUrl)}" loading="lazy" alt="그림 ${i + 1}">
      `).join('');
      strip.querySelectorAll('.ch-thumb').forEach(el => {
        el.addEventListener('click', () => switchChapter(Number(el.dataset.index)));
      });
    }
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') switchChapter(currentIndex - 1);
    else if (e.key === 'ArrowRight') switchChapter(currentIndex + 1);
  });

  // ── 뒤로가기 ──
  document.getElementById('backBtn').addEventListener('click', () => {
    location.href = 'image-list.html';
  });

  // ── 북마크 버튼 ──
  document.getElementById('bookmarkBtn').addEventListener('click', async () => {
    const result = await openStoragePicker({
      title: '저장하기',
      users: USER_NAMES,
      targets: [
        { key: 'readLater', label: '📌 나중에 볼 연성' },
        { key: 'storyBox', label: '📚 연성 보관함' }
      ]
    });
    if (!result) return;

    const targetLabel = result.target === 'readLater' ? '나중에 볼 연성' : '연성 보관함';
    try {
      const ref = db.collection('users').doc(result.user).collection(result.target);
      const dup = await ref.where('storyId', '==', pid).limit(1).get();
      if (!dup.empty) {
        showToast('이미 저장되어 있어요');
        return;
      }
      await ref.add({
        storyId: pid,
        title: imageSet.title || '(제목 없음)',
        type: 'image',
        addedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast(`${result.user}님의 ${targetLabel}에 저장했어요`);
    } catch (e) {
      console.error('저장 실패:', e);
      showToast('저장에 실패했어요');
    }
  });

  // ── 설정 드롭다운 ──
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsDropdown = document.getElementById('settingsDropdown');

  settingsBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = settingsDropdown.classList.contains('open');
    settingsDropdown.classList.toggle('open', !isOpen);
    settingsBtn.classList.toggle('open', !isOpen);
  });
  document.addEventListener('click', () => {
    settingsDropdown.classList.remove('open');
    settingsBtn.classList.remove('open');
  });

  document.getElementById('editItem').addEventListener('click', () => {
    location.href = `image-write.html?pid=${pid}`;
  });

  document.getElementById('deleteItem').addEventListener('click', async () => {
    if (!(await customConfirm(`"${imageSet?.title || '이 그림'}"을(를) 삭제할까요?\n그림과 댓글도 모두 삭제돼요.`))) return;

    try {
      const batch = db.batch();
      chapters.forEach(ch => batch.delete(db.collection('imageChapters').doc(ch.chapterPid)));

      const commentSnap = await db.collection('comments').where('storyId', '==', pid).get();
      commentSnap.docs.forEach(doc => batch.delete(doc.ref));

      batch.delete(db.collection('images').doc(pid));
      batch.delete(db.collection('feed').doc(pid));
      await batch.commit();

      await Promise.all([
        ...chapters.map(ch => storage.ref(`images/${pid}/chapters/${ch.chapterPid}/full.webp`).delete().catch(() => {})),
        storage.ref(`images/${pid}/thumb.webp`).delete().catch(() => {})
      ]);

      showToast('삭제했어요');
      setTimeout(() => { location.href = 'image-list.html'; }, 600);
    } catch (e) {
      console.error('삭제 실패:', e);
      showToast('삭제에 실패했어요');
    }
  });

  // ── 댓글 ──
  function currentChapter() {
    return chapters[currentIndex] || null;
  }

  function chapterLabel(chapterPid) {
    const idx = chapters.findIndex(c => c.chapterPid === chapterPid);
    if (idx === -1) return '';
    return `${idx + 1}번째 그림`;
  }

  async function loadComments() {
    try {
      const snap = await db.collection('comments').where('storyId', '==', pid).get();
      comments = snap.docs.map(doc => ({
        id: doc.id,
        body: doc.data().body || '',
        chapterPid: doc.data().chapterPid || '',
        createdAt: doc.data().createdAt
      })).sort((a, b) => {
        const at = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
        const bt = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
        return bt - at;
      });
      renderComments();
    } catch (e) {
      console.error('댓글 로드 실패:', e);
    }
  }

  function renderComments() {
    const list = document.getElementById('commentList');
    if (comments.length === 0) {
      list.innerHTML = '<div class="comment-empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const dateStr = c.createdAt?.toDate ? formatCommentDate(c.createdAt.toDate()) : '';
      const chapterTag = chapters.length > 1 ? chapterLabel(c.chapterPid) : '';
      return `
        <div class="comment-item">
          <button class="comment-delete-btn" data-id="${c.id}" title="댓글 삭제" aria-label="댓글 삭제">✕</button>
          ${chapterTag ? `<span class="comment-chapter-tag">${escapeHtml(chapterTag)}</span>` : ''}
          <div class="comment-body">${escapeHtml(c.body)}</div>
          ${dateStr ? `<div class="comment-date">${dateStr}</div>` : ''}
        </div>
      `;
    }).join('');

    list.querySelectorAll('.comment-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteComment(btn.dataset.id));
    });
  }

  async function deleteComment(commentId) {
    if (!(await customConfirm('이 댓글을 삭제할까요?'))) return;
    try {
      const batch = db.batch();
      batch.delete(db.collection('comments').doc(commentId));
      batch.update(db.collection('images').doc(pid), {
        commentCount: firebase.firestore.FieldValue.increment(-1)
      });
      await batch.commit();

      await loadComments();
      showToast('댓글을 삭제했어요');
    } catch (e) {
      console.error('댓글 삭제 실패:', e);
      showToast('댓글 삭제에 실패했어요');
    }
  }

  async function submitComment() {
    const ch = currentChapter();
    if (!ch) return;

    const input = document.getElementById('commentInput');
    const body = input.value.trim();
    if (!body) return;

    const btn = document.getElementById('commentSubmitBtn');
    btn.disabled = true;
    try {
      const commentRef = db.collection('comments').doc();
      const batch = db.batch();
      batch.set(commentRef, {
        storyId: pid,
        chapterPid: ch.chapterPid,
        body,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      batch.update(db.collection('images').doc(pid), {
        commentCount: firebase.firestore.FieldValue.increment(1)
      });
      await batch.commit();

      input.value = '';
      await loadComments();
      showToast('댓글이 등록되었어요');
    } catch (e) {
      console.error('댓글 등록 실패:', e);
      showToast('댓글 등록에 실패했어요');
    } finally {
      btn.disabled = false;
    }
  }

  function openCommentPanel() {
    document.getElementById('commentPanel').classList.add('open');
    document.getElementById('commentOverlay').classList.add('open');
    document.getElementById('commentToggleBtn').classList.add('active');
  }

  function closeCommentPanel() {
    document.getElementById('commentPanel').classList.remove('open');
    document.getElementById('commentOverlay').classList.remove('open');
    document.getElementById('commentToggleBtn').classList.remove('active');
  }

  document.getElementById('commentToggleBtn').addEventListener('click', () => {
    const isOpen = document.getElementById('commentPanel').classList.contains('open');
    isOpen ? closeCommentPanel() : openCommentPanel();
  });
  document.getElementById('commentPanelClose').addEventListener('click', closeCommentPanel);
  document.getElementById('commentOverlay').addEventListener('click', closeCommentPanel);
  document.getElementById('commentSubmitBtn').addEventListener('click', submitComment);

  function formatCommentDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const hh = String(date.getHours()).padStart(2, '0');
    const mm = String(date.getMinutes()).padStart(2, '0');
    return `${y}.${m}.${d} ${hh}:${mm}`;
  }

  loadImageSet();
</script>
</body>
</html>
