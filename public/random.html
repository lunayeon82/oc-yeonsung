<style>
  @font-face {
    font-family: 'ko-font';
    src: url('assets/ko-font.ttf') format('truetype');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body); background: var(--page-gradient); background-attachment: fixed;
    color: var(--text); min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .app {
    position: relative; z-index: 1;
    max-width: 720px; margin: 0 auto;
    padding: 20px 16px 120px;
  }


  /* Loading */
  .loading { text-align: center; padding: 60px 0; color: var(--text-dim); font-size: 0.9rem; }
  .loading .spinner { display: inline-block; width: 24px; height: 24px; border: 2.5px solid var(--border); border-top-color: var(--pink); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Pick Zone */
  .pick-zone {
    background: var(--surface-glass); backdrop-filter: blur(8px); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 16px 24px;
    text-align: center; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .pick-zone::after {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translateX(-50%); width: 60%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), var(--violet), transparent);
  }

  .count-select { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
  .count-label { font-size: 0.75rem; color: var(--text-dim); font-weight: 600; }
  .count-btns { display: flex; gap: 6px; }
  .count-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-family: var(--font-title); font-weight: 700;
    font-size: 0.85rem; cursor: pointer; transition: all 0.18s;
  }
  .count-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .count-btn.active { border-color: var(--violet); background: var(--violet-dim); color: var(--violet); box-shadow: 0 0 10px rgba(167,139,250,0.2); }

  .pick-counts {
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    font-size: 0.75rem; color: var(--text-dim); margin-bottom: 16px;
  }

  .result-coupling {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; min-height: 48px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .result-side { font-family: var(--font-title); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; min-width: 50px; }
  .result-side .ph { color: var(--text-muted); font-weight: 400; font-size: 0.85rem; }
  .result-x { font-family: var(--font-title); font-weight: 800; font-size: 1.1rem; color: var(--violet); opacity: 0.7; }
  .result-pop { animation: pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }

  .result-subs { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .result-sub-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .result-sub-label { flex-shrink: 0; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); min-width: 44px; text-align: right; }
  .result-role-group { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center; }
  .result-sub-value { font-family: var(--font-title); font-weight: 700; font-size: 1rem; letter-spacing: -0.01em; min-width: 40px; }
  .result-sub-value .ph { color: var(--text-muted); font-weight: 400; font-size: 0.8rem; }
  .result-role-sep { color: var(--violet); opacity: 0.7; font-weight: 800; font-size: 0.9rem; margin: 0 2px; }
  .result-role-text { color: var(--amber); }
  .result-au-text { color: var(--mint); }

  .reroll-btn {
    padding: 3px 10px; border-radius: 100px;
    border: 1px solid var(--violet); background: var(--violet-dim);
    color: var(--violet); font-size: 0.65rem; font-weight: 600;
    cursor: pointer; font-family: var(--font-body); transition: all 0.18s;
  }
  .reroll-btn:hover { background: var(--violet); color: #fff; }
  .reroll-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .result-actions {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 14px;
  }
  .copy-result-btn {
    padding: 5px 14px;
    border-radius: 100px; border: 1px solid var(--violet);
    background: var(--violet-dim); color: var(--violet);
    font-size: 0.7rem; font-weight: 600; cursor: pointer;
    font-family: var(--font-body); transition: all 0.18s;
  }
  .copy-result-btn:hover { background: var(--violet); color: #fff; }

  .pick-btn {
    padding: 12px 44px; border: none; border-radius: 100px;
    background: linear-gradient(135deg, var(--pink), var(--violet));
    color: #fff; font-family: var(--font-title);
    font-size: 1.05rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(192,137,158,0.25);
  }
  .pick-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(192,137,158,0.35); }
  .pick-btn:active { transform: scale(0.97); }
  .pick-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .history { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 14px; min-height: 24px; }
  .history-chip { padding: 3px 10px; border-radius: 100px; background: var(--violet-dim); border: 1px solid var(--violet); font-size: 0.67rem; color: var(--violet); animation: chipIn 0.25s ease; cursor: pointer; transition: all 0.18s; }
  .history-chip:hover { background: var(--violet); color: #fff; }
  .history-chip:active { transform: scale(0.95); }
  .history-clear { background: none; border: 1px dashed var(--border); color: var(--text-muted); font-size: 0.65rem; padding: 3px 8px; border-radius: 100px; cursor: pointer; font-family: var(--font-body); }
  .history-clear:hover { border-color: var(--rose); color: var(--rose); }
  @keyframes chipIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }

  .list-btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .list-btn {
    padding: 6px 14px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-size: 0.75rem; font-weight: 600;
    cursor: pointer; font-family: var(--font-body); transition: all 0.18s;
  }
  .list-btn:hover { border-color: var(--text-dim); color: var(--text); }

  .pool-card {
    background: var(--surface-glass); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px 16px 4px; margin-bottom: 20px;
  }

  .pool-tabs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
  }
  .pool-tab {
    flex: 1 1 auto; min-width: 86px;
    padding: 10px 6px; text-align: center;
    font-family: var(--font-title); font-weight: 700;
    font-size: 0.85rem; cursor: pointer;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); color: var(--text-dim);
    transition: all 0.2s;
  }
  .pool-tab:hover { border-color: var(--text-dim); color: var(--text); }
  .pool-tab.active { border-color: var(--violet); color: var(--violet); background: var(--violet-dim); }
  .pool-tab .tc { font-size: 0.65rem; font-weight: 400; margin-left: 4px; opacity: 0.6; }

  .override-bar {
    display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    margin-bottom: 12px; padding: 8px 12px;
    background: none; border: 1px solid var(--border); border-radius: 10px;
    font-size: 0.78rem;
  }
  .ov-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-dim); user-select: none; }
  .ov-toggle input { accent-color: var(--violet); width: 15px; height: 15px; }
  .ov-copy { display: flex; align-items: center; gap: 6px; }
  .ov-copy select {
    padding: 4px 8px; border-radius: 100px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 0.75rem; font-family: var(--font-body);
  }
  .ov-copy-btn {
    padding: 4px 10px; border-radius: 100px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-dim); font-size: 0.72rem;
    cursor: pointer; font-family: var(--font-body); transition: all 0.18s;
  }
  .ov-copy-btn:hover { border-color: var(--violet); color: var(--violet); }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; padding: 0 4px; }
  .fbtn {
    padding: 5px 12px; border-radius: 100px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-size: 0.73rem; font-weight: 600;
    cursor: pointer; font-family: var(--font-body); transition: all 0.18s;
  }
  .fbtn:hover { border-color: var(--text-dim); color: var(--text); }
  .fbtn.active { border-color: var(--violet); background: var(--violet-dim); color: var(--violet); }

  .pool-readonly-note {
    font-size: 0.78rem; color: var(--text-muted); background: none; text-align: center;
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; margin-bottom: 12px;
  }

  .category { margin-bottom: 24px; }
  .cat-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .cat-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .cat-title { font-family: var(--font-title); font-weight: 800; font-size: 1.15rem; }
  .cat-toggle { margin-left: auto; padding: 4px 10px; border-radius: 100px; border: 1px solid var(--border); background: none; color: var(--text-dim); font-size: 0.65rem; cursor: pointer; font-family: var(--font-body); white-space: nowrap; }
  .cat-toggle:hover { border-color: var(--text-dim); color: var(--text); }

  .owner-block { margin-bottom: 16px; }
  .owner-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-left: 4px; }
  .owner-name { font-family: var(--font-title); font-weight: 700; font-size: 0.95rem; }

  .sub-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .sub-label { flex-shrink: 0; width: 60px; padding: 5px 0; font-size: 0.73rem; font-weight: 600; color: var(--text-dim); text-align: right; line-height: 1.9; }
  .sub-items { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }

  .ch {
    padding: 6px 14px; border-radius: 100px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text-dim); font-size: 0.8rem; font-weight: 600;
    cursor: pointer; font-family: var(--font-body);
    transition: all 0.18s; user-select: none;
  }
  .ch:hover { border-color: var(--text-dim); color: var(--text); }
  .ch.on { border-color: var(--violet); background: var(--violet-dim); color: var(--text); font-weight: 700; box-shadow: 0 0 12px var(--violet-dim); }
  .ch.on::before { content: '✓ '; font-size: 0.65rem; color: var(--violet); }
  .ch.filtered-out { opacity: 0.25; pointer-events: none; }
  .ch .tag { display: inline-block; font-size: 0.55rem; margin-left: 3px; vertical-align: middle; opacity: 0.6; }
  .ch-readonly { cursor: default; opacity: 0.75; }
  .ch-readonly:hover { border-color: var(--border); color: var(--text-dim); }

  .empty { color: var(--text-muted); font-size: 0.8rem; padding: 8px 0 0 4px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #f7f2ec; border: 1px solid #e5ddd3;
    border-radius: 14px; padding: 24px; width: 100%; max-width: 400px;
    max-height: 70vh; overflow-y: auto;
    transform: translateY(20px); transition: transform 0.25s;
    position: relative;
  }
  .modal-ribbon {
    display: block; margin: 0 auto 12px;
    max-height: 36px; width: auto;
  }
  .modal-exit {
    position: absolute; top: 12px; right: 12px;
    background: none; border: none; cursor: pointer;
    padding: 0; line-height: 0;
  }
  .modal-exit img { width: 22px; height: 22px; opacity: 0.55; transition: opacity 0.15s; }
  .modal-exit:hover img { opacity: 1; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-family: var(--font-title); font-weight: 700; margin-bottom: 16px; font-size: 1.1rem; }
  .modal-list { list-style: none; }
  .modal-list li {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
  }
  .modal-list li:last-child { border-bottom: none; }
  .modal-list .idx { color: var(--text-muted); font-size: 0.7rem; min-width: 20px; }
  .modal-list .group-label {
    padding: 10px 12px 6px; font-size: 0.7rem; font-weight: 700;
    color: var(--violet); letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border); background: var(--surface2);
  }
  .modal-close {
    margin-top: 16px; width: 100%; padding: 10px;
    border: none; border-radius: 10px; background: var(--surface2);
    color: var(--text); font-weight: 600; cursor: pointer;
    font-family: var(--font-body); font-size: 0.85rem;
  }
  .modal-close:hover { background: var(--border); }

  .ptcl { position: fixed; width: 5px; height: 5px; border-radius: 50%; pointer-events: none; z-index: 200; animation: fly 0.7s ease-out forwards; }
  @keyframes fly { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 18px; border-radius: 100px;
    font-size: 0.8rem; z-index: 300;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .app { padding: 12px 12px 100px; }
    .sub-label { width: 48px; font-size: 0.68rem; }
    .ch { padding: 5px 11px; font-size: 0.75rem; }
    .ch .tag { font-size: 0.5rem; }
    .result-side { font-size: 1.15rem; }
    .result-x { font-size: 0.95rem; }
    .result-sub-value { font-size: 0.9rem; }
    .pick-btn { padding: 11px 36px; font-size: 0.95rem; }
    .pool-tab { font-size: 0.78rem; min-width: 74px; padding: 8px 4px; }
    .fbtn { padding: 4px 10px; font-size: 0.68rem; }
    .count-btn { width: 28px; height: 28px; }
  }
</style>
</head>

      </div>

        <button class="fbtn" data-filter="solo" onclick="toggleFilter(this)">솔로만</button>
        <button class="fbtn" data-filter="couple" onclick="toggleFilter(this)">커플만</button>
      </div>

      <div id="poolSection"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="listModal" onclick="if(event.target===this)closeListModal()">
  <div class="modal">
    <button class="modal-exit" onclick="closeListModal()"><img src="assets/modal/exit.png" alt="닫기"></button>

let overrides = [null, null, null, null, null]; // Set|null per position (0-indexed)
let activeTab = 'common'; // 'common' or position index (number)
const filtersByTab = {}; // key -> Set

let spinning = false;
const hist = [];
let currentNames = [], currentRoles = [], currentRolesShared = false, currentAU = null;
let hasResult = false;

// ============ FIREBASE LOAD / SEED ============
async function initData() {
  try {
    // Try to load from Firestore
    const charDoc = await db.collection('data').doc('characters').get();
    const roleDoc = await db.collection('data').doc('roles').get();
    const auDoc = await db.collection('data').doc('aus').get();
    const usersDoc = await db.collection('data').doc('users').get();

    if (usersDoc.exists && Array.isArray(usersDoc.data().names) && usersDoc.data().names.length) {
      USER_NAMES = usersDoc.data().names;
    }

    if (!charDoc.exists) {
      // First time: seed Firestore with defaults
      await db.collection('data').doc('characters').set(DEFAULT_CHARS);
      await db.collection('data').doc('roles').set(DEFAULT_ROLES);
      await db.collection('data').doc('aus').set(DEFAULT_AUS);
      CHARS = DEFAULT_CHARS;
      ROLES = DEFAULT_ROLES;
      AUS = DEFAULT_AUS;
    } else {
      CHARS = charDoc.data();
      if (roleDoc.exists) {
        const rd = roleDoc.data();
        ROLES = rd.groups ? rd : { groups: [{ label: '기본', items: rd.list || [] }] };
      } else { ROLES = DEFAULT_ROLES; }
      if (auDoc.exists) {
        const ad = auDoc.data();
        AUS = ad.groups ? ad : { groups: [{ label: '기본', items: ad.list || [] }] };
      } else { AUS = DEFAULT_AUS; }
    }

    buildCharMap();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    setSyncStatus(true);
    renderAll();

    // Listen for real-time updates
    startListeners();
  } catch (err) {
    console.error('Firebase load error:', err);
    // Fallback to defaults
    CHARS = DEFAULT_CHARS;
    ROLES = DEFAULT_ROLES;
    AUS = DEFAULT_AUS;
    buildCharMap();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    setSyncStatus(false);
    renderAll();
    toast('오프라인 모드 (로컬 데이터)');
  }
}

function buildCharMap() {
  charMap = {};
  CHARS.groups.forEach(g => g.subs.forEach(s => s.items.forEach(it => {
    charMap[it.n] = { gender: it.g, couple: it.c };
  })));
}

function startListeners() {
  db.collection('data').doc('characters').onSnapshot(doc => {
    if (doc.exists) {
      CHARS = doc.data();
      buildCharMap();
      renderPoolTabs();
      renderPoolSection();
      updCounts();
      setSyncStatus(true);
    }
  }, err => { console.warn('Char listener error:', err); setSyncStatus(false); });

  db.collection('data').doc('roles').onSnapshot(doc => {
    if (doc.exists) {
      const rd = doc.data();
      ROLES = rd.groups ? rd : { groups: [{ label: '기본', items: rd.list || [] }] };
    }
    setSyncStatus(true);
  }, err => setSyncStatus(false));

  db.collection('data').doc('aus').onSnapshot(doc => {
    if (doc.exists) {
      const ad = doc.data();
      AUS = ad.groups ? ad : { groups: [{ label: '기본', items: ad.list || [] }] };
    }
    setSyncStatus(true);
  }, err => setSyncStatus(false));
}

function setSyncStatus(online) {
  const badge = document.getElementById('syncBadge');
  if (online) {
    badge.classList.remove('offline');
    badge.innerHTML = '<span class="dot"></span>실시간 연결됨';
  } else {
    badge.classList.add('offline');
    badge.innerHTML = '<span class="dot"></span>오프라인';
  }
}

// ============ RENDER: OVERALL ============
function renderAll() {
  renderCountBtns();
  renderResultPlaceholder();
  renderPoolTabs();
  renderOverrideBar();
  renderPoolSection();
  renderHist();
  updCounts();
}

// ============ PARTICIPANT COUNT ============
function renderCountBtns() {
  const el = document.getElementById('countBtns');
  el.innerHTML = [1,2,3,4,5].map(n =>
    `<button class="count-btn${n===participantCount?' active':''}" onclick="setParticipantCount(${n})">${n}</button>`
  ).join('');
}

function setParticipantCount(n) {
  if (n === participantCount) return;
  participantCount = n;
  for (let i = n; i < MAX_PARTICIPANTS; i++) overrides[i] = null;
  if (activeTab !== 'common' && activeTab >= n) activeTab = 'common';
  renderCountBtns();
  renderResultPlaceholder();
  renderPoolTabs();
  renderOverrideBar();
  renderPoolSection();
  updCounts();
}

// ============ FILTERS ============
function getFilters(key) {
  if (!filtersByTab[key]) filtersByTab[key] = new Set();
  return filtersByTab[key];
}

function activeFilterKey() { return activeTab === 'common' ? 'common' : activeTab; }

function syncFilterBtns() {
  const f = getFilters(activeFilterKey());
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('active', f.has(b.dataset.filter)));
}

function toggleFilter(btn) {
  const f = getFilters(activeFilterKey());
  const k = btn.dataset.filter;
  if(k==='male'&&f.has('female')) f.delete('female');
  if(k==='female'&&f.has('male')) f.delete('male');
  if(k==='solo'&&f.has('couple')) f.delete('couple');
  if(k==='couple'&&f.has('solo')) f.delete('solo');
  if(f.has(k)) f.delete(k); else f.add(k);
  syncFilterBtns(); applyFiltersToSection();
}

function passesFilter(name, fs) {
  const c = charMap[name]; if(!c) return true;
  if(fs.has('male')&&c.gender!==0) return false;
  if(fs.has('female')&&c.gender!==1) return false;
  if(fs.has('solo')&&c.couple!==0) return false;
  if(fs.has('couple')&&c.couple!==1) return false;
  return true;
}

function applyFiltersToSection() {
  const f = getFilters(activeFilterKey());
  document.querySelectorAll('#poolSection .ch').forEach(b => {
    b.classList.toggle('filtered-out', f.size>0 && !passesFilter(b.dataset.name, f));
  });
}

// ============ POOL TABS ============
function renderPoolTabs() {
  const el = document.getElementById('poolTabs');
  let html = `<button class="pool-tab${activeTab==='common'?' active':''}" onclick="switchTab('common')">🎯 공통 후보<span class="tc">(${commonSel.size})</span></button>`;
  for (let i=0;i<participantCount;i++) {
    const ov = overrides[i];
    const cnt = ov ? ov.size : commonSel.size;
    const label = ov ? `위치${i+1} *` : `위치${i+1}`;
    html += `<button class="pool-tab${activeTab===i?' active':''}" onclick="switchTab(${i})">${label}<span class="tc">(${cnt})</span></button>`;
  }
  el.innerHTML = html;
}

function switchTab(tab) {
  activeTab = tab;
  renderPoolTabs();
  renderOverrideBar();
  renderPoolSection();
}

// ============ OVERRIDE BAR ============
function renderOverrideBar() {
  const el = document.getElementById('overrideBar');
  if (activeTab === 'common') { el.style.display = 'none'; el.innerHTML = ''; return; }
  el.style.display = 'flex';
  const i = activeTab;
  const isOv = !!overrides[i];
  let sourcesHtml = `<option value="common">공통 후보</option>`;
  for (let k=0;k<participantCount;k++) { if (k===i) continue; sourcesHtml += `<option value="${k}">위치${k+1}</option>`; }
  el.innerHTML = `
    <label class="ov-toggle">
      <input type="checkbox" ${isOv?'checked':''} onchange="toggleOverride(this.checked)">
      이 위치만 다르게 설정
    </label>
    ${isOv ? `<span class="ov-copy">
      <select id="copySrc">${sourcesHtml}</select>
      <button class="ov-copy-btn" onclick="copyIntoActive()">이대로 가져오기</button>
    </span>` : ''}
  `;
}

function toggleOverride(checked) {
  const i = activeTab;
  if (checked) { if (!overrides[i]) overrides[i] = new Set(commonSel); }
  else { overrides[i] = null; }
  renderOverrideBar();
  renderPoolSection();
  renderPoolTabs();
  updCounts();
}

function copyIntoActive() {
  const src = document.getElementById('copySrc').value;
  const srcSet = src === 'common' ? commonSel : (overrides[Number(src)] || commonSel);
  overrides[activeTab] = new Set(srcSet);
  renderPoolSection();
  renderPoolTabs();
  updCounts();
  toast('선택을 복사했어요');
}

// ============ POOL SECTION (character grid) ============
function activeEditableSet() {
  if (activeTab === 'common') return commonSel;
  return overrides[activeTab] || null;
}

function renderPoolSection() {
  const container = document.getElementById('poolSection');
  let displaySet, editable;
  if (activeTab === 'common') {
    displaySet = commonSel; editable = true;
  } else {
    const ov = overrides[activeTab];
    if (ov) { displaySet = ov; editable = true; }
    else { displaySet = commonSel; editable = false; }
  }

  const gHtml = CHARS.groups.map(g => {
    const sHtml = g.subs.filter(s=>s.items.length).map(s => {
      const btns = s.items.map(it => {
        const name = it.n, gender = it.g, couple = it.c;
        const on = displaySet.has(name) ? ' on' : '';
        const gT = gender===0?'♂':'♀';
        const cT = couple===1?'💕':'';
        const cls = 'ch' + on + (editable ? '' : ' ch-readonly');
        const click = editable ? ` onclick="togPool(this,'${esc(name)}')"` : '';
        return `<button class="${cls}" data-name="${esc(name)}"${click}>${esc(name)}<span class="tag">${gT}${cT}</span></button>`;
      }).join('');
      return `<div class="sub-row"><div class="sub-label">${esc(s.label)}</div><div class="sub-items">${btns}</div></div>`;
    }).join('');

    if(!sHtml) return `<div class="owner-block"><div class="owner-header"><span class="owner-name">${esc(g.owner)}</span></div><div class="empty">항목 없음</div></div>`;

    const toggleBtn = editable ? `<button class="cat-toggle" onclick="togOwnerPool('${esc(g.owner)}')">전체 선택</button>` : '';
    return `<div class="owner-block">
      <div class="owner-header">
        <span class="owner-name">${esc(g.owner)}</span>
        ${toggleBtn}
      </div>${sHtml}</div>`;
  }).join('');

  const title = activeTab === 'common' ? '공통 후보' : `위치 ${activeTab+1} 후보`;
  const icon = activeTab === 'common' ? '🎯' : '📍';
  const allToggle = editable ? `<button class="cat-toggle" onclick="togAllPool()">전체 선택</button>` : '';
  const notice = editable ? '' : `<div class="pool-readonly-note">이 위치는 공통 후보를 그대로 사용 중이에요. 이 위치만 다르게 설정하려면 위의 토글을 켜세요.</div>`;

  container.innerHTML = `<div class="category">
    <div class="cat-header">
      <div class="cat-icon" style="background:var(--violet-dim)">${icon}</div>
      <div class="cat-title">${title}</div>
      ${allToggle}
    </div>${notice}${gHtml}</div>`;

  syncFilterBtns();
  applyFiltersToSection();
}

function togPool(btn, name) {
  const set = activeEditableSet();
  if (!set) return;
  if (set.has(name)) { set.delete(name); btn.classList.remove('on'); }
  else { set.add(name); btn.classList.add('on'); }
  updCounts();
  renderPoolTabs();
}

function getVisibleNamesForActive(owner) {
  const f = getFilters(activeFilterKey());
  let groups = CHARS.groups;
  if (owner) groups = groups.filter(g=>g.owner===owner);
  return groups.flatMap(g=>g.subs.flatMap(s=>s.items)).map(it=>it.n).filter(n=>passesFilter(n,f));
}

function togOwnerPool(owner) {
  const set = activeEditableSet();
  if (!set) return;
  const names = getVisibleNamesForActive(owner);
  if (!names.length) return;
  const allOn = names.every(n=>set.has(n));
  names.forEach(n=>{ if(allOn) set.delete(n); else set.add(n); });
  renderPoolSection(); updCounts(); renderPoolTabs();
  toast(allOn?`${owner} 전체 해제`:`${owner} 전체 선택`);
}

function togAllPool() {
  const set = activeEditableSet();
  if (!set) return;
  const names = getVisibleNamesForActive();
  if (!names.length) return;
  const allOn = names.every(n=>set.has(n));
  names.forEach(n=>{ if(allOn) set.delete(n); else set.add(n); });
  renderPoolSection(); updCounts(); renderPoolTabs();
  toast(allOn?'전체 해제':'전체 선택');
}

// ============ COUNTS ============
function effectivePool(i) {
  return overrides[i] ? [...overrides[i]] : [...commonSel];
}

function canPick() {
  for (let i=0;i<participantCount;i++) if (effectivePool(i).length===0) return false;
  return true;
}

function updCounts() {
  const parts = [`공통 <b style="color:var(--violet)">${commonSel.size}</b>개`];
  for (let i=0;i<participantCount;i++) {
    if (overrides[i]) parts.push(`위치${i+1} <b style="color:var(--violet)">${overrides[i].size}</b>개(커스텀)`);
  }
  document.getElementById('counts').innerHTML = parts.join(' · ');
  document.getElementById('pickBtn').disabled = !canPick();
}

// ============ PICK ============
function randFrom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function allRoles() { return ROLES.groups.flatMap(g => g.items); }
function allAUs() { return AUS.groups.flatMap(g => g.items); }

function randTagFrom(data) {
  const gs = data.groups.filter(g => g.items.length > 0);
  return gs.length ? randFrom(gs) : null;
}

function pickRolesForN(n) {
  const g = randTagFrom(ROLES);
  if (!g) return { roles: Array(n).fill('?'), shared: false };
  if (g.label === '세계관') {
    const role = randFrom(g.items);
    return { roles: Array(n).fill(role), shared: true };
  }
  const pool = [...g.items];
  if (pool.length >= n) {
    const shuffled = [...pool].sort(()=>Math.random()-0.5);
    return { roles: shuffled.slice(0, n), shared: false };
  }
  return { roles: Array.from({length:n}, ()=>randFrom(pool)), shared: false };
}

function renderFinalRoles(rolesResult) {
  const el = document.getElementById('roleGroup');
  if (rolesResult.shared) {
    el.innerHTML = `<span class="result-role-text result-pop">${esc(rolesResult.roles[0])}</span>`;
  } else {
    el.innerHTML = rolesResult.roles.map((r,i)=>`<span class="result-role-text result-pop" style="animation-delay:${(i*0.05).toFixed(2)}s">${esc(r)}</span>`).join('<span class="result-role-sep">✕</span>');
  }
}

function resultEntryText() {
  if (currentRolesShared) {
    return `${currentNames.join(' ✕ ')} (${currentRoles[0]}) / ${currentAU}`;
  }
  return currentNames.map((n,i)=>`${n}(${currentRoles[i]})`).join(' ✕ ') + ` / ${currentAU}`;
}

function pickAUFromTag() {
  const g = randTagFrom(AUS);
  return g ? randFrom(g.items) : '?';
}

function drawAssignment(pools) {
  const n = pools.length;
  const order = pools.map((p,i)=>i).sort((a,b)=>pools[a].length-pools[b].length);
  const result = new Array(n);
  const used = new Set();
  function bt(idx) {
    if (idx >= n) return true;
    const posi = order[idx];
    const candidates = pools[posi].filter(x=>!used.has(x));
    for (let i=candidates.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [candidates[i],candidates[j]]=[candidates[j],candidates[i]]; }
    for (const cand of candidates) {
      result[posi]=cand; used.add(cand);
      if (bt(idx+1)) return true;
      used.delete(cand);
    }
    return false;
  }
  if (bt(0)) return { names: result, duplicated: false };
  return { names: pools.map(p=>randFrom(p)), duplicated: true };
}

function doPick() {
  if (!canPick() || spinning) return;
  spinning = true;
  const btn = document.getElementById('pickBtn');
  btn.disabled = true;
  document.getElementById('rerollRole').disabled = true;
  document.getElementById('rerollAU').disabled = true;

  const nameEls = document.querySelectorAll('#resultArea .result-coupling .result-side');
  document.getElementById('roleGroup').innerHTML = Array.from({length:participantCount}, () => `<span class="result-sub-value"><span class="ph">—</span></span>`).join('<span class="result-role-sep">✕</span>');
  const roleEls = document.querySelectorAll('#resultArea #roleGroup .result-sub-value');
  const auEl = document.getElementById('resAU');
  const pools = Array.from({length:participantCount}, (_,i)=>effectivePool(i));

  let count = 0;
  const total = 16 + Math.floor(Math.random()*10);

  const iv = setInterval(()=>{
    nameEls.forEach((el,i)=>{ el.innerHTML = `<span style="color:var(--text-dim)">${esc(randFrom(pools[i]))}</span>`; });
    roleEls.forEach(el=>{ el.innerHTML = `<span style="color:var(--text-dim)">${esc(randFrom(allRoles()))}</span>`; });
    auEl.innerHTML = `<span style="color:var(--text-dim)">${esc(randFrom(allAUs()))}</span>`;
    count++;
    if (count>=total) {
      clearInterval(iv);
      const draw = drawAssignment(pools);
      currentNames = draw.names;
      const rolesResult = pickRolesForN(participantCount);
      currentRoles = rolesResult.roles;
      currentRolesShared = rolesResult.shared;
      currentAU = pickAUFromTag();
      hasResult = true;
      document.getElementById('resultActions').style.display = 'flex';

      nameEls.forEach((el,i)=>{
        el.innerHTML = `<span class="result-pop" style="animation-delay:${(i*0.05).toFixed(2)}s;${nameGradStyle()}">${esc(currentNames[i])}</span>`;
      });
      renderFinalRoles(rolesResult);
      auEl.innerHTML = `<span class="result-au-text result-pop">${esc(currentAU)}</span>`;

      const entry = resultEntryText();
      hist.unshift(entry);
      if (hist.length>20) hist.pop();
      renderHist();
      particles(btn);
      spinning = false;
      btn.disabled = false;
      document.getElementById('rerollRole').disabled = false;
      document.getElementById('rerollAU').disabled = false;
      if (draw.duplicated) toast('후보가 부족해서 일부 캐릭터가 중복됐어요');
    }
  }, 55+count*4);
}

function rerollRole() {
  if (!hasResult || spinning) return;
  document.getElementById('roleGroup').innerHTML = Array.from({length:participantCount}, () => `<span class="result-sub-value"></span>`).join('<span class="result-role-sep">✕</span>');
  const roleEls = document.querySelectorAll('#resultArea #roleGroup .result-sub-value');
  let c = 0;
  const total = 8 + Math.floor(Math.random()*5);
  const iv = setInterval(()=>{
    roleEls.forEach(el=>{ el.innerHTML = `<span style="color:var(--text-dim)">${esc(randFrom(allRoles()))}</span>`; });
    c++;
    if (c>=total) {
      clearInterval(iv);
      const rolesResult = pickRolesForN(participantCount);
      currentRoles = rolesResult.roles;
      currentRolesShared = rolesResult.shared;
      renderFinalRoles(rolesResult);
    }
  }, 50);
}

function rerollAU() {
  if (!hasResult || spinning) return;
  const el = document.getElementById('resAU');
  let c = 0;
  const total = 8 + Math.floor(Math.random()*5);
  const iv = setInterval(()=>{
    el.innerHTML = `<span style="color:var(--text-dim)">${esc(randFrom(allAUs()))}</span>`;
    c++;
    if (c>=total) {
      clearInterval(iv);
      currentAU = pickAUFromTag();
      el.innerHTML = `<span class="result-au-text result-pop">${esc(currentAU)}</span>`;
    }
  }, 50);
}

function renderHist() {
  const el = document.getElementById('hist');
  el.innerHTML = hist.map(x=>`<span class="history-chip" onclick="copyText('${esc(x).replace(/'/g,"\\&#39;")}')">${esc(x)}</span>`).join('');
  if (hist.length) el.innerHTML += `<button class="history-clear" onclick="hist.length=0;renderHist()">초기화</button>`;
}

function copyText(text) {
  const clean = text.replace(/&#39;/g, "'").replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">");
  navigator.clipboard.writeText(clean).then(()=>{
    toast('복사되었습니다');
  }).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = clean; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('복사되었습니다');
  });
}

function copyCurrentResult() {
  if (!hasResult) return;
  const text = resultEntryText();
  navigator.clipboard.writeText(text).then(()=>toast('복사되었습니다')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    toast('복사되었습니다');
  });
}

async function saveCurrentResult() {
  if (!hasResult) return;
  const result = await openStoragePicker({
    title: '저장소에 저장',
    users: USER_NAMES,
    targets: null
  });
  if (!result) return;
  try {
    const payload = participantCount === 2
      ? {
          left: currentNames[0], right: currentNames[1],
          roleL: currentRoles[0], roleR: currentRoles[1],
          au: currentAU, memo: '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }
      : {
          names: currentNames, roles: currentRoles,
          au: currentAU, memo: '',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
    await db.collection('users').doc(result.user).collection('drawBox').add(payload);
    toast(`${result.user}님의 뽑기 보관함에 저장했어요`);
  } catch (e) {
    console.error('저장 실패:', e);
    toast('저장에 실패했어요');
  }
}

// ============ LIST MODAL ============
function showListModal(type) {
  const overlay = document.getElementById('listModal');
  const title = document.getElementById('listModalTitle');
  const body = document.getElementById('listModalBody');
  title.textContent = type==='role' ? '⚔️ 캐릭터 설정 목록' : '🌀 관계성 목록';

  const groups = (type==='role' ? ROLES : AUS).groups;
  let html = '';
  for (const g of groups) {
    if (!g.items.length) continue;
    const sorted = [...g.items].sort((a, b) => a.localeCompare(b, 'ko'));
    html += `<li class="group-label">${esc(g.label)}</li>`;
    sorted.forEach((item, i) => {
      html += `<li><span class="idx">${i+1}</span>${esc(item)}</li>`;
    });
  }
  body.innerHTML = html;
  overlay.classList.add('open');
}

function closeListModal() {
  document.getElementById('listModal').classList.remove('open');
}

// ============ EFFECTS ============
function particles(target) {
  const r = target.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  const cols = ['#f472b6','#60a5fa','#a78bfa','#34d399','#fbbf24','#fb7185'];
  for(let i=0;i<12;i++){
    const el=document.createElement('div');el.className='ptcl';
    const a=(Math.PI*2*i)/12, d=35+Math.random()*55;
    el.style.left=cx+'px';el.style.top=cy+'px';
    el.style.setProperty('--dx',Math.cos(a)*d+'px');
    el.style.setProperty('--dy',Math.sin(a)*d+'px');
    el.style.background=cols[i%cols.length];
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),700);
  }
}

function toast(m) {
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// ============ START ============
initData();
</script>
